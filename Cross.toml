[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:0.2.5"
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get install --assume-yes perl make libcurl4-openssl-dev:$CROSS_DEB_ARCH cmake software-properties-common wget gnupg unzip",
    "wget -qO /tmp/protoc.zip https://github.com/protocolbuffers/protobuf/releases/download/v25.1/protoc-25.1-linux-x86_64.zip && unzip -o /tmp/protoc.zip -d /usr/local bin/protoc && chmod +x /usr/local/bin/protoc && rm /tmp/protoc.zip",
    "wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | apt-key add -",
    "add-apt-repository 'deb http://apt.llvm.org/xenial/ llvm-toolchain-xenial-6.0 main'",
    "apt-get update && apt-get install --assume-yes clang-6.0 libclang-6.0-dev"
]

[target.aarch64-unknown-linux-gnu.env]
# The cross-rs container lacks sccache, mold, and standalone `clang` (only
# clang-6.0 from the LLVM apt repo). It DOES have `cc` (symlink to gcc) and
# `aarch64-linux-gnu-gcc` (cross toolchain). We override both the target
# triple (aarch64, for the final binary) AND the host triple (x86_64, used
# when building build-scripts/proc-macros) so neither path tries to spawn
# a missing tool.
#
# Empty env values like `RUSTC_WRAPPER=` reliably clear the corresponding
# config-file entry, but the same trick is unreliable for CARGO_TARGET_*_LINKER
# (cargo treats it as "use empty string as linker name" in some paths,
# which then errors). So LINKER is overridden with a real binary that
# exists in the container, and RUSTFLAGS is overridden with a harmless
# custom cfg so the no-op shows up as a non-empty (and therefore
# unambiguous) env value.
passthrough = [
    "LIBCLANG_PATH=/usr/lib/llvm-6.0/lib",
    "RUSTC_WRAPPER=",
    "CARGO_BUILD_RUSTC_WRAPPER=",
    "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=cc",
    "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS=--cfg=cross_rs_build",
    "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc",
    "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS=--cfg=cross_rs_build",
]
