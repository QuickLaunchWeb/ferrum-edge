name: Setup Rust CI environment
description: >-
  Installs the stable Rust toolchain (optional components), wires sccache
  via setup-sccache, installs a fast linker via setup-fast-linker, sets up
  the Swatinem rust-cache, and installs protoc + libcurl native deps
  required by every Linux test/lint/perf job. Centralizes the setup block
  so individual jobs only declare their cache key and any extra rustup
  components.

inputs:
  shared-key:
    description: >-
      rust-cache shared key. Set per logical job (e.g. `ci-test`,
      `ci-test-functional`, `ci-lint`, `ci-perf`) so caches don't trample
      each other. Jobs that compile the same artifacts should share a key.
    required: true
  components:
    description: >-
      Comma-separated rustup components (e.g. `clippy`, `rustfmt`). Empty
      string skips component install — most jobs don't need extras.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        components: ${{ inputs.components }}

    - uses: ./.github/actions/setup-sccache

    - uses: ./.github/actions/setup-fast-linker

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ inputs.shared-key }}

    - name: Install protoc and libcurl headers
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y protobuf-compiler libcurl4-openssl-dev
