name: Setup fast linker
description: >-
  Installs a fast linker (mold on Linux, lld on macOS) and pairs it with
  the per-target rustflags pinned in `.cargo/config.toml`. The config file
  uses explicit triples (not cfg() forms) so that the env-var overrides
  below can actually replace the rustflags if install fails.

  Speedup is significant on Linux (mold is 2-5x faster than the system ld
  for our crate graph) and modest on macOS (ld64.lld vs Apple's ld). If
  the linker fails to install, this action overrides the matching
  CARGO_TARGET_<TRIPLE>_LINKER / _RUSTFLAGS with safe, non-empty fallback
  values so cargo uses the default linker. Build still proceeds, just at
  default link speed.

  Windows is intentionally not touched — rustup ships lld-link.exe but
  switching MSVC's default link.exe adds risk without measurable benefit.

  Fallback semantics (verified empirically against cargo's actual
  behavior, not just docs):
    - `RUSTFLAGS=` (empty) — REPLACES target.<triple>.rustflags from
      config.toml (cargo skips target rustflags entirely once RUSTFLAGS
      is set, even to empty). This is the only env-var form that works;
      CARGO_TARGET_<TRIPLE>_RUSTFLAGS MERGES with the config value.
    - `CARGO_TARGET_<TRIPLE>_LINKER=cc` — empty doesn't reliably clear
      the LINKER config, so we point at a real binary (`cc` is a symlink
      to the default C compiler on every Linux distro).

runs:
  using: composite
  steps:
    - name: Install mold + clang (Linux)
      if: runner.os == 'Linux'
      shell: bash
      continue-on-error: true
      run: |
        sudo apt-get update
        sudo apt-get install -y mold clang

    - name: Install lld (macOS)
      if: runner.os == 'macOS'
      shell: bash
      continue-on-error: true
      run: |
        # macos-latest runners may already have lld via Homebrew; brew is
        # idempotent so this is safe to re-run.
        brew install lld

    - name: Configure fast linker
      shell: bash
      run: |
        fallback_linux() {
          # RUSTFLAGS= (empty) makes cargo skip target.<triple>.rustflags
          # entirely — the only env-var form that REPLACES rather than
          # merges. LINKER=cc points at the universal symlink to gcc.
          echo "RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=cc" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=cc" >> "$GITHUB_ENV"
        }

        fallback_macos() {
          # macOS config.toml has no `linker = ` line for darwin targets;
          # only rustflags. RUSTFLAGS= replaces them — cargo uses the
          # default Apple linker.
          echo "RUSTFLAGS=" >> "$GITHUB_ENV"
        }

        case "${RUNNER_OS}" in
          Linux)
            if command -v mold &> /dev/null && command -v clang &> /dev/null; then
              echo "mold + clang available — using fast linker"
              mold --version
            else
              echo "mold/clang unavailable — falling back to cc + default linker"
              fallback_linux
            fi
            ;;
          macOS)
            if command -v ld64.lld &> /dev/null; then
              echo "ld64.lld available — using fast linker"
              ld64.lld --version || true
            else
              echo "ld64.lld unavailable — falling back to default linker"
              fallback_macos
            fi
            ;;
          Windows)
            echo "Windows: using default link.exe (no override)"
            ;;
        esac
