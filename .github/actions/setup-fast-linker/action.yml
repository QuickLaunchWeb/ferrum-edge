name: Setup fast linker
description: >-
  Installs a fast linker (mold on Linux, lld on macOS) and pairs it with
  the per-target rustflags already pinned in `.cargo/config.toml`. The
  config file uses explicit triples (not cfg() forms) so that the env-var
  override here actually clears the rustflags if install fails.

  Speedup is significant on Linux (mold is 2-5x faster than the system ld
  for our crate graph) and modest on macOS (ld64.lld vs Apple's ld). If
  the linker fails to install, this action clears the matching
  CARGO_TARGET_<TRIPLE>_RUSTFLAGS so cargo falls back to the platform
  default linker. Build still proceeds, just at default link speed.

  Windows is intentionally not touched — rustup ships lld-link.exe but
  switching MSVC's default link.exe adds risk without measurable benefit.

runs:
  using: composite
  steps:
    - name: Install mold + clang (Linux)
      if: runner.os == 'Linux'
      shell: bash
      continue-on-error: true
      run: |
        sudo apt-get update
        sudo apt-get install -y mold clang

    - name: Install lld (macOS)
      if: runner.os == 'macOS'
      shell: bash
      continue-on-error: true
      run: |
        # macos-latest runners may already have lld via Homebrew; brew is
        # idempotent so this is safe to re-run.
        brew install lld

    - name: Configure fast linker
      shell: bash
      run: |
        clear_linux_rustflags() {
          # Match the explicit triples pinned in .cargo/config.toml. Empty
          # values override the config-file rustflags so cargo uses the
          # default linker for the target.
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS=" >> "$GITHUB_ENV"
        }

        clear_macos_rustflags() {
          echo "CARGO_TARGET_AARCH64_APPLE_DARWIN_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_APPLE_DARWIN_RUSTFLAGS=" >> "$GITHUB_ENV"
        }

        case "${RUNNER_OS}" in
          Linux)
            if command -v mold &> /dev/null && command -v clang &> /dev/null; then
              echo "mold + clang available — using fast linker"
              mold --version
            else
              echo "mold/clang unavailable — clearing linker rustflags"
              clear_linux_rustflags
            fi
            ;;
          macOS)
            if command -v ld64.lld &> /dev/null; then
              echo "ld64.lld available — using fast linker"
              ld64.lld --version || true
            else
              echo "ld64.lld unavailable — clearing linker rustflags"
              clear_macos_rustflags
            fi
            ;;
          Windows)
            echo "Windows: using default link.exe (no override)"
            ;;
        esac
