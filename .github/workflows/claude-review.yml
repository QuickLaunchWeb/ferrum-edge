name: Claude PR Review

on:
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: >-
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '@claude review') &&
      github.event.comment.user.login == 'jeremyjpj0916'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Claude Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude review"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.issue.number }}

            ${{ github.event.comment.body }}

            Please review this pull request with a focus on:
            - Code quality and best practices
            - Potential bugs or issues
            - Security implications
            - Performance considerations
            - Test coverage and test quality
            - Documentation clarity and completeness
            - Configuration and CI/CD correctness
            - Memory efficiency and performance implications

            Use `gh pr comment ${{ github.event.issue.number }}` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` with `confirmed: true`
            to highlight specific code issues inline.

            Post GitHub comments and provide detailed feedback using inline comments
            for specific issues. Do not leave the review only in the action logs.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment"
            --model claude-opus-4-7
            --effort max
