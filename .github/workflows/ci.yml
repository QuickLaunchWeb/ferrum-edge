name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  test-unit:
    name: Unit Tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-rust-ci
        with:
          shared-key: "ci-test"

      - name: Run unit tests
        run: cargo test --test unit_tests
        env:
          RUST_BACKTRACE: 1

  test-lib:
    name: Inline Lib Tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-rust-ci
        with:
          shared-key: "ci-test"

      - name: Run inline lib tests
        # Covers `#[cfg(test)] mod tests` blocks inline in `src/` (used for
        # private fns/structs that the separate tests/ binaries can't see).
        # CLAUDE.md lists them as required pre-commit checks; CI now runs them
        # too so a regression in an inline test fails the PR instead of
        # waiting until someone runs the lib suite locally.
        run: cargo test --lib
        env:
          RUST_BACKTRACE: 1

  test-integration:
    name: Integration Tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-rust-ci
        with:
          shared-key: "ci-test"

      - name: Run integration tests
        run: cargo test --test integration_tests
        env:
          RUST_BACKTRACE: 1

  build-gateway-binary:
    name: Build Gateway Binary (functional tests)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-rust-ci
        with:
          shared-key: "ci-test-functional"

      - name: Build gateway binary
        run: cargo build --bin ferrum-edge

      - name: Upload gateway binary
        # Shared across every test-functional shard via download-artifact so
        # the ~60s `cargo build --bin ferrum-edge` step runs once instead of
        # six times. Functional tests look for ./target/debug/ferrum-edge;
        # shards re-create that path on download.
        uses: actions/upload-artifact@v7
        with:
          name: ferrum-edge-debug
          path: target/debug/ferrum-edge
          retention-days: 1
          if-no-files-found: error

  test-functional:
    name: Functional Tests (${{ matrix.shard }})
    if: github.event_name == 'pull_request'
    needs: build-gateway-binary
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: harness
            filters: |
              common::
              scaffolding::
              scenarios::
              functional_shared_harness_smoke_test
              functional_cli_test
              functional_ci_shard_coverage_test
          - shard: admin-routing
            filters: |
              functional_admin_observability_test
              functional_admin_operations_test
              functional_auth_acl_test
              functional_credential_rotation_test
              functional_file_mode_test
              functional_host_only_routing_test
              functional_migrate_mode_test
              functional_protocol_validation_test
              functional_regex_routing_test
              functional_router_cache_test
              functional_secrets_test
          - shard: plugins
            filters: |
              functional_ai_plugins_test
              functional_grpc_plugins_test
              functional_logging_plugins_test
              functional_logging_test
              functional_otel_ldap_test
              functional_plugin_extended_test
              functional_plugin_test
              functional_plugins_network_test
              functional_prometheus_test
              functional_serverless_mirror_test
              functional_ws_plugins_test
          - shard: protocols
            filters: |
              functional_grpc_test
              functional_passthrough_test
              functional_sse_test
              functional_stream_listener_failure_test
              functional_tcp_proxy_test
              functional_udp_proxy_test
              functional_websocket_test
              scripted_backend_h2_tests
              scripted_backend_h3_tests
              scripted_backend_matrix_tests
              scripted_backend_network_sim_tests
              scripted_backend_tests
              scripted_backend_udp_tests
          - shard: data-plane
            filters: |
              functional_capability_registry_test
              functional_cp_dp_resilience_test
              functional_cp_dp_test
              functional_database_test
              functional_db_failover_test
              functional_db_outage_test
              functional_db_tls_test
              functional_db_upstream_test
              functional_mongodb_test
              functional_namespace_test
              functional_redis_rate_limiting_test
          - shard: resilience
            filters: |
              functional_circuit_breaker_retry_test
              functional_dns_cache_test
              functional_graceful_shutdown_test
              functional_load_balancer_test
              functional_load_stress_test
              functional_mtls_acl_test
              functional_mtls_test
              functional_overload_test
              functional_retry_test
              functional_scale_perf_test
              functional_service_discovery_test
              functional_tls_lifecycle_test
              functional_tls_only_test
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-rust-ci
        with:
          shared-key: "ci-test-functional"

      - name: Install cargo-nextest
        # Prebuilt binaries from taiki-e/install-action — no compile time.
        # Nextest's process-per-test model isolates port/process contention
        # and ships built-in slow-test + retry support, which fits this E2E
        # suite better than libtest's shared-process scheduler.
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Download prebuilt gateway binary
        uses: actions/download-artifact@v8
        with:
          name: ferrum-edge-debug
          path: target/debug

      - name: Mark gateway binary executable
        # actions/download-artifact does not preserve the executable bit.
        run: chmod +x target/debug/ferrum-edge

      - name: Run functional test shard
        # ── Single nextest invocation per shard ───────────────────────────
        # The old loop ran `cargo test` once per filter line, paying cargo's
        # fingerprint-check + libtest startup (~3–5s) every iteration. With
        # 7–13 filters per shard that was 30–60s of pure overhead. Here we
        # collect the filters into an argv array and let nextest OR them.
        #
        # `--run-ignored=all` mirrors libtest's `--include-ignored` so the
        # non-ignored harness unit tests bundled into the functional_tests
        # binary (e.g. `common::config_builder::tests::*`) run alongside the
        # ignored E2E tests.
        #
        # The filter expression excludes the long stress suites that are
        # intentionally local-only:
        #   - test_scale_perf_30k_proxies (matches both base + _postgres)
        #   - test_load_stress_10k_proxies (single ignored test in that file)
        #
        # `FERRUM_SKIP_GATEWAY_BUILD=1` makes `ensure_gateway_built()` in the
        # harness skip its per-process `cargo build --bin ferrum-edge` and
        # trust the artifact we just downloaded. Critical with nextest's
        # one-process-per-test model — otherwise every test would pay the
        # cargo fingerprint check on first call.
        run: |
          set -e
          filters=()
          while IFS= read -r filter; do
            [ -z "$filter" ] && continue
            filters+=("$filter")
          done <<< "$FUNCTIONAL_FILTERS"
          cargo nextest run --test functional_tests \
            --run-ignored=all \
            --no-fail-fast \
            -E 'not test(/test_scale_perf_30k_proxies/) and not test(/test_load_stress_10k_proxies/)' \
            "${filters[@]}"
        env:
          FUNCTIONAL_FILTERS: ${{ matrix.filters }}
          FERRUM_SKIP_GATEWAY_BUILD: "1"
          RUST_BACKTRACE: 1
        timeout-minutes: 30

      - name: Summarize functional shard
        if: always()
        run: |
          echo "## Functional Test Shard: ${{ matrix.shard }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          printf '%s\n' "$FUNCTIONAL_FILTERS" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        env:
          FUNCTIONAL_FILTERS: ${{ matrix.filters }}

  test:
    name: Tests
    if: always() && github.event_name == 'pull_request'
    needs:
      - test-unit
      - test-lib
      - test-integration
      - build-gateway-binary
      - test-functional
    runs-on: ubuntu-latest
    steps:
      - name: Summarize test results
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Result |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit | ${{ needs.test-unit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Inline lib | ${{ needs.test-lib.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration | ${{ needs.test-integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Gateway binary build | ${{ needs.build-gateway-binary.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Functional shards | ${{ needs.test-functional.result }} |" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.test-unit.result }}" != "success" ] ||
             [ "${{ needs.test-lib.result }}" != "success" ] ||
             [ "${{ needs.test-integration.result }}" != "success" ] ||
             [ "${{ needs.build-gateway-binary.result }}" != "success" ] ||
             [ "${{ needs.test-functional.result }}" != "success" ]; then
            exit 1
          fi

  lint:
    name: Lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-rust-ci
        with:
          shared-key: "ci-lint"
          components: clippy

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  build-ebpf:
    name: Build eBPF Programs
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for eBPF changes
        id: changes
        run: |
          if git diff --name-only "origin/${{ github.base_ref }}...HEAD" | grep -q '^ebpf/'; then
            echo "ebpf_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "ebpf_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install nightly Rust with rust-src
        if: steps.changes.outputs.ebpf_changed == 'true'
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install stable Rust for shared types
        if: steps.changes.outputs.ebpf_changed == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install bpf-linker
        if: steps.changes.outputs.ebpf_changed == 'true'
        run: cargo install bpf-linker --locked

      - name: Build BPF programs
        if: steps.changes.outputs.ebpf_changed == 'true'
        run: cd ebpf && cargo +nightly build --target bpfel-unknown-none -Z build-std=core --release -p ferrum-ebpf

      - name: Test shared types
        if: steps.changes.outputs.ebpf_changed == 'true'
        run: cd ebpf && cargo test -p ferrum-ebpf-common

      - name: Upload BPF artifact
        if: steps.changes.outputs.ebpf_changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ebpf-programs
          path: ebpf/target/bpfel-unknown-none/release/ferrum-ebpf
          retention-days: 14

  performance-regression:
    name: Performance Regression Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-rust-ci
        with:
          shared-key: "ci-perf"

      - name: Build release binaries
        run: |
          cargo build --profile ci-release --bin ferrum-edge
          cd tests/performance && cargo build --release --bin backend_server

      - name: Start backend server
        run: |
          tests/performance/target/release/backend_server > /tmp/backend.log 2>&1 &
          echo "BACKEND_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:3001/health > /dev/null 2>&1; then
              echo "Backend ready"
              break
            fi
            if [ "$i" -eq 15 ]; then
              echo "Backend failed to start"
              cat /tmp/backend.log
              exit 1
            fi
            sleep 1
          done

      - name: Start gateway
        run: |
          FERRUM_MODE=file \
          FERRUM_FILE_CONFIG_PATH="$(pwd)/tests/performance/perf_config.yaml" \
          FERRUM_LOG_LEVEL=error \
          FERRUM_ADD_VIA_HEADER=false \
          FERRUM_POOL_MAX_IDLE_PER_HOST=200 \
          FERRUM_POOL_IDLE_TIMEOUT_SECONDS=120 \
          FERRUM_POOL_ENABLE_HTTP_KEEP_ALIVE=true \
          FERRUM_POOL_ENABLE_HTTP2=false \
          FERRUM_POOL_WARMUP_ENABLED=true \
          ./target/ci-release/ferrum-edge run > /tmp/gateway.log 2>&1 &
          echo "GATEWAY_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:8000/health > /dev/null 2>&1; then
              echo "Gateway ready"
              break
            fi
            if [ "$i" -eq 15 ]; then
              echo "Gateway failed to start"
              cat /tmp/gateway.log
              exit 1
            fi
            sleep 1
          done

      - name: Run self-relative performance test
        timeout-minutes: 5
        run: |
          mkdir -p tests/performance/ci_results
          python3 tests/performance/ci_overhead_bench.py \
            --gateway-url http://127.0.0.1:8000/api/users \
            --backend-url http://127.0.0.1:3001/api/users \
            --gateway-health-url http://127.0.0.1:8000/health \
            --concurrency 50 \
            --duration 5 \
            --iterations 3 \
            --warmup 2 \
            --overhead-threshold 50 \
            --output tests/performance/ci_results/overhead_results.json

      - name: Stop services
        if: always()
        run: |
          kill $BACKEND_PID 2>/dev/null || true
          kill $GATEWAY_PID 2>/dev/null || true

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: performance-results
          path: tests/performance/ci_results/
          retention-days: 30

      - name: Post performance summary
        if: always()
        run: |
          echo "## Performance Regression Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f tests/performance/ci_results/overhead_results.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat tests/performance/ci_results/overhead_results.json >> $GITHUB_STEP_SUMMARY
            echo '' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "Performance tests did not produce results." >> $GITHUB_STEP_SUMMARY
          fi

  # ── Cross-platform builds (PR + main), release & Docker (main push only) ──

  build-binaries:
    name: Build (${{ matrix.asset_name }})
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ferrum-edge
            asset_name: ferrum-edge-linux-x86_64

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: ferrum-edge
            asset_name: ferrum-edge-linux-aarch64

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: ferrum-edge
            asset_name: ferrum-edge-macos-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: ferrum-edge
            asset_name: ferrum-edge-macos-aarch64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: ferrum-edge.exe
            asset_name: ferrum-edge-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        continue-on-error: true

      - name: Configure sccache
        shell: bash
        run: |
          if command -v sccache &> /dev/null && sccache --start-server 2>/dev/null; then
            echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
            echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          fi

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "build-${{ matrix.target }}"

      - name: Install protoc and build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libcurl4-openssl-dev

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc and NASM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install protoc nasm -y
          echo "C:\Program Files\NASM" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8

      - name: Install cross (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross

      - name: Build release binary (cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --features cloud-secrets --release --target ${{ matrix.target }}
        env:
          RUSTC_WRAPPER: ""

      - name: Build release binary (cargo)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --features cloud-secrets --release --target ${{ matrix.target }}

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-assets
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "release-assets/${{ matrix.asset_name }}"
          cd release-assets
          if command -v sha256sum &> /dev/null; then
            sha256sum "${{ matrix.asset_name }}" > "${{ matrix.asset_name }}.sha256"
          else
            shasum -a 256 "${{ matrix.asset_name }}" > "${{ matrix.asset_name }}.sha256"
          fi
          cat "${{ matrix.asset_name }}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.target }}
          path: release-assets/

  latest-release:
    name: Update Latest Release
    needs: [build-binaries]
    if: always() && needs.build-binaries.result == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: downloaded-artifacts
          pattern: binary-*

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find downloaded-artifacts -type f -exec cp {} release-assets/ \;
          echo "Release assets:"
          ls -la release-assets/

      - name: Create or update latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing latest release and tag
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true

          # Build release notes
          cat > notes.md << 'NOTES'
          ## Latest Development Build

          Auto-built from the latest commit on `main` (${{ github.sha }}).

          For stable releases, download a versioned tag (e.g., `v1.0.0`).

          ### Binaries

          | Platform | Binary |
          |----------|--------|
          | Linux x86_64 | `ferrum-edge-linux-x86_64` |
          | Linux ARM64 | `ferrum-edge-linux-aarch64` |
          | macOS x86_64 | `ferrum-edge-macos-x86_64` |
          | macOS ARM64 (Apple Silicon) | `ferrum-edge-macos-aarch64` |
          | Windows x86_64 | `ferrum-edge-windows-x86_64.exe` |

          ### Docker

          ```bash
          docker pull ferrumedge/ferrum-edge:latest
          docker pull ghcr.io/ferrum-edge/ferrum-edge:latest
          ```

          ### Checksums

          ```
          NOTES
          cat release-assets/*.sha256 >> notes.md
          echo '```' >> notes.md

          # Create the release
          gh release create latest \
            --title "Latest Build ($(date -u +%Y-%m-%d))" \
            --notes-file notes.md \
            --prerelease \
            --target "${{ github.sha }}" \
            release-assets/*

  docker:
    name: Docker (${{ matrix.platform }})
    needs: [build-binaries]
    if: always() && needs.build-binaries.result == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            binary_target: x86_64-unknown-linux-gnu
            binary_asset: ferrum-edge-linux-x86_64
            arch_dir: amd64
          - platform: linux/arm64
            binary_target: aarch64-unknown-linux-gnu
            binary_asset: ferrum-edge-linux-aarch64
            arch_dir: arm64
    steps:
      - uses: actions/checkout@v6

      - name: Download Linux binary
        uses: actions/download-artifact@v8
        with:
          name: binary-${{ matrix.binary_target }}
          path: downloaded-artifacts

      - name: Prepare Docker context
        run: |
          mkdir -p docker-context/bin/${{ matrix.arch_dir }}
          cp downloaded-artifacts/${{ matrix.binary_asset }} docker-context/bin/${{ matrix.arch_dir }}/ferrum-edge
          cp Dockerfile.release docker-context/Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push per-platform digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: docker-context
          platforms: ${{ matrix.platform }}
          outputs: type=image,"name=ferrumedge/ferrum-edge,ghcr.io/${{ github.repository }}",push-by-digest=true,name-canonical=true,push=true
          provenance: false

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: docker-digest-${{ matrix.arch_dir }}
          path: /tmp/digests/*
          if-no-files-found: error

  docker-manifest:
    name: Docker Manifest
    needs: docker
    if: always() && needs.docker.result == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: docker-digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch manifest (Docker Hub)
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ferrumedge/ferrum-edge:latest \
            -t ferrumedge/ferrum-edge:main-${{ github.sha }} \
            $(printf 'ferrumedge/ferrum-edge@sha256:%s ' *)

      - name: Create and push multi-arch manifest (GHCR)
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}:latest \
            -t ghcr.io/${{ github.repository }}:main-${{ github.sha }} \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)
