# Envoy HTTP/1.1 reverse proxy config for payload size tests
# Listener on 8000, plain HTTP → backend echo on 4001
admin:
  address:
    socket_address: { address: 127.0.0.1, port_value: 15000 }

static_resources:
  listeners:
    - name: http1_listener
      address:
        socket_address: { address: 127.0.0.1, port_value: 8000 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http1
                codec_type: HTTP1
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/echo" }
                          route:
                            cluster: backend_http1
                            timeout: 30s
                        - match: { prefix: "/sse" }
                          route:
                            cluster: backend_http1
                            timeout: 30s
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                access_log: []

  clusters:
    - name: backend_http1
      connect_timeout: 5s
      type: STATIC
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: backend_http1
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: 127.0.0.1, port_value: 4001 }
