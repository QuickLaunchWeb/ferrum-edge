# Envoy HTTP/3 (QUIC) reverse proxy config
# UDP listener on 8443 with QUIC/TLS 1.3 → HTTP/3 backend on 3445
#
# HTTP/3 downstream is production-ready per Envoy docs; upstream HTTP/3 is alpha.
# We terminate HTTP/3 at the gateway and use HTTP/3 upstream via explicit config.
#
# This benchmark intentionally drives up to 100 concurrent POST/echo streams
# with payloads as large as 5 MiB. Envoy's QUIC connection window tops out at
# 24 MiB, and the H3 upstream pool will otherwise concentrate too many large
# streams onto one backend QUIC connection. Keep the per-stream window high,
# but cap upstream concurrent streams so Envoy fans out across backend
# connections; the larger buffer limit avoids H3_NO_ERROR resets from the
# synthetic in-flight body volume.
admin:
  address:
    socket_address: { address: 127.0.0.1, port_value: 15000 }

static_resources:
  listeners:
    - name: h3_listener
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 8443
          protocol: UDP
      per_connection_buffer_limit_bytes: 134217728
      udp_listener_config:
        quic_options: {}
        downstream_socket_config:
          prefer_gro: true
      filter_chains:
        - transport_socket:
            name: envoy.transport_sockets.quic
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.quic.v3.QuicDownstreamTransport
              downstream_tls_context:
                common_tls_context:
                  tls_certificates:
                    - certificate_chain: { filename: CERT_PATH }
                      private_key: { filename: KEY_PATH }
                  alpn_protocols: ["h3"]
          filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_h3
                codec_type: HTTP3
                http3_protocol_options:
                  quic_protocol_options:
                    max_concurrent_streams: { value: 1000 }
                    initial_stream_window_size: { value: 8388608 }
                    initial_connection_window_size: { value: 25165824 }
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: backend_h3
                            timeout: 30s
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                access_log: []

  clusters:
    - name: backend_h3
      connect_timeout: 5s
      per_connection_buffer_limit_bytes: 134217728
      type: STATIC
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http3_protocol_options:
              quic_protocol_options:
                max_concurrent_streams: { value: 16 }
                initial_stream_window_size: { value: 8388608 }
                initial_connection_window_size: { value: 25165824 }
      transport_socket:
        name: envoy.transport_sockets.quic
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.quic.v3.QuicUpstreamTransport
          upstream_tls_context:
            common_tls_context:
              alpn_protocols: ["h3"]
              validation_context:
                trusted_ca:
                  filename: CA_PATH
      load_assignment:
        cluster_name: backend_h3
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 3445
                      protocol: UDP
