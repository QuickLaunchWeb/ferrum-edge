# Envoy HTTP/3 (QUIC) reverse proxy config
# UDP listener on 8443 with QUIC/TLS 1.3 → HTTP/3 backend on 3445
#
# HTTP/3 downstream is production-ready per Envoy docs; upstream HTTP/3 is alpha.
# We terminate HTTP/3 at the gateway and use HTTP/3 upstream via explicit config.
#
# This benchmark intentionally drives high-concurrency POST/echo streams with
# payloads as large as 5 MiB. Envoy's QUIC connection window tops out at 24 MiB,
# so use a 6 MiB stream window and cap H3 concurrent streams per QUIC connection
# to 4 (4 x 6 MiB = 24 MiB). This makes the downstream and upstream pools fan
# out across more QUIC connections instead of concentrating too much in-flight
# body data onto one connection. With the bench client's concurrency/10+1 H3
# connection pool, concurrency=100 maps to 11 x 4 = 44 in-flight downstream
# streams, so post-tuning Envoy H3 numbers are not directly comparable to
# uncapped runs. No HTTP buffer filter is needed because this benchmark streams
# echo bodies rather than requiring full-body buffering.
#
# Envoy's QUIC upstream verifier requires an explicit SNI/server name for this
# static 127.0.0.1 cluster. Without it the TLS hostname is empty and Envoy
# returns local 503s even though the benchmark cert is valid for localhost.
admin:
  address:
    socket_address: { address: 127.0.0.1, port_value: 15000 }

static_resources:
  listeners:
    - name: h3_listener
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 8443
          protocol: UDP
      per_connection_buffer_limit_bytes: 134217728
      udp_listener_config:
        quic_options: {}
        downstream_socket_config:
          prefer_gro: true
      filter_chains:
        - transport_socket:
            name: envoy.transport_sockets.quic
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.quic.v3.QuicDownstreamTransport
              downstream_tls_context:
                common_tls_context:
                  tls_certificates:
                    - certificate_chain: { filename: CERT_PATH }
                      private_key: { filename: KEY_PATH }
                  alpn_protocols: ["h3"]
          filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_h3
                codec_type: HTTP3
                http3_protocol_options:
                  quic_protocol_options:
                    max_concurrent_streams: { value: 4 }
                    initial_stream_window_size: { value: 6291456 }
                    initial_connection_window_size: { value: 25165824 }
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: backend_h3
                            # Disable the per-route HTTP timeout. Strict echo
                            # validation turns slow 5 MiB streaming responses
                            # into errors if Envoy returns a timeout-generated
                            # 504 before the body finishes under load.
                            timeout: 0s
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                access_log: []

  clusters:
    - name: backend_h3
      connect_timeout: 5s
      per_connection_buffer_limit_bytes: 134217728
      type: STATIC
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http3_protocol_options:
              quic_protocol_options:
                max_concurrent_streams: { value: 4 }
                initial_stream_window_size: { value: 6291456 }
                initial_connection_window_size: { value: 25165824 }
      transport_socket:
        name: envoy.transport_sockets.quic
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.quic.v3.QuicUpstreamTransport
          upstream_tls_context:
            # Matches the benchmark cert SAN generated by tls_utils.
            sni: localhost
            common_tls_context:
              alpn_protocols: ["h3"]
              validation_context:
                trusted_ca:
                  filename: CA_PATH
      load_assignment:
        cluster_name: backend_h3
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 3445
                      protocol: UDP
