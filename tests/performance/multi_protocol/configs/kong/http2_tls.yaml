_format_version: "3.0"

# Kong DB-less declarative configuration — HTTP/2 over TLS
# Gateway HTTPS+H2 (TLS termination, ALPN h2) → HTTPS/H2 backend on 3443
# Listener http2 is configured via KONG_PROXY_LISTEN env var in harness script.

services:
  - name: echo-service-h2
    host: 127.0.0.1
    port: 3443
    protocol: https
    connect_timeout: 5000
    read_timeout: 30000
    write_timeout: 30000
    tls_verify: false
    routes:
      - name: echo-route-h2
        paths:
          - /echo
        protocols:
          - http
          - https
          - grpcs
        strip_path: false

  - name: health-service
    host: 127.0.0.1
    port: 3010
    protocol: http
    connect_timeout: 1000
    read_timeout: 5000
    write_timeout: 5000
    routes:
      - name: health-route
        paths:
          - /health
        protocols:
          - http
          - https
        strip_path: false
