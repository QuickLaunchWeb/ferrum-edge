_format_version: "3.0"

# Kong DB-less declarative configuration — TCP+TLS stream proxy
# Gateway TCP+TLS (TLS termination) on stream port 5001 → plain TCP backend on 3004
#
# Stream routes require KONG_STREAM_LISTEN=127.0.0.1:5001 ssl env var.
# SNI entries are not needed when TLS is configured via KONG_SSL_CERT/KEY_FILE.

services:
  - name: tcp-service
    host: 127.0.0.1
    port: 3004
    protocol: tcp
    connect_timeout: 5000
    read_timeout: 300000
    write_timeout: 300000
    routes:
      - name: tcp-tls-route
        destinations:
          - port: 5001
        protocols:
          - tls

  # HTTP service kept so harness health-probe path still works on HTTP admin listener.
  - name: health-service
    host: 127.0.0.1
    port: 3010
    protocol: http
    connect_timeout: 1000
    read_timeout: 5000
    write_timeout: 5000
    routes:
      - name: health-route
        paths:
          - /health
        protocols:
          - http
          - https
        strip_path: false
