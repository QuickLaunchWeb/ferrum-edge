_format_version: "3.0"

# Kong DB-less declarative configuration — HTTP/1.1 end-to-end TLS.
# Client HTTPS → Kong → HTTPS upstream on 3447. Every hop encrypted.
# Listener is configured via KONG_PROXY_LISTEN env var in harness script.
#
# ── Why this config doesn't use per-service `ca_certificates` ────────────
# Kong's per-service `tls_verify: true` + `ca_certificates: [...]` pattern
# wires the upstream trust store via Lua at the rewrite/access phase. That
# rebuilds the upstream SSL_CTX per request, which prevents OpenResty's
# upstream keepalive pool from matching connections by SSL identity, so
# every request triggers a fresh backend TLS handshake (~450 RPS ceiling
# at concurrency 100, vs 9-10K RPS when the SSL_CTX is static).
#
# Instead we set a GLOBAL static trust + verify via nginx env vars in the
# harness:
#   KONG_NGINX_PROXY_PROXY_SSL_TRUSTED_CERTIFICATE=/certs/ca.pem
#   KONG_NGINX_PROXY_PROXY_SSL_VERIFY=on
# These produce the `proxy_ssl_trusted_certificate` and `proxy_ssl_verify`
# directives in nginx-kong.conf at config-load time, so SSL_CTX stays
# stable across requests and the keepalive pool actually reuses sockets.
#
# `host: localhost` (not 127.0.0.1) matters — nginx's `proxy_ssl_verify`
# matches the upstream's connect hostname against cert SANs, and the
# bench cert presents `DNS:localhost` + `IP:127.0.0.1`. Classic nginx's
# verifier checks DNS SANs against the connect target string, so we
# need a hostname for the SAN match to succeed. `localhost` resolves
# to 127.0.0.1 the same.
#
# Kong's upstream keepalive for HTTP/1.1 is also tuned via global env
# vars (KONG_UPSTREAM_KEEPALIVE_*) — see the harness for the values.

services:
  - name: echo-service
    host: localhost
    port: 3447
    protocol: https
    connect_timeout: 5000
    read_timeout: 30000
    write_timeout: 30000
    routes:
      - name: echo-route
        paths:
          - /echo
        protocols:
          - http
          - https
        strip_path: false
        preserve_host: false

  - name: health-service
    host: 127.0.0.1
    port: 3010
    protocol: http
    connect_timeout: 1000
    read_timeout: 5000
    write_timeout: 5000
    routes:
      - name: health-route
        paths:
          - /health
        protocols:
          - http
          - https
        strip_path: false
