_format_version: "3.0"
# Upstream TLS CA trust anchor. run_gateway_protocol_bench.sh::start_kong
# reads proto_backend's generated self-signed cert and substitutes the PEM
# content into the placeholder below. The cert carries basicConstraints
# CA:TRUE so Kong's declarative ca_certificates entity accepts it.
ca_certificates:
  - id: "00000000-0000-0000-0000-000000000001"
    cert: |
      __BENCH_CA_PEM__


# Kong DB-less declarative configuration — HTTP/1.1 end-to-end TLS.
# Client HTTPS → Kong → HTTPS upstream on 3447. Every hop encrypted.
# Listener is configured via KONG_PROXY_LISTEN env var in harness script.
#
# An explicit upstream entity is required for nginx to pool upstream
# connections (keepalive). Without it, proxy_pass to a raw IP literal
# opens a fresh TCP+TLS connection per request (~450ms handshake
# overhead, capping throughput at ~444 RPS regardless of payload).
#
# Target uses `localhost` (not `127.0.0.1`) because Kong's upstream
# TLS verifier checks the target hostname against the cert's SANs.
# The benchmark cert has DNS:localhost + IP:127.0.0.1, and Kong's
# SNI matching works reliably with DNS SANs. This is the same pattern
# the working WSS config uses (host: localhost).

upstreams:
  - name: echo-upstream
    targets:
      - target: "localhost:3447"
        weight: 100

services:
  - name: echo-service
    host: echo-upstream
    protocol: https
    tls_verify: true
    ca_certificates:
      - "00000000-0000-0000-0000-000000000001"
    connect_timeout: 5000
    read_timeout: 30000
    write_timeout: 30000
    routes:
      - name: echo-route
        paths:
          - /echo
        protocols:
          - http
          - https
        strip_path: false
        preserve_host: false

  - name: health-service
    host: 127.0.0.1
    port: 3010
    protocol: http
    connect_timeout: 1000
    read_timeout: 5000
    write_timeout: 5000
    routes:
      - name: health-route
        paths:
          - /health
        protocols:
          - http
          - https
        strip_path: false
