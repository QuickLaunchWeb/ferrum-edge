_format_version: "3.0"
# Upstream TLS CA trust anchor. run_gateway_protocol_bench.sh::start_kong
# reads proto_backend's generated self-signed cert and substitutes the PEM
# content into the placeholder below. The cert carries basicConstraints
# CA:TRUE so Kong's declarative ca_certificates entity accepts it.
ca_certificates:
  - id: "00000000-0000-0000-0000-000000000001"
    cert: |
      __BENCH_CA_PEM__


# Kong DB-less declarative configuration — HTTP/1.1 end-to-end TLS.
# Client HTTPS → Kong → HTTPS upstream on 3447. Every hop encrypted.
# Listener is configured via KONG_PROXY_LISTEN env var in harness script.
#
# Without an explicit upstream entity, Kong's default HTTP/1.1 keepalive
# pool is tiny (or absent when the service points at an IP literal),
# causing a fresh TLS handshake per request (~460ms floor, ~435 RPS at
# 10KB, 99% overhead vs direct). The upstream below enables a 512-slot
# keepalive pool so connections are reused across requests.

upstreams:
  - name: echo-upstream
    targets:
      - target: "127.0.0.1:3447"
        weight: 100
    # Kong upstream keepalive pool settings for HTTP/1.1 connection reuse
    keepalive_pool_size: 512
    keepalive_idle_timeout: 120

services:
  - name: echo-service
    host: echo-upstream
    protocol: https
    tls_verify: true
    ca_certificates:
      - "00000000-0000-0000-0000-000000000001"
    connect_timeout: 5000
    read_timeout: 30000
    write_timeout: 30000
    routes:
      - name: echo-route
        paths:
          - /echo
        protocols:
          - http
          - https
        strip_path: false
        preserve_host: false

  - name: health-service
    host: 127.0.0.1
    port: 3010
    protocol: http
    connect_timeout: 1000
    read_timeout: 5000
    write_timeout: 5000
    routes:
      - name: health-route
        paths:
          - /health
        protocols:
          - http
          - https
        strip_path: false
