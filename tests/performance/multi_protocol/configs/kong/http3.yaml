_format_version: "3.0"

# Kong DB-less declarative configuration — HTTP/3 (QUIC)
# Gateway HTTP/3 over UDP 8443 (enabled via KONG_PROXY_LISTEN "http3 reuseport"
# + KONG_NGINX_HTTP_LISTEN injection in harness) → HTTP/3 backend on 3445
#
# NOTE: Kong routes HTTP/3 downstream to an HTTP/1.1 or HTTP/2 upstream via
# OpenResty's proxy module. HTTP/3 upstream is not yet exposed as a protocol
# choice in Kong. We therefore proxy to the HTTPS/H2 backend (3443) so the
# upstream leg still uses HTTPS, and measure downstream HTTP/3 throughput.

services:
  - name: echo-service-h3
    host: 127.0.0.1
    port: 3443
    protocol: https
    connect_timeout: 5000
    read_timeout: 30000
    write_timeout: 30000
    tls_verify: false
    routes:
      - name: echo-route-h3
        paths:
          - /echo
        protocols:
          - http
          - https
        strip_path: false

  - name: health-service
    host: 127.0.0.1
    port: 3010
    protocol: http
    connect_timeout: 1000
    read_timeout: 5000
    write_timeout: 5000
    routes:
      - name: health-route
        paths:
          - /health
        protocols:
          - http
          - https
        strip_path: false
