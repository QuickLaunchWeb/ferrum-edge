# ── Local development build configuration ────────────────────────────────
#
# These settings speed up compile-edit-run cycles on your workstation.
# CI workflows set their own env vars so these are primarily for localhost.

# ── Linker optimisations (optional) ──────────────────────────────────────
# Using a faster linker can cut link times by 2-5x. Uncomment the section
# that matches your platform after installing the required linker.
# Keep host-specific linker choices in ~/.cargo/config.toml rather than this
# checked-in file so GitHub-hosted macOS runners keep using their default linker.
#
# macOS local example — install LLVM with `brew install llvm`
# [target.aarch64-apple-darwin]
# linker = "/opt/homebrew/opt/llvm/bin/clang"
# rustflags = ["-C", "link-arg=-fuse-ld=lld"]
#
# [target.x86_64-apple-darwin]
# linker = "/usr/local/opt/llvm/bin/clang"
# rustflags = ["-C", "link-arg=-fuse-ld=lld"]
#
# Linux — install mold: `sudo apt-get install mold` (fastest linker)
# [target.x86_64-unknown-linux-gnu]
# linker = "clang"
# rustflags = ["-C", "link-arg=-fuse-ld=mold"]
#
# [target.aarch64-unknown-linux-gnu]
# linker = "clang"
# rustflags = ["-C", "link-arg=-fuse-ld=mold"]

# ── sccache (optional) ──────────────────────────────────────────────────
# sccache caches compiled crates across branches and clean builds.
# Install locally with: cargo install sccache
# CI workflows that compile Rust install/start sccache explicitly.
[build]
rustc-wrapper = "sccache"

# ── Network settings ────────────────────────────────────────────────────
[net]
# Speed up cargo by using git CLI for fetching (uses your SSH agent)
git-fetch-with-cli = true
