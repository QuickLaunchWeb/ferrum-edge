image:
  repository: ferrumedge/ferrum-edge
  tag: "0.9.0"
  pullPolicy: IfNotPresent

namespace: ferrum

controlPlane:
  enabled: true
  replicas: 1
  grpcPort: 50051
  rbac:
    create: true
    gatewayApi: true
    istio: true
    meshConfig: true
    podDiscovery: false
    nodeLocality: false
  env:
    FERRUM_MODE: cp
    FERRUM_XDS_ENABLED: "true"

injector:
  enabled: true
  replicas: 1
  listenPort: 9443
  requireAnnotation: true
  failurePolicy: Fail
  caBundle: ""
  namespaceSelector:
    matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: NotIn
        values:
          - kube-system
          - kube-public
          - kube-node-lease
          - istio-system
      - key: ferrum.io/injection
        operator: NotIn
        values:
          - disabled
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  tls:
    secretName: ferrum-mesh-injector-tls
    certPath: /etc/ferrum/injector/tls/tls.crt
    keyPath: /etc/ferrum/injector/tls/tls.key
  env:
    FERRUM_MODE: injector

ambient:
  enabled: false
  inboundPort: 15006
  outboundPort: 15001
  hbonePort: 15008
  captureMode: iptables
  env:
    FERRUM_MODE: mesh
    FERRUM_MESH_TOPOLOGY: ambient
    FERRUM_MESH_HBONE_LISTEN_ADDR: 0.0.0.0:15008

eastWest:
  enabled: false
  replicas: 1
  listenPort: 15443
  env:
    FERRUM_MODE: mesh
    FERRUM_MESH_TOPOLOGY: east_west_gateway

ca:
  enabled: true
  env:
    FERRUM_MESH_PRODUCTION_MODE: "true"

observability:
  enabled: false
  dashboards:
    enabled: true
  alerts:
    enabled: true
    certExpiringSeconds: 604800
    cpStaleConfigSeconds: 300
    policyDenyRatePerSecond: 1
    mtlsHandshakeFailureRatePerSecond: 0
    injectorFailureRatePerSecond: 0

nodeAgent:
  enabled: false
  image:
    repository: ferrumedge/ferrum-edge
    tag: latest
  captureMode: ebpf
  proxyUid: 1337
  cgroupRoot: /sys/fs/cgroup
  bpfFsPath: /sys/fs/bpf
  fallbackMode: iptables
  capture:
    includeCidrs: "0.0.0.0/0"
    excludeCidrs: ""
    excludePorts: "15001,15006,15008,15020"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
