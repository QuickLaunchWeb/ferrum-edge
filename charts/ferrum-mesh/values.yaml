image:
  repository: ferrumedge/ferrum-edge
  tag: "0.9.0"
  pullPolicy: IfNotPresent

namespace: ferrum

controlPlane:
  enabled: true
  replicas: 1
  grpcPort: 50051
  rbac:
    create: true
    gatewayApi: true
    istio: true
    meshConfig: true
    podDiscovery: false
    nodeLocality: false
  env:
    FERRUM_MODE: cp
    FERRUM_XDS_ENABLED: "true"

injector:
  enabled: true
  replicas: 1
  listenPort: 9443
  requireAnnotation: true
  failurePolicy: Fail
  caBundle: ""
  namespaceSelector:
    matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: NotIn
        values:
          - kube-system
          - kube-public
          - kube-node-lease
          - istio-system
      - key: ferrum.io/injection
        operator: NotIn
        values:
          - disabled
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  tls:
    secretName: ferrum-mesh-injector-tls
    certPath: /etc/ferrum/injector/tls/tls.crt
    keyPath: /etc/ferrum/injector/tls/tls.key
  env:
    FERRUM_MODE: injector

ambient:
  enabled: false
  inboundPort: 15006
  outboundPort: 15001
  hbonePort: 15008
  captureMode: iptables
  env:
    FERRUM_MODE: mesh
    FERRUM_MESH_TOPOLOGY: ambient
    FERRUM_MESH_HBONE_LISTEN_ADDR: 0.0.0.0:15008

eastWest:
  enabled: false
  replicas: 1
  listenPort: 15443
  env:
    FERRUM_MODE: mesh
    FERRUM_MESH_TOPOLOGY: east_west_gateway

ca:
  enabled: true
  env:
    FERRUM_MESH_PRODUCTION_MODE: "true"

observability:
  # Master switch for the observability subtree. Default `false` so a fresh
  # install does not assume the cluster runs Prometheus / a Grafana sidecar.
  # Flip to `true` to render `PrometheusRule` + dashboard `ConfigMap`s.
  enabled: false
  dashboards:
    # When `observability.enabled` is `true`, render a `ConfigMap` that
    # contains the five bundled Grafana dashboards
    # (gateway-overview, mesh-overview, certificate-posture, egress-scope,
    # policy-deny). The ConfigMap carries the `grafana_dashboard: "1"` label
    # that the Grafana sidecar (`kiwigrid/k8s-sidecar`) and the Grafana
    # Operator both pick up automatically.
    enabled: true
    # Sidecar label key/value override — only needed if your Grafana install
    # uses a custom label (e.g. `grafana_dashboard_my-org`). The default is
    # the upstream Grafana sidecar convention.
    # sidecarLabel: grafana_dashboard
    # sidecarLabelValue: "1"
    # Extra labels and annotations stamped on the dashboard ConfigMap.
    # Useful for `grafana.com/folder`-style annotations or routing labels.
    # labels: {}
    # annotations: {}
    # Override the generated ConfigMap name. Default is
    # `ferrum-mesh-dashboards`; uncomment to scope it under a release- or
    # operator-specific name.
    # configMapName: ferrum-mesh-dashboards
  alerts:
    enabled: true
    certExpiringSeconds: 604800
    cpStaleConfigSeconds: 300
    policyDenyRatePerSecond: 1
    mtlsHandshakeFailureRatePerSecond: 0
    injectorFailureRatePerSecond: 0

nodeAgent:
  enabled: false
  image:
    repository: ferrumedge/ferrum-edge
    tag: latest
  captureMode: ebpf
  proxyUid: 1337
  cgroupRoot: /sys/fs/cgroup
  bpfFsPath: /sys/fs/bpf
  fallbackMode: iptables
  capture:
    includeCidrs: "0.0.0.0/0"
    excludeCidrs: ""
    excludePorts: "15001,15006,15008,15020"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # CNI plugin install (optional). Disabled by default so an upgrade does
  # not change behaviour. When enabled, the DaemonSet runs an init container
  # that copies the `ferrum-cni` binary into the host's /opt/cni/bin/ and
  # drops a chained CNI conflist into /etc/cni/net.d/. The kube-rs watcher
  # in the node-agent remains the source of truth for enrollment; the CNI
  # hook is an optimization that closes the kubelet-vs-watcher race at
  # pod sandbox setup time. See docs/node_agent.md "CNI plugin install".
  cni:
    enabled: false
    # Primary CNI to chain behind. The init container writes a
    # `*-ferrum.conflist` whose first plugin is the primary's `type`
    # (calico, cilium, bridge, flannel, etc.) — Ferrum is appended as a
    # meta-plugin that does NOT allocate IPs or interfaces. Confirm the
    # value matches the primary CNI installed on the cluster.
    chainedWith: calico
    # Path on the host where the CNI plugin binary is dropped. Standard
    # kubelet location; rarely needs overriding.
    hostBinDir: /opt/cni/bin
    # Path on the host where the CNI conflist is written. Standard
    # kubelet location; rarely needs overriding.
    hostConfDir: /etc/cni/net.d
    # Filename for the conflist Ferrum writes. The numeric prefix sorts
    # AFTER the typical primary CNI conflist (`10-...`) so the chain is
    # evaluated primary → ferrum.
    confFileName: "05-ferrum.conflist"
    # Directory on the host that holds the UDS the node-agent listens on
    # and the CNI binary connects to. Must be writable by the node-agent
    # container (which runs as root in this DaemonSet).
    hostSocketDir: /var/run/ferrum
    # Filename of the UDS inside `hostSocketDir`. The chart wires both
    # `FERRUM_NODE_AGENT_CNI_SOCKET_PATH` and the per-conflist
    # `ferrum.socketPath` field from this value so the two halves cannot
    # drift.
    socketFileName: node-agent-cni.sock
