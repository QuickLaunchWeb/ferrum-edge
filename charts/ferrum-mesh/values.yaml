image:
  repository: ferrumedge/ferrum-edge
  tag: "0.9.0"
  pullPolicy: IfNotPresent

namespace: ferrum

controlPlane:
  enabled: true
  replicas: 1
  grpcPort: 50051
  rbac:
    create: true
    gatewayApi: true
    istio: true
    meshConfig: true
    podDiscovery: false
    nodeLocality: false
  env:
    FERRUM_MODE: cp
    FERRUM_XDS_ENABLED: "true"

injector:
  enabled: true
  replicas: 1
  listenPort: 9443
  requireAnnotation: true
  failurePolicy: Fail
  caBundle: ""
  namespaceSelector:
    matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: NotIn
        values:
          - kube-system
          - kube-public
          - kube-node-lease
          - istio-system
      - key: ferrum.io/injection
        operator: NotIn
        values:
          - disabled
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  tls:
    secretName: ferrum-mesh-injector-tls
    certPath: /etc/ferrum/injector/tls/tls.crt
    keyPath: /etc/ferrum/injector/tls/tls.key
  env:
    FERRUM_MODE: injector

ambient:
  enabled: false
  inboundPort: 15006
  outboundPort: 15001
  hbonePort: 15008
  captureMode: iptables
  env:
    FERRUM_MODE: mesh
    FERRUM_MESH_TOPOLOGY: ambient
    FERRUM_MESH_HBONE_LISTEN_ADDR: 0.0.0.0:15008

eastWest:
  enabled: false
  replicas: 1
  listenPort: 15443
  env:
    FERRUM_MODE: mesh
    FERRUM_MESH_TOPOLOGY: east_west_gateway

ca:
  enabled: true
  env:
    FERRUM_MESH_PRODUCTION_MODE: "true"

observability:
  # Master switch for the observability subtree. Default `false` so a fresh
  # install does not assume the cluster runs Prometheus / a Grafana sidecar.
  # Flip to `true` to render `PrometheusRule` + dashboard `ConfigMap`s.
  enabled: false
  dashboards:
    # When `observability.enabled` is `true`, render a `ConfigMap` that
    # contains the five bundled Grafana dashboards
    # (gateway-overview, mesh-overview, certificate-posture, egress-scope,
    # policy-deny). The ConfigMap carries the `grafana_dashboard: "1"` label
    # that the Grafana sidecar (`kiwigrid/k8s-sidecar`) and the Grafana
    # Operator both pick up automatically.
    enabled: true
    # Sidecar label key/value override — only needed if your Grafana install
    # uses a custom label (e.g. `grafana_dashboard_my-org`). The default is
    # the upstream Grafana sidecar convention.
    # sidecarLabel: grafana_dashboard
    # sidecarLabelValue: "1"
    # Extra labels and annotations stamped on the dashboard ConfigMap.
    # Useful for `grafana.com/folder`-style annotations or routing labels.
    # labels: {}
    # annotations: {}
    # Override the generated ConfigMap name. Default is
    # `ferrum-mesh-dashboards`; uncomment to scope it under a release- or
    # operator-specific name.
    # configMapName: ferrum-mesh-dashboards
  alerts:
    enabled: true
    certExpiringSeconds: 604800
    # Critical alert when an SVID has less than this long until expiry.
    # Default 3600s (1h) matches the SPIRE default workload SVID TTL — at this
    # point rotation has almost certainly stalled.
    svidExpiringCriticalSeconds: 3600
    cpStaleConfigSeconds: 300
    policyDenyRatePerSecond: 1
    mtlsHandshakeFailureRatePerSecond: 0
    injectorFailureRatePerSecond: 0
    # Warn when a federated trust bundle has not been refreshed in this many
    # seconds. Default 600s = 2 * FERRUM_MESH_FEDERATION_POLL_INTERVAL_SECONDS
    # (which defaults to 300s).
    federationBundleStaleSeconds: 600

nodeAgent:
  enabled: false
  image:
    repository: ferrumedge/ferrum-edge
    tag: latest
  captureMode: ebpf
  proxyUid: 1337
  cgroupRoot: /sys/fs/cgroup
  bpfFsPath: /sys/fs/bpf
  fallbackMode: iptables
  capture:
    includeCidrs: "0.0.0.0/0"
    excludeCidrs: ""
    excludePorts: "15001,15006,15008,15020"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
