{{- if and .Values.observability.enabled .Values.observability.dashboards.enabled }}
{{- /*
  Bundled Grafana dashboards. Each JSON in `dashboards/` is loaded into the
  ConfigMap data, and the `grafana_dashboard: "1"` label is the sidecar
  convention used by `kiwigrid/k8s-sidecar` (the default Grafana Helm chart
  sidecar) and by the Grafana operator. Operators that already manage
  dashboards out of band can disable this surface by setting
  `observability.dashboards.enabled=false` (the default value is `true` so
  installs that enable observability get the dashboards as a single switch).

  Adding a new dashboard:
    1. Drop the JSON in `charts/ferrum-mesh/dashboards/<name>.json`.
    2. No template edits needed — `.Files.Glob` picks it up automatically.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.observability.dashboards.configMapName | default "ferrum-mesh-dashboards" }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: ferrum-mesh-observability
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- with .Values.observability.dashboards.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{ .Values.observability.dashboards.sidecarLabel | default "grafana_dashboard" }}: {{ .Values.observability.dashboards.sidecarLabelValue | default "1" | quote }}
  {{- with .Values.observability.dashboards.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
{{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
  {{ base $path }}: |-
{{ $.Files.Get $path | indent 4 }}
{{- end }}
{{- end }}
