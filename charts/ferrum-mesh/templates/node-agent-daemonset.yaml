{{- if .Values.nodeAgent.enabled }}
{{- /*
  Resolve security knobs from .Values.nodeAgent.security with hardened defaults.
  Each toggle is reversible via Helm values so older kernels / strict admission
  controllers can roll back individually. See docs/node_agent_security.md.
*/ -}}
{{- $sec := .Values.nodeAgent.security | default dict -}}
{{- $addPerfmon := true -}}
{{- if hasKey $sec "addCapPerfmon" }}{{ $addPerfmon = get $sec "addCapPerfmon" }}{{ end -}}
{{- $dropSysAdmin := false -}}
{{- if hasKey $sec "dropCapSysAdmin" }}{{ $dropSysAdmin = get $sec "dropCapSysAdmin" }}{{ end -}}
{{- $caps := list "BPF" "NET_ADMIN" -}}
{{- if $addPerfmon }}{{ $caps = append $caps "PERFMON" }}{{ end -}}
{{- if not $dropSysAdmin }}{{ $caps = append $caps "SYS_ADMIN" }}{{ end -}}
{{- $readOnlyRoot := true -}}
{{- if hasKey $sec "readOnlyRootFilesystem" }}{{ $readOnlyRoot = get $sec "readOnlyRootFilesystem" }}{{ end -}}
{{- $allowEsc := false -}}
{{- if hasKey $sec "allowPrivilegeEscalation" }}{{ $allowEsc = get $sec "allowPrivilegeEscalation" }}{{ end -}}
{{- /*
  seccompProfile is passed through as-is so callers setting
  `type: Localhost` can also provide `localhostProfile: <path>` (required by
  the kubernetes API server for that type). Default to RuntimeDefault when
  the operator unsets the block entirely.
*/ -}}
{{- $seccompProfile := dict "type" "RuntimeDefault" -}}
{{- if and (hasKey $sec "seccompProfile") (get $sec "seccompProfile") -}}
{{- $candidate := get $sec "seccompProfile" -}}
{{- if and (kindIs "map" $candidate) (hasKey $candidate "type") (get $candidate "type") -}}
{{- $seccompProfile = $candidate -}}
{{- end -}}
{{- end -}}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ferrum-mesh-node-agent
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: ferrum-mesh-node-agent
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ferrum-mesh-node-agent
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ferrum-mesh-node-agent
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: ferrum-node-agent
      hostPID: true
      hostNetwork: true
      securityContext:
        seccompProfile:
          {{- toYaml $seccompProfile | nindent 10 }}
      containers:
        - name: ferrum-edge
          image: "{{ .Values.nodeAgent.image.repository }}:{{ .Values.nodeAgent.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["run"]
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            privileged: false
            allowPrivilegeEscalation: {{ $allowEsc }}
            readOnlyRootFilesystem: {{ $readOnlyRoot }}
            capabilities:
              drop: ["ALL"]
              add:
                {{- range $cap := $caps }}
                - {{ $cap }}
                {{- end }}
          env:
            - name: FERRUM_MODE
              value: "node_agent"
            - name: FERRUM_MESH_CAPTURE_MODE
              value: {{ .Values.nodeAgent.captureMode | quote }}
            - name: FERRUM_MESH_PROXY_UID
              value: {{ .Values.nodeAgent.proxyUid | quote }}
            - name: FERRUM_MESH_CAPTURE_INCLUDE_CIDRS
              value: {{ .Values.nodeAgent.capture.includeCidrs | quote }}
            - name: FERRUM_MESH_CAPTURE_EXCLUDE_CIDRS
              value: {{ .Values.nodeAgent.capture.excludeCidrs | quote }}
            - name: FERRUM_MESH_CAPTURE_EXCLUDE_PORTS
              value: {{ .Values.nodeAgent.capture.excludePorts | quote }}
            - name: FERRUM_NODE_AGENT_FALLBACK_MODE
              value: {{ .Values.nodeAgent.fallbackMode | quote }}
            - name: FERRUM_NODE_AGENT_CGROUP_ROOT
              value: {{ .Values.nodeAgent.cgroupRoot | quote }}
            - name: FERRUM_NODE_AGENT_BPF_FS_PATH
              value: {{ .Values.nodeAgent.bpfFsPath | quote }}
            - name: FERRUM_NODE_AGENT_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: bpf-fs
              mountPath: {{ .Values.nodeAgent.bpfFsPath }}
            - name: cgroup
              mountPath: {{ .Values.nodeAgent.cgroupRoot }}
              readOnly: true
            {{- if $readOnlyRoot }}
            # Scratch tmpfs required when readOnlyRootFilesystem=true so the
            # tokio/tracing runtime can open transient files. See
            # docs/node_agent_security.md for the full rationale.
            - name: tmp
              mountPath: /tmp
            {{- end }}
          resources:
            {{- toYaml .Values.nodeAgent.resources | nindent 12 }}
      volumes:
        - name: bpf-fs
          hostPath:
            path: {{ .Values.nodeAgent.bpfFsPath }}
            type: DirectoryOrCreate
        - name: cgroup
          hostPath:
            path: {{ .Values.nodeAgent.cgroupRoot }}
            type: Directory
        {{- if $readOnlyRoot }}
        - name: tmp
          emptyDir: {}
        {{- end }}
{{- end }}
