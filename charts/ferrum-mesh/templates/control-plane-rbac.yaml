{{- if and .Values.controlPlane.enabled .Values.controlPlane.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ferrum-mesh-control-plane-{{ .Release.Name }}
  labels:
    app.kubernetes.io/name: ferrum-mesh-control-plane
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
  {{- if .Values.controlPlane.rbac.gatewayApi }}
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - gatewayclasses
      - gateways
      - httproutes
      - grpcroutes
      - tlsroutes
      - tcproutes
      - referencegrants
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - gatewayclasses/status
      - gateways/status
      - httproutes/status
      - grpcroutes/status
    # Newer kube-rs SSA paths may fall back to `update status` after a 409
    # conflict, and the Gateway API conformance docs reference both verbs.
    # Granting both now keeps the chart stable if we move to server-side apply.
    verbs: ["patch", "update"]
  {{- end }}
  {{- if .Values.controlPlane.rbac.istio }}
  - apiGroups: ["security.istio.io"]
    resources:
      - authorizationpolicies
      - peerauthentications
      - requestauthentications
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.istio.io"]
    resources:
      - virtualservices
      - destinationrules
      - serviceentries
      - workloadentries
      - sidecars
    verbs: ["get", "list", "watch"]
  - apiGroups: ["telemetry.istio.io"]
    resources:
      - telemetries
    verbs: ["get", "list", "watch"]
  # T2-B: status sub-resource patching for the three Istio CRDs where
  # Ferrum surfaces translation outcome via `kubectl describe`. The
  # CRDs ship `subresources.status: {}` in Istio's own manifests, so a
  # standard `istioctl install` already supports this. `update` is
  # granted alongside `patch` so newer kube-rs SSA paths that fall back
  # to PUT after a 409 conflict keep working — mirrors the Gateway API
  # block above. RequestAuthentication / VirtualService / ServiceEntry /
  # Sidecar / Telemetry / WorkloadEntry status subresources are deferred
  # to a follow-on; granting them now would broaden RBAC without a
  # corresponding writer in this PR.
  - apiGroups: ["security.istio.io"]
    resources:
      - authorizationpolicies/status
      - peerauthentications/status
    verbs: ["patch", "update"]
  - apiGroups: ["networking.istio.io"]
    resources:
      - destinationrules/status
    verbs: ["patch", "update"]
  # T2-B: Events emitted by the controller when it patches the Istio
  # CRD status so `kubectl describe <kind> <name>` shows the
  # accept/reject reason in the Events footer.
  - apiGroups: [""]
    resources:
      - events
    verbs: ["create", "patch"]
  {{- end }}
  {{- if .Values.controlPlane.rbac.meshConfig }}
  - apiGroups: [""]
    resources:
      - configmaps
    verbs: ["get", "list", "watch"]
  {{- end }}
  {{- if .Values.controlPlane.rbac.podDiscovery }}
  - apiGroups: [""]
    resources:
      - pods
      - services
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources:
      - endpointslices
    verbs: ["get", "list", "watch"]
  {{- end }}
  {{- if .Values.controlPlane.rbac.nodeLocality }}
  - apiGroups: [""]
    resources:
      - nodes
    verbs: ["get", "list", "watch"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ferrum-mesh-control-plane-{{ .Release.Name }}
  labels:
    app.kubernetes.io/name: ferrum-mesh-control-plane
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ferrum-mesh-control-plane-{{ .Release.Name }}
subjects:
  - kind: ServiceAccount
    name: ferrum-mesh
    namespace: {{ .Release.Namespace }}
{{- end }}
