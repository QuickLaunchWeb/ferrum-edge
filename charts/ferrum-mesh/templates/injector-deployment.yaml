{{- if .Values.injector.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ferrum-mesh-injector
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: ferrum-mesh-injector
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.injector.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ferrum-mesh-injector
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ferrum-mesh-injector
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: ferrum-mesh
      containers:
        - name: ferrum-edge
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: webhook
              containerPort: {{ .Values.injector.listenPort }}
          env:
            - name: FERRUM_INJECTOR_LISTEN_ADDR
              value: "0.0.0.0:{{ .Values.injector.listenPort }}"
            - name: FERRUM_INJECTOR_SIDECAR_IMAGE
              value: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
            - name: FERRUM_INJECTOR_TLS_CERT_PATH
              value: {{ .Values.injector.tls.certPath | quote }}
            - name: FERRUM_INJECTOR_TLS_KEY_PATH
              value: {{ .Values.injector.tls.keyPath | quote }}
            {{- range $name, $value := .Values.injector.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
          volumeMounts:
            - name: injector-tls
              mountPath: /etc/ferrum/injector/tls
              readOnly: true
      volumes:
        - name: injector-tls
          secret:
            secretName: {{ .Values.injector.tls.secretName }}
---
apiVersion: v1
kind: Service
metadata:
  name: ferrum-mesh-injector
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app.kubernetes.io/name: ferrum-mesh-injector
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: webhook
      port: {{ .Values.injector.listenPort }}
      targetPort: webhook
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: ferrum-mesh-injector-{{ .Release.Name }}
  labels:
    app.kubernetes.io/name: ferrum-mesh-injector
    app.kubernetes.io/instance: {{ .Release.Name }}
webhooks:
  - name: sidecar-injector.ferrum.io
    admissionReviewVersions:
      - v1
    sideEffects: None
    failurePolicy: {{ .Values.injector.failurePolicy }}
    clientConfig:
      service:
        name: ferrum-mesh-injector
        namespace: {{ .Release.Namespace }}
        path: /mutate
        port: {{ .Values.injector.listenPort }}
      {{- if .Values.injector.caBundle }}
      caBundle: {{ .Values.injector.caBundle | quote }}
      {{- end }}
    rules:
      - operations:
          - CREATE
        apiGroups:
          - ""
        apiVersions:
          - v1
        resources:
          - pods
{{- end }}
