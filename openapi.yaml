openapi: 3.1.0
info:
  title: Ferrum Edge Admin API
  description: |
    RESTful API for managing the Ferrum Edge configuration at runtime.

    All endpoints except `/health`, `/status`, exact `/metrics`, and `/overload`
    require JWT bearer token authentication via the
    `Authorization: Bearer <token>` header.

    ## Namespaces

    Every authenticated endpoint is scoped by the `X-Ferrum-Namespace` request
    header. Resources (proxies, consumers, plugin configs, upstreams) are
    isolated per namespace — uniqueness constraints (listen_path, proxy/upstream
    name, consumer username, listen_port) apply per namespace, and a request
    only sees resources whose `namespace` field matches the header. The header
    defaults to `ferrum` when omitted, must match `^[a-zA-Z0-9][a-zA-Z0-9._-]*$`
    (start with an alphanumeric character; alphanumerics, dots, underscores, or
    hyphens after that; max 254 chars — same rules as resource IDs), and is
    enforced even on write operations: any `namespace` field in the request
    body is overwritten with the header value (the field is therefore
    effectively read-only on the wire). Discover all known namespaces via
    `GET /namespaces`.

    ## Caching and read-only mode

    When the primary database is unavailable, read endpoints transparently fall
    back to the most recent cached configuration and include an
    `X-Data-Source: cached` response header. Write operations require a live
    database and return `503 Service Unavailable` when one is not present.

    The Admin API can be placed in **read-only mode**, in which case all POST,
    PUT, and DELETE operations return `403 Forbidden`.

    ## Request body size limits

    Most write endpoints accept request bodies up to 1 MiB; bodies that exceed
    the limit are rejected with `413 Payload Too Large`. The `/restore`
    endpoint has a higher configurable limit (default 100 MiB, controlled by
    `FERRUM_ADMIN_RESTORE_MAX_BODY_SIZE_MIB`) to accommodate large-scale
    backups (30K+ proxies / 90K+ plugins can reach ~80 MB).
  version: 0.2.0
  license:
    name: PolyForm Noncommercial 1.0.0
    url: https://polyformproject.org/licenses/noncommercial/1.0.0

servers:
  - url: "{protocol}://{host}:{port}"
    description: Admin API listener
    variables:
      protocol:
        default: http
        enum: [http, https]
      host:
        default: 127.0.0.1
      port:
        default: "9000"

security:
  - bearerAuth: []

tags:
  - name: Health
    description: Unauthenticated health and readiness probes
  - name: Metrics
    description: Observability and monitoring endpoints
  - name: Mesh Observability
    description: Mesh service graph and identity health telemetry
  - name: Proxies
    description: Manage proxy route definitions
  - name: Consumers
    description: Manage API consumers and their credentials
  - name: Plugins
    description: Manage plugin configurations
  - name: Upstreams
    description: Manage upstream groups for load-balanced backends
  - name: Batch
    description: Bulk resource creation for high-throughput provisioning
  - name: Backup & Restore
    description: Full configuration backup and restore for disaster recovery and migration
  - name: Namespaces
    description: Multi-tenant namespace discovery
  - name: Monitoring
    description: CP/DP cluster status and operational introspection
  - name: Backend Capabilities
    description: Inspect and force-refresh the per-backend-target protocol classification cache (H1/H2/H3/h2c/gRPC)
  - name: Node-Waypoint
    description: Inspect the per-pod identity index used by node-waypoint topology (mesh-only)
  - name: Service-Waypoint
    description: Inspect the resolved service binding used by service-waypoint topology (mesh-only)
  - name: API Specs
    description: Submit, retrieve, replace, and delete OpenAPI/Swagger spec bundles that create proxy + upstream + plugin resources atomically

paths:
  # ── Health ──────────────────────────────────────────────────────────
  /health:
    get:
      operationId: getHealth
      summary: Gateway health check
      description: |
        Returns gateway health status including database connectivity and
        cached configuration availability. Also accessible at `/status`.

        Returns `503 Service Unavailable` while the gateway is still in
        startup (the body's `status` field is set to `"starting"` and
        `ready` is `false`). Once startup is complete the endpoint returns
        `200 OK` with `status` set to `"ok"` or `"degraded"` (DB
        disconnected / admin writes blocked).
      tags: [Health]
      security: []
      responses:
        "200":
          description: Gateway is ready (status `ok` or `degraded`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Gateway is still starting (status `starting`, `ready=false`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /status:
    get:
      operationId: getStatus
      summary: Gateway status (alias for /health)
      tags: [Health]
      security: []
      responses:
        "200":
          description: Gateway is ready (status `ok` or `degraded`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Gateway is still starting (status `starting`, `ready=false`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  # ── Overload ────────────────────────────────────────────────────────
  /overload:
    get:
      operationId: getOverload
      summary: Overload status
      description: |
        Returns the gateway's current overload state including resource pressure
        metrics (file descriptors, connections, event loop latency) and active
        load-shedding actions. Unauthenticated so it can be used by load balancers
        and monitoring probes.

        Returns `503 Service Unavailable` when the overload level is `critical`.

        In control-plane mode (no proxy state), returns a minimal
        `{"level":"normal","message":"No proxy state available"}` response.
      tags: [Health]
      security: []
      responses:
        "200":
          description: Overload state (normal or pressure)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/OverloadSnapshot"
                  - $ref: "#/components/schemas/OverloadNoProxyState"
        "503":
          description: Overload state is critical — gateway is shedding load
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverloadSnapshot"

  # ── Metrics ─────────────────────────────────────────────────────────
  /metrics:
    get:
      operationId: getPrometheusMetrics
      summary: Prometheus metrics
      description: |
        Returns gateway metrics in Prometheus exposition format.
        Unauthenticated so it can be scraped by Prometheus without credentials.
        Mesh mode adds identity and control-plane telemetry families for
        certificate expiry, rotation failures, CA health, trust-bundle
        versions, config freshness, and mTLS handshake failures.
      tags: [Metrics]
      security: []
      responses:
        "200":
          description: Prometheus text exposition
          content:
            text/plain:
              schema:
                type: [string, "null"]
              example: |
                # HELP ferrum_requests_total Total number of requests processed
                # TYPE ferrum_requests_total counter
                ferrum_requests_total{proxy_id="my-api",method="GET",status_code="200"} 42

  /metrics/runtime:
    get:
      operationId: getRuntimeMetrics
      summary: Runtime host metrics (JSON)
      description: |
        Returns a JWT-authenticated JSON snapshot for "how is this host doing
        right now?": process CPU and memory, file descriptors, ephemeral-port
        pressure, HTTP status rates, error classes, DNS cache outcomes, pool
        churn, TCP resets, log-event counters, and the inline overload state.

        The response is cached briefly (default 1000 ms, configurable with
        `FERRUM_METRICS_RUNTIME_CACHE_MS`) because system metrics are sampled in
        the background. Log counters mirror tracing events allowed by
        `FERRUM_LOG_LEVEL` / `RUST_LOG`; the extra 1m/5m HTTP status windows
        can be disabled with `FERRUM_METRICS_STATUS_TRACKING_ENABLED=false`.
      tags: [Metrics]
      responses:
        "200":
          description: Runtime metrics snapshot
          headers:
            X-Cache:
              schema:
                type: string
                enum: [hit, miss]
              description: Whether this response was served from the runtime metrics cache
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeMetricsSnapshot"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Charges ────────────────────────────────────────────────────────
  /charges:
    get:
      operationId: getCharges
      summary: API chargeback data
      description: |
        Returns per-consumer API usage charges tracked by the `api_chargeback` plugin.
        Requires a valid admin JWT because chargeback output can contain
        customer and business data. Prometheus scrapes must supply
        `Authorization: Bearer <token>` credentials.
        Default format is Prometheus text exposition; use `?format=json` for JSON.

        **Multi-node deployments**: Each gateway node accumulates charges independently.
        In CP/DP topologies, scrape every DP node and aggregate externally.
      tags: [Metrics]
      parameters:
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [prometheus, json]
          description: |
            Output format. Default is Prometheus text exposition format.
            Use `json` for a structured JSON breakdown by consumer, proxy, and status code.
      responses:
        "200":
          description: Chargeback data
          content:
            text/plain:
              schema:
                type: [string, "null"]
              example: |
                # HELP ferrum_api_chargeable_calls_total Total chargeable HTTP-family API calls per consumer.
                # TYPE ferrum_api_chargeable_calls_total counter
                ferrum_api_chargeable_calls_total{consumer="alice",proxy_id="proxy-1",proxy_name="Payments API",status_code="200",namespace="ferrum"} 150000
                # HELP ferrum_api_charges_total Total per-call charges accumulated per consumer.
                # TYPE ferrum_api_charges_total counter
                ferrum_api_charges_total{consumer="alice",proxy_id="proxy-1",proxy_name="Payments API",status_code="200",currency="USD",namespace="ferrum"} 1.5000000000
                # HELP ferrum_api_bytes_sent_total Total bytes the gateway sent client->backend on this consumer's behalf.
                # TYPE ferrum_api_bytes_sent_total counter
                ferrum_api_bytes_sent_total{consumer="alice",proxy_id="proxy-1",proxy_name="Payments API",protocol_family="http",namespace="ferrum"} 4500000
                # HELP ferrum_api_bandwidth_charges_total Total bandwidth charges per consumer, split by direction.
                # TYPE ferrum_api_bandwidth_charges_total counter
                ferrum_api_bandwidth_charges_total{consumer="alice",proxy_id="proxy-1",proxy_name="Payments API",direction="received",currency="USD",protocol_family="http",namespace="ferrum"} 0.0900000000
                # HELP ferrum_api_stream_connections_total Total stream sessions (TCP/UDP/DTLS) per consumer.
                # TYPE ferrum_api_stream_connections_total counter
                ferrum_api_stream_connections_total{consumer="alice",proxy_id="tcp-edge",proxy_name="TCP Edge",namespace="ferrum"} 42
            application/json:
              schema:
                $ref: "#/components/schemas/ChargebackResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/metrics:
    get:
      operationId: getAdminMetrics
      summary: Comprehensive gateway runtime metrics (JSON)
      description: |
        Returns a comprehensive snapshot of the gateway's runtime state including
        request throughput, connection pool sizes, circuit breaker states, health
        check results, load balancer active connections, cache statistics, consumer
        index breakdowns, and rate limiter tracked keys.

        The response is cached for 5 seconds to avoid performance impact from
        frequent polling. The `X-Cache` response header indicates `hit` or `miss`.

        Designed for dashboards and monitoring integrations that need richer data
        than the Prometheus `/metrics` endpoint provides.
      tags: [Metrics]
      responses:
        "200":
          description: Runtime metrics snapshot
          headers:
            X-Cache:
              schema:
                type: string
                enum: [hit, miss]
              description: Whether this response was served from the 5-second cache
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMetrics"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Cluster Status ───────────────────────────────────────────────────
  /cluster:
    get:
      operationId: getClusterStatus
      summary: CP/DP cluster connection status
      description: |
        Returns live connection state for CP/DP deployments.

        **CP mode**: Lists all currently connected Data Plane nodes and
        Mesh nodes. Each entry includes `node_id`, `version`, `namespace`,
        `status`, `connected_at`, and `last_sync_at`. Disconnected nodes
        are automatically removed from their respective registries.

        **DP mode**: Shows the connection to the Control Plane — `url`,
        `status` (online/offline), `is_primary` (primary vs fallback CP),
        `connected_since`, and `last_config_received_at`.

        **Database/File modes**: Returns an informational message indicating
        cluster status is only meaningful in CP/DP modes.
      tags: [Monitoring]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cluster connection status
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ClusterStatusCp"
                  - $ref: "#/components/schemas/ClusterStatusDp"
                  - $ref: "#/components/schemas/ClusterStatusOther"
              examples:
                cp_mode:
                  summary: CP mode with two connected DPs and one mesh node
                  value:
                    mode: cp
                    connected_data_planes: 2
                    data_planes:
                      - node_id: "abc-123"
                        version: "0.9.0"
                        namespace: ferrum
                        status: online
                        connected_at: "2025-01-15T10:30:00Z"
                        last_sync_at: "2025-01-15T10:35:00Z"
                      - node_id: "def-456"
                        version: "0.9.0"
                        namespace: staging
                        status: online
                        connected_at: "2025-01-15T10:31:00Z"
                        last_sync_at: "2025-01-15T10:35:00Z"
                    connected_mesh_nodes: 1
                    mesh_nodes:
                      - node_id: "mesh-789"
                        version: "0.9.0"
                        namespace: ferrum
                        status: online
                        connected_at: "2025-01-15T10:32:00Z"
                        last_sync_at: "2025-01-15T10:35:00Z"
                dp_mode_online:
                  summary: DP connected to primary CP
                  value:
                    mode: dp
                    control_plane:
                      url: "http://cp-host:50051"
                      status: online
                      is_primary: true
                      connected_since: "2025-01-15T10:30:00Z"
                      last_config_received_at: "2025-01-15T10:35:00Z"
                dp_mode_offline:
                  summary: DP disconnected from CP
                  value:
                    mode: dp
                    control_plane:
                      url: "http://cp-host:50051"
                      status: offline
                      is_primary: true
                      connected_since: null
                      last_config_received_at: "2025-01-15T10:30:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Backend Capabilities ────────────────────────────────────────────
  /backend-capabilities:
    get:
      operationId: getBackendCapabilities
      summary: List cached backend protocol classifications
      description: |
        Returns every entry in the backend capability registry. Each
        entry describes what transports a particular upstream target
        supports — HTTP/1.1, HTTP/2 over TLS, HTTP/3, gRPC over h2 TLS,
        gRPC over h2c, and gateway-to-mesh HBONE — keyed by deduplicated
        target identity (scheme, host, port, `dns_override`, CA, mTLS cert,
        mTLS key, verify, plus HBONE sidecar port for targets tagged
        `mesh.hbone=true`).

        The registry drives the hot-path routing decision for plain
        HTTPS traffic (native H3 pool vs. direct H2 pool vs. reqwest
        fallback) without per-request probing. Entries are populated at
        startup, refreshed on `FERRUM_BACKEND_CAPABILITY_REFRESH_INTERVAL_SECS`
        (default 24h), and eagerly downgraded on live failures — see
        `docs/admin_api.md#backend-capability-registry` for the full model.

        The endpoint exposes **only** protocol classifications and probe
        timestamps — no credentials, payloads, or TLS private material.
      tags: [Backend Capabilities]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Registry snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackendCapabilitiesResponse"
              examples:
                h3_capable_plus_h1_only:
                  summary: Two backends — one h3-capable, one ALPN-downgraded to h1
                  value:
                    entries:
                      - key: "https|api.example.internal|443||/etc/ferrum/ca.pem|||1"
                        plain_http:
                          h1: supported
                          h2_tls: supported
                          h3: supported
                        grpc_transport:
                          h2_tls: supported
                          h2c: unknown
                        hbone: unsupported
                        last_probe_at_unix_secs: 1714003200
                        last_probe_error: null
                      - key: "https|legacy.example.internal|443||||0"
                        plain_http:
                          h1: supported
                          h2_tls: unsupported
                          h3: unsupported
                        grpc_transport:
                          h2_tls: unsupported
                          h2c: unknown
                        hbone: unknown
                        last_probe_at_unix_secs: 1714003200
                        last_probe_error: "H2/TLS downgraded after ALPN-negotiated HTTP/1.1 on request path"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Proxy state unavailable in this mode (e.g., CP without proxy serving)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /backend-capabilities/refresh:
    post:
      operationId: refreshBackendCapabilities
      summary: Force an immediate capability classification pass
      description: |
        Synchronously re-probes every HTTP-family backend in the current
        gateway config and replaces each registry entry with the new
        classification. Blocks until every probe completes, so callers
        can issue `GET /backend-capabilities` immediately afterward to
        observe the post-refresh state.

        Use cases:
        - Protocol rollouts (e.g., freshly enabled HTTP/3 on a fleet).
        - Recovery after a live downgrade (`mark_h3_unsupported`,
          `mark_h2_tls_unsupported`, `mark_hbone_unsupported`) once the
          backend or HBONE sidecar capability is healthy again.
        - Rotated TLS material that the previous probe didn't see.

        Probe parallelism is bounded by `FERRUM_POOL_WARMUP_CONCURRENCY`;
        per-probe timeout follows the proxy's `backend_connect_timeout_ms`
        (clamped to 5s). Request body is ignored.
      tags: [Backend Capabilities]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Refresh completed; registry now reflects the latest probe results
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    enum: [refreshed]
              example:
                status: refreshed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Proxy state unavailable in this mode
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  # ── Node-Waypoint identities (mesh NodeWaypoint topology) ───────────
  /node-waypoint/identities:
    get:
      operationId: getNodeWaypointIdentities
      summary: List currently enrolled node-waypoint pod identities
      description: |
        Returns the resolver's live snapshot of pod identities enrolled in
        the node-waypoint topology — keyed by Kubernetes pod UID with the
        workload SPIFFE ID, the eBPF-side SPIFFE hash, and the current
        IPv4 / IPv6 socket-cookie counts. Operators use this to answer
        "which pods is this waypoint actually serving?" without scraping
        eBPF maps.

        Returns `404 Not Found` when the node-waypoint resolver is not
        installed (non-mesh modes and mesh topologies other than
        `NodeWaypoint`). This avoids surfacing an empty stub list that
        could be mistaken for "no pods enrolled yet" on a sidecar /
        ambient / east-west / egress-gateway DP.

        Entries are sorted by `pod_uid` so polling produces deterministic
        output. The endpoint is cold-path; do not poll faster than a few
        times per second on a busy node.

        The payload exposes pod UIDs and SPIFFE IDs — scope JWT issuance
        accordingly even though no traffic bodies or credentials are
        included. See `docs/admin_api.md#node-waypoint-identities-mesh-nodewaypoint-topology`.
      tags: [Node-Waypoint]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Enrolled-identity snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeWaypointIdentitiesResponse"
              examples:
                two_pods_one_taking_traffic:
                  summary: Two enrolled pods; one has live cookies
                  value:
                    identity_count: 2
                    cookies:
                      orig_dst4: 17
                      orig_dst6: 0
                    identities:
                      - pod_uid: "11111111-1111-1111-1111-111111111111"
                        spiffe_id: "spiffe://cluster.local/ns/default/sa/api"
                        workload_spiffe_hash: 12345678901234567890
                        orig_dst4_cookies: 17
                        orig_dst6_cookies: 0
                        has_policy_scope: true
                      - pod_uid: "22222222-2222-2222-2222-222222222222"
                        spiffe_id: "spiffe://cluster.local/ns/default/sa/billing"
                        workload_spiffe_hash: 9876543210987654321
                        orig_dst4_cookies: 0
                        orig_dst6_cookies: 0
                        has_policy_scope: false
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Node-waypoint topology not enabled in this mode
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: "node-waypoint topology not enabled"
        "503":
          description: Proxy state unavailable in this mode (e.g., CP without proxy serving)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  # ── Service-Waypoint services (mesh ServiceWaypoint topology) ───────
  /service-waypoint/services:
    get:
      operationId: getServiceWaypointServices
      summary: List services admitted for this service-waypoint
      description: |
        Returns the installed mesh slice's resolved service binding for the
        current `ServiceWaypoint` topology. Operators use this to confirm
        which services a named GAMMA waypoint is actually serving after
        `FERRUM_MESH_WAYPOINT_NAME` and Gateway API `use-waypoint`
        labels or annotations have been projected by the control plane.

        Returns `404 Not Found` when service-waypoint topology is not
        active, when no mesh slice has been installed yet, or when the
        installed slice has no `waypoint_name`. The payload exposes service
        names, namespaces, ports, and workload counts, but no request bodies,
        credentials, or backend TLS material.
      tags: [Service-Waypoint]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Resolved service-waypoint binding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceWaypointServicesResponse"
              example:
                waypoint_name: api-waypoint
                namespace: default
                service_count: 2
                services:
                  - namespace: default
                    name: reviews
                    ports: [8080]
                    workload_count: 3
                  - namespace: default
                    name: ratings
                    ports: [8081]
                    workload_count: 1
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Service-waypoint topology not enabled or no mesh slice installed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              examples:
                topology_not_enabled:
                  value:
                    error: "service-waypoint topology not enabled"
                no_slice:
                  value:
                    error: "no mesh slice available yet"

  # ── Mesh service graph (mesh mode) ───────────────────────────────────
  /mesh/service-graph:
    get:
      operationId: getMeshServiceGraph
      summary: Inspect the live mesh service graph for this data plane
      description: |
        Returns a node-local source-workload to destination-workload graph
        aggregated from the auto-injected `workload_metrics` plugin. The
        endpoint exposes identity, workload, protocol, and RED-counter
        metadata only; request bodies, headers, and credentials are not stored.

        In CP/DP or horizontally scaled mesh deployments, query each data
        plane and aggregate externally.
      tags: [Mesh Observability]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Mesh service graph snapshot
          content:
            application/json:
              schema:
                type: object
                required: [generated_at_unix_ms, generated_at, edge_count, edges]
                properties:
                  generated_at_unix_ms:
                    type: integer
                    format: int64
                  generated_at:
                    type: string
                    format: date-time
                  edge_count:
                    type: integer
                    format: int64
                  edges:
                    type: array
                    items:
                      type: object
                      required:
                        - source_principal
                        - source_workload
                        - source_namespace
                        - source_app
                        - source_service
                        - destination_principal
                        - destination_workload
                        - destination_namespace
                        - destination_app
                        - destination_service
                        - request_protocol
                        - connection_security_policy
                        - requests_total
                        - errors_total
                        - duration_ms_total
                        - duration_ms_avg
                        - last_seen_unix_ms
                        - last_seen
                      properties:
                        source_principal:
                          type: string
                        source_workload:
                          type: string
                        source_namespace:
                          type: string
                        source_app:
                          type: string
                        source_service:
                          type: string
                        destination_principal:
                          type: string
                        destination_workload:
                          type: string
                        destination_namespace:
                          type: string
                        destination_app:
                          type: string
                        destination_service:
                          type: string
                        request_protocol:
                          type: string
                        connection_security_policy:
                          type: string
                        requests_total:
                          type: integer
                          format: int64
                        errors_total:
                          type: integer
                          format: int64
                        duration_ms_total:
                          type: number
                          format: double
                        duration_ms_avg:
                          type: number
                          format: double
                        last_seen_unix_ms:
                          type: integer
                          format: int64
                        last_seen:
                          type: string
                          format: date-time
              example:
                generated_at_unix_ms: 1779035400000
                generated_at: "2026-05-17T16:30:00Z"
                edge_count: 1
                edges:
                  - source_principal: "spiffe://cluster.local/ns/default/sa/frontend"
                    source_workload: "frontend"
                    source_namespace: "default"
                    source_app: "frontend"
                    source_service: "frontend"
                    destination_principal: "spiffe://cluster.local/ns/default/sa/reviews"
                    destination_workload: "reviews"
                    destination_namespace: "default"
                    destination_app: "reviews"
                    destination_service: "reviews"
                    request_protocol: "http"
                    connection_security_policy: "mutual_tls"
                    requests_total: 1250
                    errors_total: 3
                    duration_ms_total: 8420.5
                    duration_ms_avg: 6.7364
                    last_seen_unix_ms: 1779035398000
                    last_seen: "2026-05-17T16:29:58Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No active mesh service graph
          content:
            application/json:
              schema:
                type: object
              examples:
                no-active-mesh-service-graph:
                  value:
                    error: "No active mesh service graph"

  # ── Mesh egress scope (mesh mode) ────────────────────────────────────
  /mesh/egress-scope:
    get:
      operationId: getMeshEgressScope
      summary: Inspect the resolved Sidecar egress scope for this workload
      description: |
        Returns the current workload's resolved Sidecar egress scope, including
        admitted services, admitted service-entries, admitted destination-rules,
        the deduplicated `known_destinations` list used by the outbound
        registry, dry-run status, and admit/deny counts.

        The payload reveals mesh topology shape (service names, hosts, ports,
        FQDN aliases) — scope JWT issuance accordingly even though no traffic
        bodies or credentials are exposed.

        Returns `404 Not Found` when no mesh slice has been installed yet
        instead of fabricating counts from raw config; this is intentional so
        operators can distinguish pre-slice startup state from real scope.
      tags: [Mesh Egress Scope]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Active mesh egress scope
          content:
            application/json:
              schema:
                type: object
                required: [namespace, scope, health]
                properties:
                  namespace:
                    type: string
                  scope:
                    type: object
                  health:
                    type: object
                    properties:
                      sidecar_admitted_services:
                        type: integer
                        format: int64
                      sidecar_denied_services:
                        type: integer
                        format: int64
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No active mesh egress scope
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "503":
          description: Proxy state unavailable in this mode
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /mesh/egress-scope/test:
    post:
      operationId: testMeshEgressScopeCandidate
      summary: Dry-run a candidate destination against the current Sidecar egress scope
      description: |
        Tests whether a candidate destination is admitted by the current
        resolved Sidecar egress scope. Never mutates slice state.

        Useful to validate critical destinations before flipping
        `FERRUM_MESH_SIDECAR_ENFORCED=true` on the control plane.

        The handler memoises the `OutboundRegistry` against the installed
        snapshot so repeated admin calls reuse the same registry instance.
      tags: [Mesh Egress Scope]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [host]
              properties:
                host:
                  type: string
                  description: Destination host (FQDN or short name). Required, non-empty.
                port:
                  type: integer
                  minimum: 1
                  maximum: 65535
                  description: Optional destination port. When omitted, the registry tries any-port and host-only matches.
            example:
              host: reviews.alpha.svc.cluster.local
              port: 8080
      responses:
        "200":
          description: Decision computed
          content:
            application/json:
              schema:
                type: object
                required: [allowed, decision, host, dry_run]
                properties:
                  allowed:
                    type: boolean
                  decision:
                    type: string
                    enum: [admit, deny]
                  host:
                    type: string
                  port:
                    type: integer
                    nullable: true
                  dry_run:
                    type: boolean
        "400":
          description: Malformed JSON body, empty/missing host, or port 0
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No active mesh egress scope
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "503":
          description: Proxy state unavailable in this mode
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  # ── Batch ────────────────────────────────────────────────────────────
  /batch:
    parameters:
      - $ref: "#/components/parameters/XFerrumNamespace"
    post:
      operationId: batchCreate
      summary: Batch create resources
      description: |
        Creates multiple resources in a single request. Each resource type is
        persisted in a single database transaction, dramatically improving
        throughput compared to individual create calls.

        Resources are created in dependency order: consumers and upstreams
        first, then proxies, then plugin configs. This ensures referential
        integrity when plugins reference proxy IDs or consumer usernames.

        All fields within each resource follow the same schema as the
        individual create endpoints. IDs are auto-generated if omitted.
      tags: [Batch]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchCreateRequest"
      responses:
        "201":
          description: All resources created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchCreateResponse"
        "207":
          description: Partial success — some resource types failed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BatchCreateResponse"
                  - type: object
                    properties:
                      errors:
                        type: array
                        items:
                          type: string
                        description: Error messages for failed resource types
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ReadOnly"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  # ── Backup & Restore ────────────────────────────────────────────────
  /backup:
    parameters:
      - $ref: "#/components/parameters/XFerrumNamespace"
    get:
      operationId: backupConfig
      summary: Export full gateway configuration
      description: |
        Returns the complete gateway configuration as a single JSON document
        suitable for archival or later restoration via `POST /restore`.

        The output format is compatible with `POST /batch` (additive import)
        and `POST /restore` (full replacement). Consumer credentials are
        included **unredacted** since this is a backup endpoint.

        Falls back to the in-memory cached configuration when the database is
        unavailable, indicated by the `X-Data-Source: cached` response header.

        ### Size guidance

        The response is a single JSON document containing all requested
        resources. Typical sizes:

        | Deployment | Resources | Approx size |
        |------------|-----------|-------------|
        | Small | ~100 proxies, ~50 consumers | 100–200 KB |
        | Medium | ~1,000 proxies, ~500 consumers | 1–2 MB |
        | Large | ~5,000 proxies, ~3,000 consumers | 5–10 MB |
        | Very large | 10,000+ proxies, 5,000+ consumers | 15+ MB |

        For very large deployments, use the `resources` query parameter to
        back up individual resource types separately.
      tags: [Backup & Restore]
      parameters:
        - name: resources
          in: query
          required: false
          description: |
            Comma-separated list of resource types to include.
            Valid values: `proxies`, `consumers`, `plugin_configs`, `upstreams`.
            When omitted, all resource types are included.
          schema:
            type: string
            example: "proxies,upstreams"
      responses:
        "200":
          description: Full configuration backup
          headers:
            Content-Disposition:
              schema:
                type: string
                example: 'attachment; filename="ferrum-backup.json"'
            X-Data-Source:
              schema:
                type: string
                enum: [database, cached]
                description: Where the config was read from
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /restore:
    parameters:
      - $ref: "#/components/parameters/XFerrumNamespace"
    post:
      operationId: restoreConfig
      summary: Replace all configuration from a backup
      description: |
        **Destructive operation** — deletes ALL existing resources and imports
        the provided configuration. Requires `?confirm=true` query parameter
        to prevent accidental invocation.

        Accepts the same JSON format produced by `GET /backup`. Resources are
        imported in dependency order (consumers & upstreams first, then proxies,
        then plugin configs).

        To perform an additive (non-destructive) import, use `POST /batch`
        instead.

        ### Body size limit

        Default: **100 MiB** (supports ~30K proxies + 90K plugins).
        Configurable via the `FERRUM_ADMIN_RESTORE_MAX_BODY_SIZE_MIB`
        environment variable. Returns `413 Payload Too Large` when exceeded.

        Database inserts are chunked into 1,000-record transactions to keep
        WAL/redo size bounded. A 90K-plugin restore runs as 90 commits, not
        one massive transaction.

        For configurations exceeding the body limit, restore resource types
        separately using `POST /batch` with partial backup files
        (generated via `GET /backup?resources=proxies`, etc.).
      tags: [Backup & Restore]
      parameters:
        - name: confirm
          in: query
          required: true
          description: Must be `true` to confirm the destructive operation
          schema:
            type: boolean
            enum: [true]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestoreRequest"
      responses:
        "200":
          description: Configuration restored successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestoreResponse"
        "207":
          description: Partial success — some resource types failed during import
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/RestoreResponse"
                  - type: object
                    properties:
                      errors:
                        type: array
                        items:
                          type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ReadOnly"
        "413":
          description: Request body too large (default max 100 MiB, configurable via FERRUM_ADMIN_RESTORE_MAX_BODY_SIZE_MIB)
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  # ── Proxies ─────────────────────────────────────────────────────────
  /proxies:
    parameters:
      - $ref: "#/components/parameters/XFerrumNamespace"
    get:
      operationId: listProxies
      summary: List all proxies
      description: |
        Falls back to cached config when the database is unavailable.

        When `limit` or `offset` query parameters are provided, the response
        is wrapped in a paginated envelope with `data` and `pagination` fields.
        Without pagination parameters, a plain JSON array is returned for
        backward compatibility.
      tags: [Proxies]
      parameters:
        - $ref: "#/components/parameters/PaginationOffset"
        - $ref: "#/components/parameters/PaginationLimit"
      responses:
        "200":
          description: Array of proxy objects
          headers:
            X-Data-Source:
              $ref: "#/components/headers/X-Data-Source"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Proxy"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

    post:
      operationId: createProxy
      summary: Create a proxy
      description: |
        Creates a new proxy route. A UUID is generated when `id` is omitted or
        empty. `created_at` and `updated_at` are set automatically.
      tags: [Proxies]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProxyCreate"
      responses:
        "201":
          description: Proxy created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proxy"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ReadOnly"
        "409":
          description: Conflict — `listen_path` already exists, or stream proxy `listen_port` conflicts with another proxy, a gateway reserved port, or is not available on the host
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /proxies/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
      - $ref: "#/components/parameters/XFerrumNamespace"

    get:
      operationId: getProxy
      summary: Get a proxy
      tags: [Proxies]
      responses:
        "200":
          description: Proxy object
          headers:
            X-Data-Source:
              $ref: "#/components/headers/X-Data-Source"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proxy"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

    put:
      operationId: updateProxy
      summary: Update a proxy
      description: |
        Replaces the proxy with the given body. The `id` field in the body is
        ignored — the path parameter is authoritative. `updated_at` is set
        automatically.
      tags: [Proxies]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProxyCreate"
      responses:
        "200":
          description: Proxy updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proxy"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ReadOnly"
        "409":
          description: Conflict — `listen_path` already exists on another proxy, or stream proxy `listen_port` conflicts with another proxy, a gateway reserved port, or is not available on the host
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

    delete:
      operationId: deleteProxy
      summary: Delete a proxy
      tags: [Proxies]
      responses:
        "204":
          description: Proxy deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ReadOnly"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  # ── Consumers ───────────────────────────────────────────────────────
  /consumers:
    parameters:
      - $ref: "#/components/parameters/XFerrumNamespace"
    get:
      operationId: listConsumers
      summary: List all consumers
      description: |
        When `limit` or `offset` query parameters are provided, the response
        is wrapped in a paginated envelope. Without them, a plain JSON array
        is returned for backward compatibility.
      tags: [Consumers]
      parameters:
        - $ref: "#/components/parameters/PaginationOffset"
        - $ref: "#/components/parameters/PaginationLimit"
      responses:
        "200":
          description: Array of consumer objects
          headers:
            X-Data-Source:
              $ref: "#/components/headers/X-Data-Source"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Consumer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

    post:
      operationId: createConsumer
      summary: Create a consumer
      description: |
        Creates a new API consumer. A UUID is generated when `id` is omitted
        or empty. Plaintext `password` fields inside `basicauth` credentials
        are automatically HMAC-SHA256 hashed (using `FERRUM_BASIC_AUTH_HMAC_SECRET`)
        and stored as `password_hash`.
      tags: [Consumers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsumerCreate"
      responses:
        "201":
          description: Consumer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Consumer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ReadOnly"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /consumers/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
      - $ref: "#/components/parameters/XFerrumNamespace"

    get:
      operationId: getConsumer
      summary: Get a consumer
      tags: [Consumers]
      responses:
        "200":
          description: Consumer object
          headers:
            X-Data-Source:
              $ref: "#/components/headers/X-Data-Source"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Consumer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

    put:
      operationId: updateConsumer
      summary: Update a consumer
      tags: [Consumers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsumerCreate"
      responses:
        "200":
          description: Consumer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Consumer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ReadOnly"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

    delete:
      operationId: deleteConsumer
      summary: Delete a consumer
      tags: [Consumers]
      responses:
        "204":
          description: Consumer deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ReadOnly"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /consumers/{consumer_id}/credentials/{cred_type}:
    parameters:
      - name: consumer_id
        in: path
        required: true
        schema:
          type: [string, "null"]
        description: Consumer ID
      - name: cred_type
        in: path
        required: true
        schema:
          type: string
          enum: [keyauth, basicauth, jwt, hmac_auth, mtls_auth]
        description: |
          Credential type to set or remove.
      - $ref: "#/components/parameters/XFerrumNamespace"

    put:
      operationId: updateConsumerCredentials
      summary: Replace all credentials of a type
      description: |
        Replaces the entire credential value for the given type. Accepts a single
        JSON object or an array of objects. For `basicauth`, plaintext `password`
        fields are automatically hashed and stored as `password_hash`.
      tags: [Consumers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Credential payload (schema varies by credential type)
              examples:
                - username: alice
                  password: s3cret
                - key: my-api-key-value
      responses:
        "200":
          description: Credentials updated — returns full consumer object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Consumer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ReadOnly"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

    post:
      operationId: appendConsumerCredential
      summary: Append a credential entry for rotation
      description: |
        Appends a new credential entry to the given type, enabling zero-downtime
        credential rotation. If the existing credential is a single object, it is
        converted to an array. Max entries per type is controlled by
        `FERRUM_MAX_CREDENTIALS_PER_TYPE` (default: 2). For `basicauth`, plaintext
        `password` fields are automatically hashed.
      tags: [Consumers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Single credential entry to append (must be a JSON object)
      responses:
        "200":
          description: Credential appended — returns full consumer object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Consumer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ReadOnly"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

    delete:
      operationId: deleteConsumerCredentials
      summary: Remove all credentials of a type
      tags: [Consumers]
      responses:
        "204":
          description: Credential removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ReadOnly"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /consumers/{consumer_id}/credentials/{cred_type}/{index}:
    parameters:
      - name: consumer_id
        in: path
        required: true
        schema:
          type: string
        description: Consumer ID
      - name: cred_type
        in: path
        required: true
        schema:
          type: string
          enum: [keyauth, basicauth, jwt, hmac_auth, mtls_auth]
        description: Credential type (e.g. `keyauth`, `jwt`, `basicauth`).
      - name: index
        in: path
        required: true
        schema:
          type: integer
          minimum: 0
        description: Zero-based index of the credential entry to remove.
      - $ref: "#/components/parameters/XFerrumNamespace"
    delete:
      operationId: deleteConsumerCredentialByIndex
      summary: Remove a specific credential entry by index
      description: |
        Removes a single credential entry at the given index. When the array has
        one remaining element after removal, it is collapsed back to a single
        object. When a single-object credential exists, only index 0 is valid.
      tags: [Consumers]
      responses:
        "200":
          description: Credential entry removed — returns full consumer object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Consumer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ReadOnly"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  # ── Plugins ─────────────────────────────────────────────────────────
  /plugins:
    get:
      operationId: listAvailablePlugins
      summary: List available plugin types
      description: |
        Returns the names of all plugins that can be referenced from
        `plugin_configs.plugin_name`. The set includes every built-in plugin
        plus any custom plugins registered at build time via the
        `custom_plugins/` directory. Use this endpoint as the source of truth
        for valid `plugin_name` values; the example below is illustrative and
        may lag if new plugins are added in the running gateway. Internal
        reserved plugins (names prefixed with `__`, e.g. `__mesh_bpf_metrics`)
        are auto-injected by mesh mode and not directly configurable.
      tags: [Plugins]
      responses:
        "200":
          description: Array of plugin type names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: [string, "null"]
              example:
                - transaction_log_schema
                - stdout_logging
                - http_logging
                - tcp_logging
                - kafka_logging
                - ws_logging
                - transaction_debugger
                - jwks_auth
                - jwt_auth
                - key_auth
                - basic_auth
                - ldap_auth
                - hmac_auth
                - mtls_auth
                - spiffe_identity
                - mesh_authz
                - mesh_outbound_registry
                - compression
                - cors
                - access_control
                - tcp_connection_throttle
                - ip_restriction
                - bot_detection
                - correlation_id
                - request_transformer
                - response_transformer
                - mesh_route_dispatch
                - graphql
                - grpc_method_router
