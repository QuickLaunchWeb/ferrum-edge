  # ── API Specs ────────────────────────────────────────────────────────
  /api-specs:
    get:
      operationId: listApiSpecs
      summary: List API spec metadata
      description: |
        Returns paginated summary records for all API specs in the namespace.
        Spec content (the raw OpenAPI/Swagger document) is intentionally omitted
        from list responses — use `GET /api-specs/{id}` to retrieve the full
        document for a specific spec.

        Defaults to 50 items per page, maximum 200. Default sort is
        `updated_at DESC` (most recently updated first). Use `sort_by` and
        `order` to change ordering. Use `offset` to page through results.

        Supports the following optional filters: `proxy_id`, `spec_version`
        (prefix match), `title_contains` (case-insensitive substring),
        `updated_since` (ISO-8601 timestamp), and `has_tag` (exact tag name).

        This endpoint is available in database and CP modes. It returns 503 in
        DP and file modes where no database is present.
      tags: [API Specs]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Maximum number of items to return (max 200).
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of items to skip.
        - name: proxy_id
          in: query
          required: false
          schema:
            type: string
          description: Exact match on `proxy_id`. Returns only the spec that owns this proxy.
        - name: spec_version
          in: query
          required: false
          schema:
            type: string
          description: |
            Prefix match on `spec_version`. For example, `spec_version=3.1`
            matches `3.1.0`, `3.1.1`, etc.
        - name: title_contains
          in: query
          required: false
          schema:
            type: string
          description: Case-insensitive substring match on `title`.
        - name: updated_since
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: |
            Return only specs with `updated_at >= ?`. Accepts ISO-8601 /
            RFC-3339 format (e.g. `2026-04-01T00:00:00Z`).
        - name: has_tag
          in: query
          required: false
          schema:
            type: string
          description: |
            Exact tag membership filter. Returns only specs whose `tags` array
            contains this tag name.
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            enum: [updated_at, title, operation_count, created_at]
            default: updated_at
          description: |
            Column to sort results by. Allowed values: `updated_at` (default),
            `title`, `operation_count`, `created_at`. Any other value returns 400.
        - name: order
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: |
            Sort direction. `desc` (default) = largest/newest first; `asc` =
            smallest/oldest first. Any other value returns 400.
        - name: X-Ferrum-Namespace
          in: header
          required: false
          schema:
            type: string
          description: Namespace to operate in. Defaults to `FERRUM_NAMESPACE` when omitted.
      responses:
        "200":
          description: Paginated list of API spec summaries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSpecListResponse"
        "400":
          description: |
            Invalid query parameter — for example, an unknown `sort_by` value.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

    post:
      operationId: submitApiSpec
      summary: Submit an OpenAPI/Swagger spec bundle
      description: |
        Parses an OpenAPI 2.0 (Swagger), 3.0.x, 3.1.x, or 3.2.x specification
        document and atomically creates the embedded proxy, optional upstream,
        and proxy-scoped plugins as a single transactional bundle.

        The spec document must contain Ferrum extension fields at the root:

        - **`x-ferrum-proxy`** (required) — a `Proxy` object that defines the
          route, backend, and protocol settings. Fields follow the same schema
          as `POST /proxies`.
        - **`x-ferrum-upstream`** (optional) — an `Upstream` object. When
          present, a new upstream load-balancer group is created and the proxy's
          `upstream_id` is automatically linked to it.
        - **`x-ferrum-plugins`** (optional) — an array of proxy-scoped
          `PluginConfig` objects. All plugins must have `scope: proxy` (or
          omit `scope`, which defaults to `proxy`). Global and proxy-group
          scopes are rejected.

        **Forbidden**: `x-ferrum-consumers` is rejected — use `POST /consumers`
        separately. Plugin `config` values must not contain credential or
        consumer fields (`credentials`, `keyauth`, `basicauth`, `jwt`, `hmac`,
        `mtls`, `consumer`, `consumer_id`, `consumer_groups`, `consumers`).

        **Content-Type detection**: `application/json` → JSON parser;
        `application/yaml` / `application/x-yaml` / `text/yaml` → YAML parser;
        other or missing Content-Type → autodetect by first non-whitespace byte
        (`{` → JSON, else YAML).

        **Body size limit**: controlled by `FERRUM_ADMIN_SPEC_MAX_BODY_SIZE_MIB`
        (default 25 MiB). Returns 413 when exceeded.

        **Ownership**: all created resources are tagged with the new spec's ID
        via `api_spec_id`. A `UNIQUE(namespace, proxy_id)` constraint prevents
        more than one spec per proxy. Deleting the spec (`DELETE /api-specs/{id}`)
        also deletes the proxy (and its plugins via FK cascade) and any
        spec-owned upstream.

        **Hot-path isolation**: specs are admin-only metadata. The gateway
        runtime never reads `api_specs` rows; spec submission does not affect
        in-flight request handling.

        See [docs/api_specs.md](../docs/api_specs.md) for the full extension
        contract, worked examples, and curl recipes.
      tags: [API Specs]
      parameters:
        - name: X-Ferrum-Namespace
          in: header
          required: false
          schema:
            type: string
          description: Namespace to operate in. Defaults to `FERRUM_NAMESPACE` when omitted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: |
                Raw OpenAPI or Swagger document in JSON format. Must contain
                `x-ferrum-proxy` at the root. See description for the full
                extension contract.
            example:
              openapi: "3.1.0"
              info:
                title: Orders API
                version: "1.4.0"
              x-ferrum-proxy:
                id: orders-proxy
                hosts: ["api.example.com"]
                listen_path: /orders
                backend_host: orders.internal
                backend_port: 8080
                backend_scheme: https
          application/yaml:
            schema:
              type: string
              description: |
                Raw OpenAPI or Swagger document in YAML format. Must contain
                `x-ferrum-proxy` at the root. Also accepted as
                `application/x-yaml` or `text/yaml`.
          application/x-yaml:
            schema:
              type: string
          text/yaml:
            schema:
              type: string
      responses:
        "201":
          description: Spec accepted; proxy, upstream, and plugins created
          headers:
            Location:
              schema:
                type: string
              description: URL of the newly created spec (`/api-specs/{id}`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSpecCreateResponse"
        "400":
          description: |
            Spec document is structurally invalid (bad JSON/YAML, unrecognised
            OpenAPI/Swagger version, or missing/malformed `x-ferrum-*`
            extension). See `ApiSpecParseError.code` for which structural
            problem fired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSpecParseError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ReadOnly"
        "409":
          description: A spec already exists for this proxy ID, or a resource name / listen_path conflicts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          description: Request body exceeds `FERRUM_ADMIN_SPEC_MAX_BODY_SIZE_MIB` (default 25 MiB)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: |
            Spec parsed successfully but failed Ferrum policy or per-resource
            validation. Two body shapes are possible:

            - **`ApiSpecParseError`** when a Ferrum extension violates a
              semantic rule (`ConsumerExtensionNotAllowed`,
              `PluginInvalidScope`, `PluginProxyIdMismatch`,
              `PluginContainsCredentials`, `ProxyUpstreamIdMismatch`,
              `InvalidTagName`).
            - **`ApiSpecValidationError`** when one or more extracted
              resources (proxy / upstream / plugin) failed structural
              validation or database cross-checks (duplicate `listen_path`,
              invalid plugin config, missing referenced upstream, etc.).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ApiSpecValidationError"
                  - $ref: "#/components/schemas/ApiSpecParseError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api-specs/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: API spec UUID returned by `POST /api-specs`

    get:
      operationId: getApiSpec
      summary: Retrieve a spec by ID
      description: |
        Returns the raw spec document (decompressed from its gzip-compressed
        storage). The response body is the original spec document in the format
        that was submitted (JSON or YAML), subject to content negotiation via
        the `Accept` header.

        **Content negotiation**:
        - `Accept: application/json` when the stored format is YAML → converts
          to JSON before responding.
        - `Accept: application/yaml` (or `application/x-yaml`/`text/yaml`) when
          the stored format is JSON → converts to YAML before responding.
        - `Accept: */*` or matching stored format → responds in stored format.

        **Conditional GET** (`If-None-Match`): the response includes an `ETag`
        header set to the SHA-256 hex content hash of the uncompressed spec.
        Clients that send `If-None-Match: "<hash>"` receive `304 Not Modified`
        when the spec is unchanged, saving bandwidth on polling integrations.

        The spec content is served as-is — the gateway does not rewrite any
        Ferrum extension fields in the response.
      tags: [API Specs]
      parameters:
        - name: X-Ferrum-Namespace
          in: header
          required: false
          schema:
            type: string
          description: Namespace to operate in.
        - name: If-None-Match
          in: header
          required: false
          schema:
            type: string
          description: ETag from a previous response. Returns 304 if the spec is unchanged.
      responses:
        "200":
          description: Spec document
          headers:
            Content-Type:
              schema:
                type: string
                enum: [application/json, application/yaml]
            ETag:
              schema:
                type: string
              description: Quoted SHA-256 hex hash of the uncompressed spec content
            Cache-Control:
              schema:
                type: string
                enum: ["no-store"]
            X-Content-Type-Options:
              schema:
                type: string
                enum: [nosniff]
          content:
            application/json:
              schema:
                type: object
                description: The raw spec document (JSON format)
            application/yaml:
              schema:
                type: string
                description: The raw spec document (YAML format)
        "304":
          description: Spec unchanged — ETag matches `If-None-Match`
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

    put:
      operationId: replaceApiSpec
      summary: Replace an existing spec bundle
      description: |
        Parses the new spec document and atomically replaces all resources that
        were originally created by this spec (tagged with `api_spec_id = {id}`).

        **Replacement semantics**: spec-owned resources (those with a matching
        `api_spec_id`) are deleted and re-created from the new document.
        Resources that were added to the same proxy via direct admin endpoints
        (e.g., a plugin added with `POST /plugins/config`) have `api_spec_id =
        null` and survive the replace unchanged.

        The spec must reference the same proxy ID as the original submission.
        Changing the proxy ID requires deleting the spec (`DELETE /api-specs/{id}`)
        and submitting a new one (`POST /api-specs`).

        **Idempotent PUT (resource-hash short-circuit)**: At submit time, the
        gateway computes a SHA-256 hash over the serialised proxy, upstream, and
        plugin definitions (the "resource bundle"). If a PUT supplies a bundle
        that produces the same hash as the stored one — for example, when only
        `info.description` or other doc-only fields changed — the proxy, upstream,
        and plugin rows are left untouched. Their `updated_at` timestamps do NOT
        advance, and the polling cycle / DP gRPC broadcast sees no delta.
        The `api_specs` row is always updated (new `updated_at`, `content_hash`,
        and any changed metadata fields). This makes PUT safe to run on every
        CI/CD deploy cycle without causing unnecessary cache rebuilds.

        `created_at` is preserved from the original spec; `updated_at` and
        `content_hash` reflect the new document.

        The request body, content negotiation, and validation rules are identical
        to `POST /api-specs`.
      tags: [API Specs]
      parameters:
        - name: X-Ferrum-Namespace
          in: header
          required: false
          schema:
            type: string
          description: Namespace to operate in.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: New OpenAPI or Swagger document in JSON format
          application/yaml:
            schema:
              type: string
              description: New OpenAPI or Swagger document in YAML format
          application/x-yaml:
            schema:
              type: string
          text/yaml:
            schema:
              type: string
      responses:
        "200":
          description: Spec replaced; spec-owned resources recreated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSpecCreateResponse"
        "400":
          description: |
            New spec is structurally invalid (bad JSON/YAML, unrecognised
            OpenAPI/Swagger version, or missing/malformed `x-ferrum-*`
            extension). See `ApiSpecParseError.code` for which structural
            problem fired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSpecParseError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ReadOnly"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: A resource name / listen_path in the new spec conflicts with an existing resource outside this bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          description: Request body exceeds the configured size limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: |
            New spec parsed successfully but failed Ferrum policy or
            per-resource validation. Two body shapes are possible:

            - **`ApiSpecParseError`** when a Ferrum extension violates a
              semantic rule (`ConsumerExtensionNotAllowed`,
              `PluginInvalidScope`, `PluginProxyIdMismatch`,
              `PluginContainsCredentials`, `ProxyUpstreamIdMismatch`,
              `InvalidTagName`).
            - **`ApiSpecValidationError`** when one or more extracted
              resources failed structural validation or database
              cross-checks.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ApiSpecValidationError"
                  - $ref: "#/components/schemas/ApiSpecParseError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

    delete:
      operationId: deleteApiSpec
      summary: Delete a spec and cascade its owned resources
      description: |
        Deletes the API spec and cascades the deletion to all resources it owns:

        - **Proxy** (spec-owned, always present): deleted. Its proxy-scoped plugin
          configs are deleted by the database FK cascade, including both spec-owned
          plugins and any plugins added manually via `POST /plugins/config`.
        - **Upstream** (spec-owned, if present): deleted. Upstreams that were
          created manually outside the spec (`api_spec_id = null`) are not
          affected.
        - **Spec row**: deleted.

        The proxy is also deleted when `DELETE /proxies/{id}` is called directly —
        the database `ON DELETE CASCADE` constraint removes the spec row in that
        case too.

        Returns 204 on success, 404 if the spec does not exist.
      tags: [API Specs]
      parameters:
        - name: X-Ferrum-Namespace
          in: header
          required: false
          schema:
            type: string
          description: Namespace to operate in.
      responses:
        "204":
          description: Spec and spec-owned resources deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ReadOnly"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api-specs/by-proxy/{proxy_id}:
    parameters:
      - name: proxy_id
        in: path
        required: true
        schema:
          type: string
        description: Proxy ID to look up

    get:
      operationId: getApiSpecByProxy
      summary: Retrieve the spec for a given proxy
      description: |
        Looks up the API spec that owns the given proxy ID and returns its
        raw document with the same content-negotiation and conditional-GET
        (`ETag`/`If-None-Match`) semantics as `GET /api-specs/{id}`.

        Since the `(namespace, proxy_id)` pair is unique, this endpoint
        returns a single spec or 404 when no spec exists for the proxy.

        Useful when the proxy ID is known (e.g., from a CI/CD pipeline
        that created the proxy) but the spec UUID is not stored.
      tags: [API Specs]
      parameters:
        - name: X-Ferrum-Namespace
          in: header
          required: false
          schema:
            type: string
          description: Namespace to operate in.
        - name: If-None-Match
          in: header
          required: false
          schema:
            type: string
          description: ETag from a previous response. Returns 304 if the spec is unchanged.
      responses:
        "200":
          description: Spec document for the given proxy
          headers:
            ETag:
              schema:
                type: string
              description: Quoted SHA-256 hex content hash
            Cache-Control:
              schema:
                type: string
                enum: ["no-store"]
          content:
            application/json:
              schema:
                type: object
                description: The raw spec document (JSON format)
            application/yaml:
              schema:
                type: string
                description: The raw spec document (YAML format)
        "304":
          description: Spec unchanged — ETag matches `If-None-Match`
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

# ════════════════════════════════════════════════════════════════════════
components:
  # ── Security ────────────────────────────────────────────────────────
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        HS256-signed JWT. Configure the secret, issuer, and max TTL via
        environment variables:

        | Variable | Default | Description |
        |----------|---------|-------------|
        | `FERRUM_ADMIN_JWT_SECRET` | *(required)* | Signing key (minimum 32 characters) |
        | `FERRUM_ADMIN_JWT_ISSUER` | `ferrum-edge` | Expected `iss` claim |
        | `FERRUM_ADMIN_JWT_MAX_TTL` | `3600` | Max token lifetime (seconds) |

  # ── Reusable parameters ────────────────────────────────────────────
  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Resource UUID

    XFerrumNamespace:
      name: X-Ferrum-Namespace
      in: header
      required: false
      schema:
        type: string
        pattern: "^[a-zA-Z0-9][a-zA-Z0-9._-]*$"
        maxLength: 254
        default: ferrum
      description: |
        Scopes the request to a specific namespace. Defaults to `ferrum`.
        Must start with an alphanumeric character and contain only
        alphanumeric characters, dots, underscores, or hyphens (max 254
        chars) — same rules as resource IDs (see `validate_namespace` in
        `src/config/types.rs`).

        On write operations, this value overrides the `namespace` field in
        the request body (which is therefore effectively read-only on the
        wire). Resources from other namespaces are not visible to this
        request and uniqueness constraints apply per-namespace.

    PaginationOffset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
      description: |
        Number of items to skip. When provided (along with or without `limit`),
        the response switches from a plain JSON array to a paginated envelope
        containing `data` and `pagination` fields.

    PaginationLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 100
      description: |
        Maximum number of items to return (max 1000). When provided (along with
        or without `offset`), the response switches from a plain JSON array to
        a paginated envelope containing `data` and `pagination` fields.

  # ── Reusable headers ───────────────────────────────────────────────
  headers:
    X-Data-Source:
      description: |
        Present with value `cached` when the response was served from the
        in-memory config cache instead of the primary database.
      required: false
      schema:
        type: string
        enum: [cached]

  # ── Reusable responses ─────────────────────────────────────────────
  responses:
    BadRequest:
      description: Invalid request body
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ReadOnly:
      description: Admin API is in read-only mode
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: Admin API is in read-only mode
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Resource already exists or conflicts with an existing resource
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ServiceUnavailable:
      description: Database unavailable and no cached config
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  # ── Schemas ─────────────────────────────────────────────────────────
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: [string, "null"]
          description: Human-readable error message

    # ── Proxy ───────────────────────────────────────────────────────
    Proxy:
      type: object
      required:
        - backend_host
        - backend_port
      properties:
        id:
          type: [string, "null"]
          description: >-
            Unique identifier (UUID auto-generated if omitted or empty on create).
            Custom IDs must start with an alphanumeric character and contain only
            alphanumeric characters, dots, underscores, or hyphens (max 254 chars).
          pattern: "^[a-zA-Z0-9][a-zA-Z0-9._-]*$"
          maxLength: 254
        namespace:
          type: string
          default: ferrum
          readOnly: true
          pattern: "^[a-zA-Z0-9][a-zA-Z0-9._-]*$"
          maxLength: 254
          description: >-
            Namespace this proxy belongs to. Read-only on the wire — set from
            the `X-Ferrum-Namespace` request header (or the `ferrum` default)
            on every create/update; any value in the request body is ignored.
            See the API description for namespace semantics.
        name:
          type: [string, "null"]
          description: >-
            Optional friendly name. Must be unique across all proxies when set.
        listen_path:
          type: [string, "null"]
          description: >-
            URL path prefix, `=/exact-path`, or `~regex` this proxy matches.
            Must start with `/` for literal prefix matching, `=/` for exact
            whole-path matching, or `~` for regex matching
            (e.g., `~^/api/v[0-9]+$`). Regex patterns are compiled at creation
            time and auto-anchored with `^` and `$` for full-path matching if
            not already present. To allow sub-path matching, end the pattern
            with `.*` (e.g., `~/api/v[0-9]+/.*`).


            **Required for HTTP-family proxies UNLESS `hosts` is non-empty.** An
            HTTP proxy with neither `hosts` nor `listen_path` set is rejected —
            that would route every request on every host and collides with every
            other catch-all.


            **MUST be omitted / null for stream-family proxies** (`tcp`,
            `tcp_tls`, `udp`, `dtls`). Stream proxies route on `listen_port`.


            When `listen_path` is null on an HTTP proxy, the proxy matches any
            path under the configured `hosts`. `strip_listen_path` is a no-op
            (nothing to strip); `backend_path` (if set) prepends to the
            forwarded path.


            The combination of `(hosts, listen_path)` must be unique across all
            HTTP proxies in the same namespace.
          examples:
            - /api/v1
            - =/healthz
            - /users
            - "~/api/v[0-9]+/users/[^/]+"
        hosts:
          type: array
          items:
            type: string
          default: []
          description: >-
            Optional list of hostnames this proxy matches. Empty means match all
            hosts. Supports exact hostnames (`api.example.com`) and wildcard
            prefixes (`*.example.com`). Entries are normalized to lowercase on
            create/update. Must match the format `[a-z0-9]([a-z0-9.-]*[a-z0-9])?`
            for exact hosts or `*.[a-z0-9]([a-z0-9.-]*[a-z0-9])?` for wildcards.


            For HTTP-family proxies, either `hosts` or `listen_path` must be
            set (both may be set together). A host-only proxy (hosts set, no
            listen_path) matches any path under the configured hosts.
          examples:
            - ["api.example.com", "*.internal.example.com"]
        backend_scheme:
          oneOf:
            - $ref: "#/components/schemas/BackendScheme"
            - type: "null"
          nullable: true
          description: >-
            Wire-level scheme the proxy uses to talk to its backend.
            Optional for HTTP-family proxies — defaults to `https` when
            omitted. **Required for stream-family proxies** (`tcp`, `tcps`,
            `udp`, `dtls`); validation rejects stream proxies that omit it.

            gRPC and WebSocket are no longer schemes — they are detected
            per-request from the incoming traffic (content-type,
            Upgrade/Connection headers, HTTP/2 Extended CONNECT). A single
            `https` proxy transparently serves a mix of REST, gRPC, and
            WebSocket traffic on the same backend pool.

            HTTPS backends are classified at startup for HTTP/1.1,
            HTTP/2, and HTTP/3 support. Plain HTTP traffic uses the
            native H3 backend pool automatically when the concrete target
            is classified as H3-capable.


            **WebSocket requests arriving over HTTP/3** are supported via
            RFC 9220 Extended CONNECT (`:method=CONNECT`,
            `:protocol=websocket`). The H3 frontend bridges to an HTTP/1.1
            Upgrade backend connection — the same `connect_websocket_backend()`
            helper the H1/H2 frontends use — so the backend sees a normal
            HTTP/1.1 WebSocket regardless of the frontend transport.
            Same plugin pipeline (`on_ws_frame`, `on_ws_disconnect`,
            sticky-session cookies). Gated by
            `FERRUM_HTTP3_WEBSOCKET_ENABLED` (default `true`); when
            false the H3 server does not advertise
            `SETTINGS_ENABLE_CONNECT_PROTOCOL` and the bridge returns 501.
        backend_host:
          type: [string, "null"]
          description: >-
            Backend server hostname or IP. Required when `upstream_id` is not set.
            When `upstream_id` is set, this field is ignored (upstream targets
            provide the backend address).
        backend_port:
          type: integer
          format: uint16
          default: 0
          description: >-
            Backend server port. Required (>= 1) when `upstream_id` is not set.
            When `upstream_id` is set, this field is ignored (upstream targets
            provide the backend port).
        backend_path:
          type: [string, "null"]

          description: Optional path prefix prepended to forwarded requests
        strip_listen_path:
          type: boolean
          default: true
          description: >-
            Strip the matched `listen_path` prefix before forwarding to the
            backend. No-op when `listen_path` is null (host-only proxies have
            no prefix to strip).
        preserve_host_header:
          type: boolean
          default: false
          description: Forward the original Host header to the backend
        backend_connect_timeout_ms:
          type: integer
          format: uint64
          default: 5000
          description: TCP connect timeout in milliseconds
        backend_read_timeout_ms:
          type: integer
          format: uint64
          minimum: 0
          default: 30000
          description: Backend read timeout in milliseconds. For HTTP/gRPC proxies, this is the response timeout. For TCP proxies, this is a per-direction inactivity timeout on the backend read path. 0 = disabled.
        backend_write_timeout_ms:
          type: integer
          format: uint64
          minimum: 0
          default: 30000
          description: Backend write timeout in milliseconds. For TCP proxies, this is a per-direction inactivity timeout on the backend write path. 0 = disabled.
        backend_tls_client_cert_path:
          type: [string, "null"]
          maxLength: 4096
          description: Path to mTLS client certificate (PEM). Max 4096 characters.
        backend_tls_client_key_path:
          type: [string, "null"]
          maxLength: 4096
          description: Path to mTLS client private key (PEM). Max 4096 characters.
        backend_tls_verify_server_cert:
          type: boolean
          default: true
          description: Verify the backend's TLS certificate
        backend_tls_server_ca_cert_path:
          type: [string, "null"]
          maxLength: 4096
          description: Path to custom CA bundle for backend TLS verification. Max 4096 characters.
        dns_override:
          type: [string, "null"]

          description: Override DNS resolution with a specific IP address
        dns_cache_ttl_seconds:
          type: [integer, "null"]
          format: uint64
          description: DNS cache TTL override in seconds
        auth_mode:
          $ref: "#/components/schemas/AuthMode"
        plugins:
          type: array
          default: []
          items:
            $ref: "#/components/schemas/PluginAssociation"
          description: Plugin configurations applied to this proxy
        pool_idle_timeout_seconds:
          type: [integer, "null"]
          format: uint64
          description: Idle connection timeout in seconds (overrides global)
        pool_enable_http_keep_alive:
          type: [boolean, "null"]
          description: Enable HTTP keep-alive (overrides global)
        pool_enable_http2:
          type: [boolean, "null"]
          description: Enable HTTP/2 keep-alive PINGs (overrides global)
        pool_tcp_keepalive_seconds:
          type: [integer, "null"]
          format: uint64
          description: TCP keep-alive probe interval (overrides global)
        pool_http2_keep_alive_interval_seconds:
          type: [integer, "null"]
          format: uint64
          description: HTTP/2 PING interval in seconds (overrides global)
        pool_http2_keep_alive_timeout_seconds:
          type: [integer, "null"]
          format: uint64
          description: HTTP/2 PING timeout in seconds (overrides global)
        pool_http2_initial_stream_window_size:
          type: [integer, "null"]
          format: uint32
          minimum: 65535
          maximum: 134217728
          description: |
            HTTP/2 initial per-stream flow-control window size in bytes (overrides global).
            Larger values improve single-stream throughput. Range: 65535–134217728 (128 MiB). Default: 8388608 (8 MiB).
        pool_http2_initial_connection_window_size:
          type: [integer, "null"]
          format: uint32
          minimum: 65535
          maximum: 134217728
          description: |
            HTTP/2 initial connection-level flow-control window size in bytes (overrides global).
            Aggregate budget shared across all concurrent streams. Range: 65535–134217728 (128 MiB). Default: 33554432 (32 MiB).
        pool_http2_adaptive_window:
          type: [boolean, "null"]
          description: |
            Enable adaptive flow-control (BDP probing) for HTTP/2 connections (overrides global).
            Enabled by default — BDP probing dynamically sizes flow-control windows for optimal throughput. Default: true.
        pool_http2_max_frame_size:
          type: [integer, "null"]
          format: uint32
          minimum: 16384
          maximum: 1048576
          description: |
            Maximum HTTP/2 frame payload size in bytes (overrides global).
            Range: 16384–1048576 (1 MiB). Default: 1048576 (1 MiB).
        pool_http2_max_concurrent_streams:
          type: [integer, "null"]
          format: uint32
          minimum: 1
          description: |
            Maximum concurrent HTTP/2 streams per backend connection (overrides global).
            Must be at least 1. Default: 1000.
        pool_http3_connections_per_backend:
          type: [integer, "null"]
          minimum: 1
          maximum: 256
          description: |
            Number of QUIC connections per HTTP/3 backend (overrides global
            FERRUM_HTTP3_CONNECTIONS_PER_BACKEND). Multiple connections distribute
            QUIC frame processing across driver tasks. Range: 1–256. Default: 4.
        pool_max_requests_per_connection:
          type: [integer, "null"]
          format: uint64
          minimum: 1
          description: |
            Reserved for Istio DestinationRule
            `connectionPool.http.maxRequestsPerConnection`. The field is
            validated and persisted for schema compatibility, but currently has
            no runtime effect because reqwest/hyper do not expose a stable
            per-connection request cap for the shared client pool.
        upstream_id:
          type: [string, "null"]
          description: |
            Reference to an existing Upstream for load-balanced backends. When set,
            `backend_host` and `backend_port` are overridden by the selected
            upstream target. The referenced upstream must exist at creation time.
            Deleting an upstream that is referenced by a proxy is blocked.
        upstream_subset:
          type: [string, "null"]
          maxLength: 128
          description: |
            Named subset within `upstream_id` to route to. The subset must be
            defined in the referenced upstream's `subsets` list; invalid subset
            references are rejected during config/admin validation. Matching is
            exact: a target belongs to a subset when its `tags` contain every
            label in the subset selector with the same value.
        listen_port:
          type: [integer, "null"]
          format: uint16
          minimum: 1
          description: |
            Port for this TCP/UDP proxy to listen on (must be >= 1). Required when
            backend_scheme is tcp, tcps, udp, or dtls. Must NOT be set for HTTP
            proxies. Each stream proxy binds its own dedicated port; duplicate ports
            across stream proxies are rejected. In database mode, the Admin API also
            rejects ports that conflict with gateway reserved ports (proxy/admin/gRPC
            listeners) or are already bound on the host. In CP mode, local port
            checks are skipped since stream proxies run on remote DP nodes.
        frontend_tls:
          type: boolean
          default: false
          description: |
            Terminate encryption on the gateway side for incoming connections.
            For TCP: uses the gateway's TLS certificate.
            For UDP: uses DTLS with ECDSA P-256 or Ed25519 certificates
            (configured via FERRUM_DTLS_CERT_PATH/FERRUM_DTLS_KEY_PATH env vars).
        passthrough:
          type: boolean
          default: false
          description: |
            Forward encrypted client bytes directly to the backend without
            terminating TLS (TCP) or DTLS (UDP). The proxy peeks at the
            ClientHello to extract SNI for logging but does not decrypt traffic.
            Only valid for stream proxies (tcp, tcp_tls, udp, dtls).
            Mutually exclusive with frontend_tls.
        tcp_idle_timeout_seconds:
          type: integer
          format: uint64
          nullable: true
          description: |
            TCP stream idle timeout in seconds. After this duration of no data transfer
            in either direction, the connection is closed. When omitted, uses the global
            FERRUM_TCP_IDLE_TIMEOUT_SECONDS (default: 300s / 5 min). Set to 0 to disable.
            Only applicable for tcp/tcp_tls protocols.
        udp_idle_timeout_seconds:
          type: integer
          format: uint64
          default: 60
          description: |
            UDP session idle timeout in seconds. After this duration of inactivity,
            the UDP session mapping is removed. Only applicable for udp/dtls protocols.
        udp_max_response_amplification_factor:
          type: [number, "null"]
          format: float
          exclusiveMinimum: 0
          description: |
            Maximum allowed response amplification factor for UDP proxies.
            When set, backend→client datagrams are dropped if their size exceeds
            `last_request_size * factor`. Protects against UDP amplification
            attacks (e.g., spoofed-source reflection). When omitted (default),
            no per-datagram amplification cap is applied. Only applicable for
            `udp` / `dtls` proxies.
        allowed_methods:
          oneOf:
            - type: array
              items:
                type: string
                enum: [GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS, TRACE, CONNECT]
            - type: "null"
          default: null
          description: |
            Optional list of HTTP methods this proxy accepts. When null (default),
            all methods are allowed. When set, requests with methods not in the list
            receive 405 Method Not Allowed before any plugin processing.
        allowed_ws_origins:
          type: array
          items:
            type: string
          default: []
          description: |
            Optional list of allowed WebSocket Origin values (e.g., ["https://example.com"]).
            When non-empty, WebSocket upgrade requests must include an Origin header matching
            one of these values (case-insensitive comparison). Empty array (default) means
            no origin check. Protects against Cross-Site WebSocket Hijacking (CSWSH).

            WebSocket over HTTP/1.1 (`Upgrade: websocket`), HTTP/2
            (RFC 8441 Extended CONNECT), and HTTP/3 (RFC 9220 Extended
            CONNECT) are all supported and use the same Origin check.
            The H3 path is gated by `FERRUM_HTTP3_WEBSOCKET_ENABLED`
            (default `true`); see `docs/http3.md` for the H3-specific
            bridge architecture.
        circuit_breaker:
          oneOf:
            - $ref: "#/components/schemas/CircuitBreakerConfig"
            - type: "null"
          description: Optional circuit breaker configuration
        retry:
          oneOf:
            - $ref: "#/components/schemas/RetryConfig"
            - type: "null"
          description: Optional retry configuration
        response_body_mode:
          type: string
          enum: [stream, buffer]
          default: stream
          description: |
            Response body handling mode.

            - `stream` (default): Passes response bytes through as they arrive for
              lower latency and memory usage. If any plugin attached to this proxy
              requires response body buffering (e.g., response_transformer), the
              gateway automatically buffers regardless of this setting.
            - `buffer`: Always buffers the full response body before running
              after-proxy plugins, even if no plugin requires it. Use this when you
              need to guarantee the complete body is available for inspection.
        api_spec_id:
          type: [string, "null"]
          description: |
            ID of the `ApiSpec` that created this proxy via the spec-import admin
            API (`POST /api-specs`). `null` for proxies created via direct admin
            endpoints (`POST /proxies`). When set, the proxy participates in
            spec-level ownership: `PUT /api-specs/{id}` replaces this proxy as part
            of the bundle, and `DELETE /api-specs/{id}` deletes this proxy (and
            its plugins via FK cascade).
        created_at:
          type: [string, "null"]
          format: date-time
          description: Creation timestamp (set by server)
        updated_at:
          type: [string, "null"]
          format: date-time
          description: Last modification timestamp (set by server)

    ProxyCreate:
      description: |
        Request body for creating or updating a proxy. Same schema as Proxy
        but `id`, `created_at`, and `updated_at` are optional (server-managed).

        **Validation rules** (enforced at admin API + file/DB load time):
        - HTTP-family proxies: at least one of `hosts` or `listen_path` must
          be set. A proxy with neither is rejected (400).
        - Stream-family proxies (`tcp`/`tcps`/`udp`/`dtls`): `listen_path`
          MUST be null/omitted, and `listen_port` MUST be set,
          and `backend_scheme` MUST be set explicitly.
        - Unknown fields are rejected. Backend H3 selection is runtime
          capability-driven for `Https` backends — there is no scheme for it.
      allOf:
        - $ref: "#/components/schemas/Proxy"
      required:
        - backend_host
        - backend_port

    BackendScheme:
      type: string
      enum: [http, https, tcp, tcps, udp, dtls]
      description: |
        Wire-level scheme a proxy uses to talk to its backend.

        **HTTP family** (`http`, `https`) covers HTTP/1.1, HTTP/2, HTTP/3,
        gRPC, and WebSocket. Which of those is actually spoken is
        determined per-request (content-type, Upgrade/Connection headers,
        HTTP/2 Extended CONNECT) — it is **never pinned in config**.
        A single `https` proxy transparently serves a mix of REST, gRPC,
        and WebSocket traffic on the same backend pool. Backend HTTP/3 is
        selected automatically for plain HTTP traffic when the concrete
        backend target is classified as H3-capable.

        **Stream family** (`tcp`, `tcps`, `udp`, `dtls`) are raw L4
        proxies selected by `listen_port`. `tcps` follows the
        `http`/`https`, `ws`/`wss` convention (previously spelled
        `tcp_tls`). `dtls` encrypts UDP datagrams to the backend using
        DTLS 1.2/1.3 (ECDSA P-256/P-384 keys only, version
        auto-negotiated).

        **Legacy note**: In earlier releases this was the 11-variant
        `BackendProtocol` enum including `ws`/`wss`/`grpc`/`grpcs`/`h3`
        plus `tcp_tls`. These are no longer accepted on the admin API —
        use `backend_scheme` instead.

    AuthMode:
      type: string
      enum: [single, multi]
      default: single
      description: |
        `single` — first successful auth plugin wins.
        `multi` — all auth plugins run; no single rejection blocks the request.

    PluginAssociation:
      type: object
      required: [plugin_config_id]
      properties:
        plugin_config_id:
          type: [string, "null"]
          description: ID of the PluginConfig to apply to this proxy

    # ── Consumer ────────────────────────────────────────────────────
    Consumer:
      type: object
      required: [username]
      properties:
        id:
          type: [string, "null"]
          description: >-
            Unique identifier (UUID auto-generated if omitted or empty on create).
            Custom IDs must start with an alphanumeric character and contain only
            alphanumeric characters, dots, underscores, or hyphens (max 254 chars).
          pattern: "^[a-zA-Z0-9][a-zA-Z0-9._-]*$"
          maxLength: 254
        namespace:
          type: string
          default: ferrum
          readOnly: true
          pattern: "^[a-zA-Z0-9][a-zA-Z0-9._-]*$"
          maxLength: 254
          description: >-
            Namespace this consumer belongs to. Read-only on the wire — set
            from the `X-Ferrum-Namespace` request header (or the `ferrum`
            default) on every create/update; any value in the request body
            is ignored.
        username:
          type: [string, "null"]
          minLength: 1
          description: >-
            Unique consumer username (must be non-empty). Used as the lookup key
            for basic_auth authentication. Must be unique across all consumers.
        custom_id:
          type: [string, "null"]
          description: >-
            Optional external identifier. Must be unique across all consumers when
            set. Empty strings are normalized to null. Must not collide with another
            consumer's username (this would cause incorrect JWKS/JWT authentication).
        credentials:
          type: object
          default: {}
          description: |
            Map of credential type to credential payload. Each type maps to either
            a single JSON object or an array of objects (for zero-downtime rotation).
            Array elements must be JSON objects — non-object elements are rejected.
            Credential values that serve as lookup keys must be unique across all
            consumers and across all entries within arrays. Max entries per type is
            controlled by `FERRUM_MAX_CREDENTIALS_PER_TYPE` (default: 2).
          properties:
            keyauth:
              oneOf:
                - $ref: "#/components/schemas/KeyAuthCredential"
                - type: array
                  items:
                    $ref: "#/components/schemas/KeyAuthCredential"
                  minItems: 1
                  description: Multiple API key entries for zero-downtime rotation
              description: "API key credential(s). Each `key` must be globally unique."
            basicauth:
              oneOf:
                - $ref: "#/components/schemas/BasicAuthCredential"
                - type: array
                  items:
                    $ref: "#/components/schemas/BasicAuthCredential"
                  minItems: 1
                  description: Multiple basic auth entries for zero-downtime rotation
              description: "Basic auth credential(s). Indexed by consumer `username`."
            jwt:
              oneOf:
                - $ref: "#/components/schemas/JwtCredential"
                - type: array
                  items:
                    $ref: "#/components/schemas/JwtCredential"
                  minItems: 1
                  description: Multiple JWT secrets for zero-downtime rotation
              description: "JWT credential(s). Secret must be at least 32 characters. Looked up by `username`, `id`, or `custom_id`; all secrets tried."
            hmac_auth:
              oneOf:
                - $ref: "#/components/schemas/HmacAuthCredential"
                - type: array
                  items:
                    $ref: "#/components/schemas/HmacAuthCredential"
                  minItems: 1
                  description: Multiple HMAC secrets for zero-downtime rotation
              description: "HMAC auth credential(s). Looked up by username in Authorization header; all secrets tried."
            mtls_auth:
              oneOf:
                - $ref: "#/components/schemas/MtlsAuthCredential"
                - type: array
                  items:
                    $ref: "#/components/schemas/MtlsAuthCredential"
                  minItems: 1
                  description: Multiple mTLS identities for zero-downtime rotation
              description: "mTLS auth credential(s). Each `identity` must be globally unique."
          additionalProperties:
            oneOf:
              - type: object
              - type: array
                items:
                  type: object
                minItems: 1
        acl_groups:
          type: array
          items:
            type: string
            maxLength: 255
          default: []
          maxItems: 500
          description: >-
            ACL group memberships for group-based access control. The
            `access_control` plugin can allow/deny by group instead of (or in
            addition to) individual consumer usernames. A consumer can belong to
            up to 500 groups.
        created_at:
          type: [string, "null"]
          format: date-time
        updated_at:
          type: [string, "null"]
          format: date-time

    ConsumerCreate:
      description: Request body for creating or updating a consumer.
      allOf:
        - $ref: "#/components/schemas/Consumer"
      required:
        - username

    # ── Consumer Credential Types ──────────────────────────────────

    KeyAuthCredential:
      type: object
      required: [key]
      properties:
        key:
          type: string
          description: >-
            API key value. Must be globally unique across all consumers.
      description: "API key credential for the `key_auth` authentication plugin."

    BasicAuthCredential:
      type: object
      properties:
        password:
          type: string
          writeOnly: true
          description: >-
            Plaintext password (automatically hashed on write using HMAC-SHA256
            with the server secret `FERRUM_BASIC_AUTH_HMAC_SECRET`). Mutually
            exclusive with `password_hash`.
        password_hash:
          type: string
          description: >-
            Pre-hashed password in `hmac_sha256:<hex>` format (constant-time,
            ~1μs). On read, this field is always returned instead of `password`.
      description: >-
        Basic auth credential for the `basic_auth` plugin. Supply either
        `password` (auto-hashed) or `password_hash` (pre-hashed). Indexed by
        the consumer's `username`.

    JwtCredential:
      type: object
      required: [secret]
      properties:
        secret:
          type: string
          minLength: 32
          writeOnly: true
          description: >-
            JWT signing secret used to verify token signatures (HS256) for this
            consumer. Must be at least 32 characters.
      description: >-
        JWT credential for the `jwt_auth` plugin. Uses HS256 algorithm only.
        Consumer is looked up by `username`, `id`, or `custom_id` from the JWT
        claim; then all secrets are tried until one verifies the signature.

    HmacAuthCredential:
      type: object
      required: [secret]
      properties:
        secret:
          type: string
          writeOnly: true
          description: >-
            Shared secret for HMAC signature computation and verification.
      description: >-
        HMAC auth credential for the `hmac_auth` plugin. Consumer is looked up
        by username in the Authorization header; all secrets are tried until one
        verifies the signature.

    MtlsAuthCredential:
      type: object
      required: [identity]
      properties:
        identity:
          type: string
          description: >-
            Certificate field value to match against the client certificate
            (e.g., CN, SAN DNS name, fingerprint, or serial). The field
            extracted from the cert is configured on the `mtls_auth` plugin via
            `identity_source`. Must be globally unique across all consumers.
      description: >-
        mTLS auth credential for the `mtls_auth` plugin. Indexed for O(1)
        lookup by certificate identity.

    # ── Plugin Config ───────────────────────────────────────────────
    PluginConfig:
      type: object
      required: [plugin_name, scope, enabled]
      properties:
        id:
          type: [string, "null"]
          description: >-
            Unique identifier (UUID auto-generated if omitted or empty on create).
            Custom IDs must start with an alphanumeric character and contain only
            alphanumeric characters, dots, underscores, or hyphens (max 254 chars).
          pattern: "^[a-zA-Z0-9][a-zA-Z0-9._-]*$"
          maxLength: 254
        namespace:
          type: string
          default: ferrum
          readOnly: true
          pattern: "^[a-zA-Z0-9][a-zA-Z0-9._-]*$"
          maxLength: 254
          description: >-
            Namespace this plugin config belongs to. Read-only on the wire —
            set from the `X-Ferrum-Namespace` request header (or the `ferrum`
            default) on every create/update; any value in the request body
            is ignored.
        plugin_name:
          type: [string, "null"]
          description: >-
            Plugin type name. Must be one of the available built-in plugins
            (e.g., key_auth, rate_limiting, cors, stdout_logging). Use
            `GET /plugins` to discover available plugin names.
        config:
          type: object
          default: {}
          description: >-
            Plugin-specific JSON configuration. Validated on create/update and
            again when the plugin is instantiated at config reload time.
            Security plugins (key_auth, basic_auth, jwt_auth, jwks_auth,
            hmac_auth, ldap_auth, mtls_auth, access_control,
            tcp_connection_throttle, ip_restriction, mesh_authz,
            mesh_outbound_registry) are validation-fatal: invalid config blocks
            gateway startup in file mode, and on DB/CP polling the new config
            snapshot is rejected as a whole (the gateway keeps serving the
            prior good config). Non-security plugins with invalid config are
            logged and skipped instead. See
            `PluginConfigs` section for per-plugin schema definitions.
        scope:
          $ref: "#/components/schemas/PluginScope"
        proxy_id:
          type: [string, "null"]
          description: >-
            Required when scope is `proxy` — must reference an existing proxy ID.
            Must be null (or omitted) when scope is `global` or `proxy_group`.
            The referenced proxy must exist. When a proxy is deleted, its
            proxy-scoped plugin configs are automatically deleted (cascade).
            Proxy-group-scoped plugins survive proxy deletion — only the
            association is removed.
        enabled:
          type: boolean
          default: true
        priority_override:
          type: [integer, "null"]
          minimum: 0
          maximum: 10000
          description: >-
            Optional execution priority override. When set, replaces the plugin's
            built-in priority constant. Lower values execute first. Useful when
            multiple instances of the same plugin type are attached to a proxy
            (e.g., two http_logging instances shipping to Splunk and Datadog).
            When null (default), the plugin uses its built-in priority.
        api_spec_id:
          type: [string, "null"]
          description: |
            ID of the `ApiSpec` that created this plugin via the spec-import admin
            API (`POST /api-specs`). `null` for plugins created via direct admin
            endpoints (`POST /plugins/config`). When set, `PUT /api-specs/{id}`
            replaces this plugin as part of the bundle.
        created_at:
          type: [string, "null"]
          format: date-time
        updated_at:
          type: [string, "null"]
          format: date-time

    PluginConfigCreate:
      description: Request body for creating or updating a plugin configuration.
      allOf:
        - $ref: "#/components/schemas/PluginConfig"
      required:
        - plugin_name
        - scope

    PluginScope:
      type: string
      enum: [global, proxy, proxy_group]
      description: |
        `global` — plugin applies to all proxies; `proxy_id` must be null.
        `proxy` — plugin applies only to the proxy referenced by `proxy_id`;
        `proxy_id` is required.
        `proxy_group` — plugin applies to a subset of proxies that reference it
        in their `plugins` association list; `proxy_id` must be null. A single
        shared plugin instance is used across all associated proxies, so stateful
        plugins (e.g., rate_limiting) share counters across the group.

    # ── WebSocket Plugin Configs ─────────────────────────────────────
    WsMessageSizeLimitingConfig:
      type: object
      description: |
        Configuration for the `ws_message_size_limiting` plugin. Enforces a
        maximum frame payload size on WebSocket connections. Frames exceeding
        the limit trigger a close frame (RFC 6455 close code 1009 — Message
        Too Big) sent to both client and backend.
      required:
        - max_frame_bytes
      properties:
        max_frame_bytes:
          type: integer
          format: uint64
          minimum: 1
          description: >-
            Maximum frame payload size in bytes. Required and must be greater
            than zero — the plugin rejects configs with `max_frame_bytes` of 0
            at config load time. Applied to Text, Binary, Ping, and Pong frames
            in both directions; Close frames bypass the size check. Note that
            Ping/Pong are RFC 6455 control frames capped at 125 bytes by the
            protocol itself, so values below 125 will close the connection on
            heartbeat traffic.
        close_reason:
          type: string
          default: "Message too large"
          description: >-
            Close frame reason text sent when a frame exceeds the limit. Truncated
            to 123 UTF-8 bytes (the WebSocket protocol close-frame reason limit)
            on a UTF-8 char boundary.

    WsFrameLoggingConfig:
      type: object
      description: |
        Configuration for the `ws_frame_logging` plugin. Logs WebSocket frame
        metadata (direction, frame type, payload size, optional preview) under
        the `ws_frame_log` tracing target. Logs Text and Binary frames by
        default; Ping/Pong are opt-in via `log_ping_pong`. The plugin never
        transforms or drops frames — it is purely observational.
      properties:
        log_level:
          type: string
          enum: [trace, debug, info]
          default: info
          description: >-
            Tracing level for frame log output. Case-sensitive; unknown values
            (e.g., `"warn"`, `"INFO"`) are rejected at config load time.
        include_payload_preview:
          type: boolean
          default: false
          description: Include a payload preview in log output.
        payload_preview_bytes:
          type: integer
          default: 128
          maximum: 65536
          description: >-
            Maximum number of bytes to include in the payload preview. Clamped
            to 65 536 to prevent excessive allocations for binary hex previews.
            Only applies when `include_payload_preview` is true.
        log_ping_pong:
          type: boolean
          default: false
          description: Whether to log ping/pong frames in addition to text/binary frames.

    WsRateLimitingConfig:
      type: object
      description: |
        Configuration for the `ws_rate_limiting` plugin. Enforces per-connection
        frame rate limiting using a token-bucket algorithm. When the bucket is
        exhausted, the plugin sends a WebSocket close frame (RFC 6455 close code
        1008 — Policy Violation) to both client and backend. Both directions
        (client→backend and backend→client) consume from the same per-connection
        bucket. Supports centralized Redis-backed mode for cross-instance
        coordination of frame counters.
      properties:
        frames_per_second:
          type: integer
          format: uint64
          default: 100
          minimum: 1
          description: >-
            Token refill rate per second. Must be greater than zero — configs
            with `frames_per_second: 0` are rejected at config load time.
        burst_size:
          type: integer
          format: uint64
          description: >-
            Maximum burst capacity (tokens). Defaults to the value of
            `frames_per_second` when not explicitly set. A value of `0` causes
            the bucket to start empty and reject every frame.
        close_reason:
          type: string
          default: "Frame rate exceeded"
          description: >-
            Close-frame reason text sent when the frame rate is exceeded.
            Truncated on a UTF-8 char boundary to 123 bytes (the RFC 6455 §5.5
            control-frame payload limit) so the frame stays well-formed.
        sync_mode:
          type: string
          enum: [local, redis]
          default: local
          description: "Frame counter storage: 'local' (in-memory) or 'redis' (centralized). Any RESP-compatible server works."
        redis_url:
          type: string
          description: "Redis connection URL. Required when sync_mode is 'redis'."
        redis_tls:
          type: boolean
          default: false
          description: "Enable TLS for the Redis connection. CA verification uses gateway-level FERRUM_TLS_CA_BUNDLE_PATH; skip-verify uses FERRUM_TLS_NO_VERIFY."
        redis_key_prefix:
          type: string
          default: "ferrum:ws_rate_limiting"
          description: Key prefix for all Redis keys
        redis_pool_size:
          type: integer
          default: 4
          description: Number of multiplexed Redis connections
        redis_username:
          type: string
          description: Redis username for ACL authentication
        redis_password:
          type: string
          description: Redis password
        redis_connect_timeout_seconds:
          type: integer
          default: 5
          description: Redis connection timeout in seconds
        redis_health_check_interval_seconds:
          type: integer
          default: 5
          description: Health check ping interval when Redis is unavailable

    UdpRateLimitingConfig:
      type: object
      description: |
        Configuration for the `udp_rate_limiting` plugin. Rate limits UDP
        datagrams per resolved client IP using a fixed-window algorithm with
        atomic counters. Excess datagrams are silently dropped (standard UDP
        flood mitigation). Operates on both client→backend and backend→client
        datagrams within the same window per client IP.
      anyOf:
        - required: [datagrams_per_second]
        - required: [bytes_per_second]
      properties:
        datagrams_per_second:
          type: integer
          format: uint64
          description: >-
            Maximum datagrams per `window_seconds`. At least one of
            `datagrams_per_second` or `bytes_per_second` is required.
        bytes_per_second:
          type: integer
          format: uint64
          description: >-
            Maximum bytes per `window_seconds` (sum of datagram payload sizes).
            At least one of `datagrams_per_second` or `bytes_per_second` is
            required.
        window_seconds:
          type: integer
          format: uint64
          default: 1
          minimum: 1
          description: >-
            Window length in seconds. Defaults to 1 second. The effective
            per-window cap is `datagrams_per_second × window_seconds` (and
            similarly for bytes).

    # ── Circuit Breaker ─────────────────────────────────────────────
    CircuitBreakerConfig:
      type: object
      properties:
        failure_threshold:
          type: integer
          format: uint32
          default: 5
          description: Consecutive failures to trip the circuit open
        success_threshold:
          type: integer
          format: uint32
          default: 3
          description: Consecutive successes in half-open to close the circuit
        timeout_seconds:
          type: integer
          format: uint64
          default: 30
          description: Seconds to wait in open state before transitioning to half-open
        failure_status_codes:
          type: array
          items:
            type: integer
            format: uint16
          default: [500, 502, 503, 504]
          description: HTTP status codes that count as failures
        half_open_max_requests:
          type: integer
          format: uint32
          default: 1
          description: Maximum concurrent probe requests allowed in half-open state
        trip_on_connection_errors:
          type: boolean
          default: true
          description: >
            Whether connection-level errors (TCP refused, DNS failure, TLS handshake
            error, connect timeout) count as circuit breaker failures independently
            of failure_status_codes. When true (default), connection errors always
            trip the breaker. When false, only real HTTP response status codes in
            failure_status_codes are counted.

    # ── Retry ───────────────────────────────────────────────────────
    RetryConfig:
      type: object
      properties:
        max_retries:
          type: integer
          format: uint32
          default: 3
          description: Maximum retry attempts
        retryable_status_codes:
          type: array
          items:
            type: integer
            format: uint16
          default: [502, 503, 504]
          description: HTTP status codes eligible for retry
        retryable_methods:
          type: array
          items:
            type: string
            enum: [GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS, TRACE, CONNECT]
          maxItems: 9
          default: [GET, HEAD, OPTIONS, PUT, DELETE]
          description: HTTP methods eligible for retry. Must be valid HTTP methods.
        backoff:
          $ref: "#/components/schemas/BackoffStrategy"
        retry_on_connect_failure:
          type: boolean
          default: true
          description: |
            Retry on TCP-level failures (connect refused, DNS failure, TLS
            error, timeout) independently of `retryable_status_codes`.

    BackoffStrategy:
      description: Retry delay strategy
      oneOf:
        - type: object
          title: Fixed delay
          required: [fixed]
          properties:
            fixed:
              type: object
              required: [delay_ms]
              properties:
                delay_ms:
                  type: integer
                  format: uint64
                  default: 100
                  description: Fixed delay between retries in milliseconds
        - type: object
          title: Exponential backoff
          required: [exponential]
          properties:
            exponential:
              type: object
              required: [base_ms, max_ms]
              properties:
                base_ms:
                  type: integer
                  format: uint64
                  description: Base delay in milliseconds (doubled each attempt)
                max_ms:
                  type: integer
                  format: uint64
                  description: Maximum delay cap in milliseconds
      default:
        fixed:
          delay_ms: 100

    # ── Upstream / Load Balancing ────────────────────────────────────
    UpstreamCreate:
      description: |
        Request body for creating or updating an upstream. Same schema as
        Upstream but `id`, `created_at`, and `updated_at` are optional
        (server-managed).
      allOf:
        - $ref: "#/components/schemas/Upstream"
      required:
        - targets

    Upstream:
      type: object
      required: [targets]
      properties:
        id:
          type: [string, "null"]
          description: >-
            Unique identifier (UUID auto-generated if omitted or empty on create).
            Custom IDs must start with an alphanumeric character and contain only
            alphanumeric characters, dots, underscores, or hyphens (max 254 chars).
          pattern: "^[a-zA-Z0-9][a-zA-Z0-9._-]*$"
          maxLength: 254
        namespace:
          type: string
          default: ferrum
          readOnly: true
          pattern: "^[a-zA-Z0-9][a-zA-Z0-9._-]*$"
          maxLength: 254
          description: >-
            Namespace this upstream belongs to. Read-only on the wire — set
            from the `X-Ferrum-Namespace` request header (or the `ferrum`
            default) on every create/update; any value in the request body
            is ignored.
        name:
          type: [string, "null"]
          description: >-
            Optional friendly name. Must be unique across all upstreams when set.
        targets:
          type: array
          items:
            $ref: "#/components/schemas/UpstreamTarget"
          description: >-
            Static list of backend targets. At least one target is required unless
            `service_discovery` is configured as an alternative target source.
        algorithm:
          $ref: "#/components/schemas/LoadBalancerAlgorithm"
        hash_on:
          type: [string, "null"]
          description: |
            Hash key source for consistent-hashing algorithm. Accepted values:
            - `ip` (default) — hash on client IP address
            - `header:<name>` — hash on a request header value (e.g. `header:x-user-id`)
            - `cookie:<name>` — hash on a cookie value; if the cookie is absent, the
              gateway sets a `Set-Cookie` response header to establish a sticky session.
            Ignored by other algorithms.
        hash_on_cookie_config:
          oneOf:
            - $ref: "#/components/schemas/HashOnCookieConfig"
            - type: "null"
          description: >-
            Cookie attributes for `hash_on: "cookie:<name>"` sticky sessions.
            Ignored when `hash_on` is not cookie-based. Defaults are used if omitted.
        health_checks:
          oneOf:
            - $ref: "#/components/schemas/HealthCheckConfig"
            - type: "null"
        service_discovery:
          oneOf:
            - $ref: "#/components/schemas/ServiceDiscoveryConfig"
            - type: "null"
          description: >-
            Dynamic target discovery configuration. When set, discovered targets
            are merged with any static `targets`. Can be used as the sole target
            source (allowing `targets` to be empty).
        subsets:
          type: [array, "null"]
          items:
            $ref: "#/components/schemas/SubsetDefinition"
          description: |
            Named target subsets for DestinationRule-style routing. A proxy's
            `upstream_subset` selects one of these names. A target matches a
            subset when its `tags` are a superset of the subset's labels.
            Empty arrays are rejected; omit the field when no subsets are
            configured.
        backend_tls_client_cert_path:
          type: [string, "null"]
          description: >-
            Path to a PEM-encoded client certificate for mTLS with backend
            targets. When this upstream is referenced by a proxy, this TLS
            config takes precedence over the proxy's own backend TLS fields.
            Only meaningful for TLS-enabled backend schemes (`https`, `tcps`,
            `dtls`).
        backend_tls_client_key_path:
          type: [string, "null"]
          description: >-
            Path to a PEM-encoded private key matching
            `backend_tls_client_cert_path`. Required when the cert path is set.
        backend_tls_verify_server_cert:
          type: boolean
          default: true
          description: >-
            Whether to verify the backend server's TLS certificate. Set to
            `false` only for development/testing — disabling verification
            removes the security guarantees of TLS.
        backend_tls_server_ca_cert_path:
          type: [string, "null"]
          description: >-
            Path to a PEM CA bundle used as the sole trust anchor when
            verifying backend server certificates for this upstream. When
            set, the system/webpki trust store is NOT used (CA exclusivity).
        backend_tls_sni:
          type: [string, "null"]
          maxLength: 253
          description: >-
            Optional backend TLS Server Name Indication override. Mesh
            DestinationRule `trafficPolicy.tls.sni` projects to this field.
            Stored/projected only — backend handshake SNI consumption is not
            yet enforced (tracked by GAP-1B).
        backend_tls_san_allow_list:
          type: array
          maxItems: 256
          items:
            type: string
            maxLength: 2048
          default: []
          description: >-
            Optional allow-list of backend certificate Subject Alternative
            Names. Entries may be exact DNS names, IP literals, or SPIFFE URI
            SANs. Mesh DestinationRule `trafficPolicy.tls.subjectAltNames`
            projects to this field. Stored/projected only — SAN allow-list
            verification is not yet enforced (tracked by GAP-1C).
        api_spec_id:
          type: [string, "null"]
          description: |
            ID of the `ApiSpec` that created this upstream via the spec-import admin
            API (`POST /api-specs`). `null` for upstreams created via direct admin
            endpoints (`POST /upstreams`). When set, `DELETE /api-specs/{id}` also
            deletes this upstream; `PUT /api-specs/{id}` replaces it.
        created_at:
          type: [string, "null"]
          format: date-time
        updated_at:
          type: [string, "null"]
          format: date-time

    UpstreamTarget:
      type: object
      required: [host, port]
      properties:
        host:
          type: [string, "null"]
          description: Backend hostname or IP
        port:
          type: integer
          format: uint16
        weight:
          type: integer
          format: uint32
          default: 1
          description: Relative weight for weighted round-robin
        tags:
          type: object
          default: {}
          additionalProperties:
            type: [string, "null"]
          description: Arbitrary key-value tags
        path:
          type: [string, "null"]
          description: >-
            Optional path prefix that overrides the proxy's backend_path when
            this target is selected by the load balancer. If omitted or null,
            the proxy's backend_path is used.

    SubsetDefinition:
      type: object
      required: [name, labels]
      properties:
        name:
          type: string
          maxLength: 128
          description: Name selected by `Proxy.upstream_subset`.
        labels:
          type: object
          additionalProperties:
            type: string
          description: |
            Exact label selector. A target matches when its `tags` contain all
            key/value pairs listed here.
        traffic_policy:
          oneOf:
            - $ref: "#/components/schemas/SubsetTrafficPolicy"
            - type: "null"
          description: Optional per-subset traffic policy overrides.

    SubsetTrafficPolicy:
      type: object
      properties:
        load_balancer_algorithm:
          oneOf:
            - $ref: "#/components/schemas/LoadBalancerAlgorithm"
            - type: "null"
          description: |
            Optional load-balancer algorithm override for this subset. When set,
            the subset uses this algorithm instead of the parent upstream's
            algorithm.

    LoadBalancerAlgorithm:
      type: string
      enum:
        - round_robin
        - weighted_round_robin
        - least_connections
        - least_latency
        - consistent_hashing
        - random
      default: round_robin

    # ── Hash-On Cookie Config ────────────────────────────────────────
    HashOnCookieConfig:
      type: object
      description: >-
        Cookie attributes for `hash_on: "cookie:<name>"` sticky sessions.
        Controls the Set-Cookie header injected when a new session is established.
      properties:
        path:
          type: string
          default: "/"
          description: Cookie `Path` attribute.
        ttl_seconds:
          type: integer
          default: 3600
          description: Cookie `Max-Age` in seconds (default 1 hour).
        domain:
          type: [string, "null"]
          description: Optional `Domain` attribute.
        http_only:
          type: boolean
          default: true
          description: Set `HttpOnly` flag.
        secure:
          type: boolean
          default: false
          description: Set `Secure` flag.
        same_site:
          type: [string, "null"]
          enum: [Strict, Lax, None, null]
          description: '`SameSite` attribute.'

    # ── Health Checks ───────────────────────────────────────────────
    HealthCheckConfig:
      type: object
      properties:
        active:
          oneOf:
            - $ref: "#/components/schemas/ActiveHealthCheck"
            - type: "null"
        passive:
          oneOf:
            - $ref: "#/components/schemas/PassiveHealthCheck"
            - type: "null"

    ActiveHealthCheck:
      type: object
      properties:
        http_path:
          type: [string, "null"]
          default: /health
          description: HTTP path to probe
        interval_seconds:
          type: integer
          format: uint64
          default: 10
          description: Seconds between probes
        timeout_ms:
          type: integer
          format: uint64
          default: 5000
          description: Probe timeout in milliseconds
        healthy_threshold:
          type: integer
          format: uint32
          default: 3
          description: Consecutive healthy probes to mark target healthy
        unhealthy_threshold:
          type: integer
          format: uint32
          default: 3
          description: Consecutive unhealthy probes to mark target unhealthy
        healthy_status_codes:
          type: array
          items:
            type: integer
            format: uint16
          default: [200, 302]
          description: Status codes considered healthy (HTTP probe only)
        probe_type:
          type: string
          enum: [http, tcp, udp, grpc]
          default: http
          description: |
            Type of health probe.
            `http` — HTTP GET request (default).
            `tcp` — TCP SYN connection probe.
            `udp` — UDP probe with optional payload.
            `grpc` — gRPC health check using `grpc.health.v1.Health/Check`.
        udp_probe_payload:
          type: [string, "null"]
          description: |
            Hex-encoded payload to send for UDP probes (e.g., "0000").
            If omitted, a single zero byte is sent.
        grpc_service_name:
          type: [string, "null"]
          description: |
            Service name for gRPC health check requests
            (`grpc.health.v1.Health/Check`). Empty/null (default) checks the
            overall server health. Only used when `probe_type: grpc`.
        use_tls:
          type: boolean
          default: false
          description: Use HTTPS for HTTP probes

    PassiveHealthCheck:
      type: object
      properties:
        unhealthy_status_codes:
          type: array
          items:
            type: integer
            format: uint16
          default: [500, 502, 503, 504]
          description: Status codes that count toward the unhealthy threshold
        unhealthy_threshold:
          type: integer
          format: uint32
          default: 3
          description: Failures within the window to mark target unhealthy
        unhealthy_window_seconds:
          type: integer
          format: uint64
          default: 30
          description: Sliding window for counting failures
        healthy_after_seconds:
          type: integer
          format: uint64
          default: 30
          description: |
            Seconds after which an unhealthy target is automatically restored
            to the rotation. Acts as a recovery timer / half-open circuit
            breaker. Default: 30 seconds. Set to 0 to disable automatic
            recovery (rely on active health checks or all-unhealthy fallback
            only). On-success recovery is always active in addition to this
            timer.
        max_ejection_percent:
          type: [integer, "null"]
          format: uint8
          minimum: 0
          maximum: 100
          description: |
            Maximum percentage of targets that may be passively ejected at the
            same time. When passive ejections exceed this cap, the earliest
            passive ejections are re-admitted first. Null means no cap.
        gateway_error_codes:
          type: [array, "null"]
          items:
            type: integer
            format: uint16
          description: |
            Reserved for DestinationRule parity. Validated and persisted, but
            not yet applied by passive health at runtime.
        split_external_local_origin_errors:
          type: [boolean, "null"]
          description: |
            Reserved for DestinationRule parity. Validated and persisted, but
            not yet applied by passive health at runtime.

    # ── Service Discovery ──────────────────────────────────────────
    ServiceDiscoveryConfig:
      type: object
      required: [provider]
      properties:
        provider:
          type: string
          enum: [dns_sd, kubernetes, consul, mesh]
          description: Service discovery provider type
        dns_sd:
          type: object
          description: DNS-SD (SRV record) configuration. Required when provider is `dns_sd`.
          properties:
            service_name:
              type: string
              description: DNS name to query for SRV records (e.g., `_http._tcp.my-service.example.com`)
            poll_interval_seconds:
              type: integer
              format: uint64
              default: 30
              description: Re-query interval in seconds
        kubernetes:
          type: object
          description: Kubernetes EndpointSlice configuration. Required when provider is `kubernetes`.
          properties:
            service_name:
              type: string
              description: Kubernetes service name
            namespace:
              type: string
              default: default
              description: Kubernetes namespace
            port_name:
              type: [string, "null"]
              description: Named port to select from EndpointSlice
            label_selector:
              type: [string, "null"]
              description: >-
                Label selector used to filter EndpointSlices (matches the
                Kubernetes `labelSelector` syntax, e.g.
                `app=my-svc,tier=backend`). Optional; when omitted all
                EndpointSlices for the service are considered.
            poll_interval_seconds:
              type: integer
              format: uint64
              default: 30
        consul:
          type: object
          description: HashiCorp Consul configuration. Required when provider is `consul`.
          properties:
            address:
              type: string
              description: Consul HTTP API address (e.g., `http://consul:8500`)
            service_name:
              type: string
              description: Service name registered in Consul
            datacenter:
              type: [string, "null"]
              description: Datacenter filter (uses local datacenter if not set)
            tag:
              type: [string, "null"]
              description: Service tag filter
            healthy_only:
              type: boolean
              default: true
              description: Only return healthy services
            token:
              type: [string, "null"]
              description: Consul ACL token for authentication
            poll_interval_seconds:
              type: integer
              format: uint64
              default: 30
        mesh:
          type: object
          description: Ferrum mesh service configuration. Required when provider is `mesh`.
          properties:
            service_name:
              type: string
              description: Mesh service name from the CP-delivered mesh model
            namespace:
              type: [string, "null"]
              description: Mesh namespace override. Defaults to the upstream namespace when omitted.
            port:
              type: [integer, "null"]
              format: uint16
              description: Mesh service port to select. Defaults to the first service/workload port.
            poll_interval_seconds:
              type: integer
              format: uint64
              default: 30
        default_weight:
          type: integer
          format: uint32
          default: 1
          description: Default weight assigned to discovered targets

    # ── Health response ─────────────────────────────────────────────
    HealthResponse:
      type: object
      required: [status, timestamp, mode, ready, admin_writes_enabled, cached_config]
      properties:
        status:
          type: [string, "null"]
          enum: [ok, degraded, starting]
          description: |
            Aggregate gateway health.
            `ok` — fully ready and healthy (200). Also returned for
            intentionally read-only deployments (admin API in read-only mode
            with a healthy DB) — `admin_writes_enabled` is the right signal
            for that, not `status`.
            `degraded` — ready but the configured database is currently
            unavailable (still 200; the gateway continues to serve from
            cached config). Intentional read-only mode does NOT set
            `degraded`.
            `starting` — startup not yet complete (returned with 503 and
            `ready: false`).
        ready:
          type: boolean
          description: |
            `true` once the gateway has finished startup. While `false`, the
            endpoint returns `503 Service Unavailable`.
        admin_writes_enabled:
          type: boolean
          description: |
            `true` when the admin API will accept writes. `false` when the
            admin API is in read-only mode or when the database is currently
            unavailable. When `false` and read-only mode is not configured,
            `status` is forced to `degraded`.
        timestamp:
          type: [string, "null"]
          format: date-time
        mode:
          type: [string, "null"]
          description: Gateway operating mode
          examples:
            - control_plane
            - data_plane
            - file
        database:
          type: object
          description: |
            Database connectivity info. Present only when the gateway has a
            configured database (database/cp/dp modes); absent in file mode.
          required: [status]
          properties:
            status:
              type: [string, "null"]
              enum: [connected, disconnected]
            type:
              type: [string, "null"]
              description: Database engine type. Present only when connected.
              examples:
                - postgres
                - mysql
                - sqlite
            error:
              type: [string, "null"]
              description: Error message when disconnected
            pool:
              type: object
              description: |
                Connection pool statistics (SQL backends only; absent for MongoDB).
                Present only when status is `connected`.
              properties:
                size:
                  type: integer
                  description: Current connections managed by the pool (idle + active)
                idle:
                  type: integer
                  description: Connections available for checkout
                active:
                  type: integer
                  description: Connections currently in use
                max_connections:
                  type: integer
                  description: Configured maximum (FERRUM_DB_POOL_MAX_CONNECTIONS)
                min_connections:
                  type: integer
                  description: Configured minimum idle (FERRUM_DB_POOL_MIN_CONNECTIONS)
                read_replica:
                  type: object
                  description: Read replica pool stats (present only when FERRUM_DB_READ_REPLICA_URL is configured)
                  properties:
                    size:
                      type: integer
                    idle:
                      type: integer
                    active:
                      type: integer
        cached_config:
          type: object
          required: [available]
          properties:
            available:
              type: boolean
            loaded_at:
              type: [string, "null"]
              format: date-time
              description: Present only when `available` is true
            proxy_count:
              type: integer
              description: Present only when `available` is true
            consumer_count:
              type: integer
              description: Present only when `available` is true

    # ── Overload ──────────────────────────────────────────────────
    OverloadNoProxyState:
      type: object
      description: |
        Returned in control-plane mode where no proxy state exists.
      required: [level, message]
      properties:
        level:
          type: string
          enum: [normal]
        message:
          type: string
          example: No proxy state available

    OverloadSnapshot:
      type: object
      required: [level, draining, active_connections, active_requests, red_drop_probability_pct, port_exhaustion_events, pressure, actions]
      properties:
        level:
          type: string
          enum: [normal, pressure, critical]
          description: Current overload severity level
        draining:
          type: boolean
          description: Whether the gateway is draining connections for shutdown
        active_connections:
          type: integer
          format: uint64
          description: Number of currently active proxy connections
        active_requests:
          type: integer
          format: uint64
          description: Number of currently in-flight requests/streams (H1 requests, H2/gRPC streams, H3 streams)
        red_drop_probability_pct:
          type: number
          format: double
          description: RED (Random Early Detection) drop probability percentage (0-100)
        port_exhaustion_events:
          type: integer
          format: uint64
          description: Monotonic count of EADDRNOTAVAIL errors (ephemeral port exhaustion). Alert when this value increases.
        pressure:
          type: object
          required: [file_descriptors, connections, requests, event_loop_latency_us]
          properties:
            file_descriptors:
              type: object
              required: [current, max, ratio]
              properties:
                current:
                  type: integer
                  format: uint64
                max:
                  type: integer
                  format: uint64
                ratio:
                  type: number
                  format: double
                  description: current / max (0.0–1.0)
            connections:
              type: object
              required: [current, max, ratio]
              properties:
                current:
                  type: integer
                  format: uint64
                max:
                  type: integer
                  format: uint64
                ratio:
                  type: number
                  format: double
                  description: current / max (0.0–1.0)
            requests:
              type: object
              required: [current, max, ratio]
              properties:
                current:
                  type: integer
                  format: uint64
                max:
                  type: integer
                  format: uint64
                ratio:
                  type: number
                  format: double
                  description: current / max (0.0–1.0). 0.0 when FERRUM_MAX_REQUESTS=0 (unlimited)
            event_loop_latency_us:
              type: integer
              format: uint64
              description: Event loop scheduling latency in microseconds
        actions:
          type: object
          required: [disable_keepalive, reject_new_connections, reject_new_requests]
          properties:
            disable_keepalive:
              type: boolean
              description: Whether Connection:close is being sent on responses
            reject_new_connections:
              type: boolean
              description: Whether new connections are being refused
            reject_new_requests:
              type: boolean
              description: Whether new requests/streams are being rejected with 503

    # ── Runtime metrics ─────────────────────────────────────────────
    RuntimeMetricsSnapshot:
      type: object
      required: [timestamp, uptime_seconds, mode, ferrum_version, system, http, errors, dns, connections, logs, overload]
      properties:
        timestamp:
          type: string
          format: date-time
        uptime_seconds:
          type: integer
          format: uint64
        mode:
          type: string
          enum: [database, file, cp, dp, mesh, injector, migrate]
        ferrum_version:
          type: string
        system:
          $ref: "#/components/schemas/RuntimeSystemSnapshot"
        http:
          $ref: "#/components/schemas/RuntimeHttpSnapshot"
        errors:
          $ref: "#/components/schemas/RuntimeErrorsSnapshot"
        dns:
          $ref: "#/components/schemas/RuntimeDnsSnapshot"
        connections:
          $ref: "#/components/schemas/RuntimeConnectionsSnapshot"
        logs:
          $ref: "#/components/schemas/RuntimeLogsSnapshot"
        overload:
          $ref: "#/components/schemas/OverloadSnapshot"

    RuntimeSystemSnapshot:
      type: object
      required: [sampled_at_unix_ms, platform, cpu, memory, file_descriptors, ephemeral_ports]
      properties:
        sampled_at_unix_ms:
          type: integer
          format: uint64
        platform:
          type: string
          enum: [linux, macos, windows, other]
        cpu:
          type: object
          properties:
            process_percent: { type: number, format: float }
            system_percent: { type: [number, "null"], format: float }
            cgroup_quota_percent: { type: [number, "null"], format: float }
            cpu_count: { type: integer }
        memory:
          type: object
          properties:
            rss_bytes: { type: integer, format: uint64 }
            virtual_bytes: { type: integer, format: uint64 }
            host_percent: { type: [number, "null"], format: float }
            cgroup_percent: { type: [number, "null"], format: float }
            cgroup_limit_bytes: { type: [integer, "null"], format: uint64 }
            jemalloc_allocated_bytes: { type: [integer, "null"], format: uint64 }
            jemalloc_resident_bytes: { type: [integer, "null"], format: uint64 }
        file_descriptors:
          type: object
          properties:
            current: { type: integer, format: uint64 }
            max: { type: integer, format: uint64 }
            ratio: { type: number, format: double }
        ephemeral_ports:
          type: object
          properties:
            range_low: { type: [integer, "null"] }
            range_high: { type: [integer, "null"] }
            range_size: { type: [integer, "null"] }
            exhaustion_events: { type: integer, format: uint64 }
            active_outbound_estimate: { type: integer, format: uint64 }

    RuntimeHttpSnapshot:
      type: object
      properties:
        total_requests: { type: integer, format: uint64 }
        requests_per_second_1s: { type: integer, format: uint64 }
        requests_per_second_1m: { type: integer, format: uint64 }
        requests_per_second_5m: { type: integer, format: uint64 }
        client_disconnects: { type: integer, format: uint64 }
        status_codes:
          type: object
          properties:
            totals:
              type: object
              additionalProperties: { type: integer, format: uint64 }
            rate_1s:
              type: object
              additionalProperties: { type: integer, format: uint64 }
            rate_1m:
              type: object
              additionalProperties: { type: integer, format: uint64 }
            rate_5m:
              type: object
              additionalProperties: { type: integer, format: uint64 }
            percent_total:
              type: object
              additionalProperties: { type: number, format: double }
            percent_1m:
              type: object
              additionalProperties: { type: number, format: double }
            percent_5m:
              type: object
              additionalProperties: { type: number, format: double }

    RuntimeErrorsSnapshot:
      type: object
      properties:
        by_class:
          type: object
          additionalProperties:
            type: object
            properties:
              http: { type: integer, format: uint64 }
              grpc: { type: integer, format: uint64 }
              stream: { type: integer, format: uint64 }
              body: { type: integer, format: uint64 }
        by_proxy:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              type: integer
              format: uint64

    RuntimeDnsSnapshot:
      type: object
      properties:
        lookups_total: { type: integer, format: uint64 }
        cache_hits: { type: integer, format: uint64 }
        cache_misses: { type: integer, format: uint64 }
        stale_serves: { type: integer, format: uint64 }
        errors: { type: integer, format: uint64 }
        hit_ratio: { type: number, format: double }
        error_ratio: { type: number, format: double }
        cache_entries: { type: integer }

    RuntimeConnectionsSnapshot:
      type: object
      properties:
        active: { type: integer, format: uint64 }
        active_requests: { type: integer, format: uint64 }
        pool_handshakes_total: { type: object, additionalProperties: { type: integer, format: uint64 } }
        pool_evictions_total: { type: object, additionalProperties: { type: integer, format: uint64 } }
        pool_failures_total: { type: object, additionalProperties: { type: integer, format: uint64 } }
        tcp_rst_observed:
          type: object
          properties:
            by_proxy:
              type: object
              additionalProperties:
                type: object
                additionalProperties: { type: integer, format: uint64 }
            total: { type: integer, format: uint64 }

    RuntimeLogsSnapshot:
      type: object
      description: Ferrum project tracing event counters after applying the output log-level filter.
      properties:
        by_level:
          type: object
          additionalProperties:
            type: integer
            format: uint64
        by_category:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              type: integer
              format: uint64

    # ── Admin metrics ───────────────────────────────────────────────
    AdminMetrics:
      type: object
      description: |
        Comprehensive gateway runtime metrics snapshot. Cached for 5 seconds
        to avoid performance impact from frequent polling.
      required:
        - gateway
        - connection_pools
        - circuit_breakers
        - health_check
        - load_balancers
        - caches
        - consumer_index
        - rate_limiting
      properties:
        gateway:
          $ref: "#/components/schemas/AdminMetricsGateway"
        connection_pools:
          $ref: "#/components/schemas/AdminMetricsConnectionPools"
        circuit_breakers:
          type: array
          items:
            $ref: "#/components/schemas/AdminMetricsCircuitBreaker"
          description: |
            Per-proxy circuit breaker states. Only proxies with circuit breaker
            config that have been accessed appear here.
        health_check:
          $ref: "#/components/schemas/AdminMetricsHealthCheck"
        load_balancers:
          $ref: "#/components/schemas/AdminMetricsLoadBalancers"
        caches:
          $ref: "#/components/schemas/AdminMetricsCaches"
        consumer_index:
          $ref: "#/components/schemas/AdminMetricsConsumerIndex"
        rate_limiting:
          $ref: "#/components/schemas/AdminMetricsRateLimiting"

    AdminMetricsGateway:
      type: object
      description: Top-level gateway info and throughput counters.
      required:
        - mode
        - ferrum_version
        - uptime_seconds
        - total_requests
        - status_codes_total
        - requests_per_second
        - status_codes_per_second
        - metrics_window_seconds
        - proxy_count
        - consumer_count
        - upstream_count
        - plugin_config_count
      properties:
        mode:
          type: string
          enum: [database, file, cp, dp]
          description: Operating mode (set by FERRUM_MODE)
        ferrum_version:
          type: string
          description: Ferrum Edge binary version
          example: "0.9.0"
        uptime_seconds:
          type: integer
          format: int64
          description: Seconds since the gateway process started
        total_requests:
          type: integer
          format: int64
          description: Total requests processed since the gateway started (cumulative counter)
        status_codes_total:
          type: object
          additionalProperties:
            type: integer
          description: |
            Cumulative map of HTTP status code (as string key) to total count
            since the gateway started. Only status codes that were seen appear
            as keys.
          example:
            "200": 523401
            "404": 1892
            "429": 312
        requests_per_second:
          type: integer
          format: int64
          description: Average requests per second over the last metrics window
        status_codes_per_second:
          type: object
          additionalProperties:
            type: integer
          description: |
            Average per-second rate of each HTTP status code over the last
            metrics window. Only status codes seen in the window appear as keys.
          example:
            "200": 1105
            "404": 38
            "429": 31
        metrics_window_seconds:
          type: integer
          format: int64
          description: |
            Window size in seconds used for per-second rate calculations
            (requests_per_second, status_codes_per_second). Configured via
            FERRUM_STATUS_METRICS_WINDOW_SECONDS (default 30).
        config_last_updated_at:
          type: string
          format: date-time
          nullable: true
          description: RFC 3339 timestamp of the last successful config load/reload
        config_source_status:
          type: string
          enum: [online, "n/a"]
          description: |
            "online" when a database is configured and reachable,
            "n/a" for file mode or CP mode without a database
        proxy_count:
          type: integer
          description: Number of proxy routes in the active config
        consumer_count:
          type: integer
          description: Number of consumers in the active config
        upstream_count:
          type: integer
          description: Number of upstreams (load-balanced target groups) in the active config
        plugin_config_count:
          type: integer
          description: Number of plugin configurations in the active config

    AdminMetricsConnectionPools:
      type: object
      description: |
        Connection pool sizes for all four protocol pools. Each pool reuses
        connections to backend services to avoid TCP/TLS handshake overhead.
      properties:
        http:
          type: object
          description: HTTP/1.1 connection pool (reqwest-based, supports HTTP and HTTPS backends)
          properties:
            total_pools:
              type: integer
              description: Number of distinct backend host:port:protocol pool entries
            max_idle_per_host:
              type: integer
              description: Maximum idle connections kept per host (from FERRUM_POOL_MAX_IDLE_PER_HOST)
            idle_timeout_seconds:
              type: integer
              description: Seconds before an idle connection is evicted
            entries_per_host:
              type: object
              additionalProperties:
                type: integer
              description: Map of pool key (host:port:tls) to connection count
        grpc:
          type: object
          description: gRPC HTTP/2 connection pool (h2c + h2 with trailer support)
          properties:
            total_connections:
              type: integer
        http2:
          type: object
          description: HTTP/2 connection pool for HTTPS backends (stream multiplexing)
          properties:
            total_connections:
              type: integer
        http3:
          type: object
          description: HTTP/3 QUIC connection pool
          properties:
            total_connections:
              type: integer

    AdminMetricsCircuitBreaker:
      type: object
      description: |
        Circuit breaker state for a single proxy. Three states:
        - **closed**: Normal operation, requests pass through
        - **open**: Failures exceeded threshold, requests rejected with 503
        - **half_open**: Timeout elapsed, limited probe requests allowed to test recovery
      required: [proxy_id, state, failure_count, success_count]
      properties:
        proxy_id:
          type: string
          description: ID of the proxy this circuit breaker protects
        state:
          type: string
          enum: [closed, open, half_open]
        failure_count:
          type: integer
          description: |
            Consecutive failures in current state. In closed state, triggers
            opening when it reaches the configured threshold.
        success_count:
          type: integer
          description: |
            Consecutive successes during half_open state. When this reaches the
            configured success_threshold, the circuit closes (recovers).

    AdminMetricsHealthCheck:
      type: object
      description: |
        Health check state showing which upstream targets are currently
        marked unhealthy and excluded from load balancing.
      required: [unhealthy_target_count, unhealthy_targets]
      properties:
        unhealthy_target_count:
          type: integer
          description: Number of targets currently marked unhealthy
        unhealthy_targets:
          type: array
          items:
            type: object
            required: [target, since_epoch_ms]
            properties:
              target:
                type: string
                description: "Target in host:port format"
                example: "10.0.3.12:8080"
              since_epoch_ms:
                type: integer
                format: int64
                description: Unix epoch milliseconds when the target was marked unhealthy

    AdminMetricsLoadBalancers:
      type: object
      description: |
        Active connection counts per upstream target. Only upstreams with
        at least one active connection appear. Useful for verifying even
        distribution across targets and spotting hot targets.
      properties:
        active_connections:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              type: integer
          description: |
            Nested map: upstream_id → { "host:port" → active_connection_count }.
            Only targets with count > 0 are included.

    AdminMetricsCaches:
      type: object
      description: Router lookup cache and DNS resolver cache statistics.
      properties:
        router:
          type: object
          description: |
            Router cache stores (host, path) → proxy lookups for O(1) repeated hits.
            Prefix and regex routes use separate cache partitions.
          properties:
            prefix_cache_entries:
              type: integer
              description: Current entries in the prefix route cache
            regex_cache_entries:
              type: integer
              description: Current entries in the regex route cache
            prefix_eviction_count:
              type: integer
              format: int64
              description: Total number of prefix cache eviction sweeps since startup
            regex_eviction_count:
              type: integer
              format: int64
              description: Total number of regex cache eviction sweeps since startup
            max_cache_entries:
              type: integer
              description: Maximum entries per cache partition before eviction triggers
        dns:
          type: object
          description: DNS resolver cache with stale-while-revalidate support
          properties:
            cache_entries:
              type: integer
              description: Number of hostname entries currently cached

    AdminMetricsConsumerIndex:
      type: object
      description: |
        Consumer credential index counts by authentication type.
        Includes pre-built hash map index sizes (key_auth, basic_auth, mtls, identity)
        and per-type credential entry counts (jwt, hmac).
      required: [total_consumers, key_auth_credentials, basic_auth_credentials, mtls_credentials, jwt_credentials, hmac_credentials, identity_credentials]
      properties:
        total_consumers:
          type: integer
          description: Total number of consumers loaded in the index
        key_auth_credentials:
          type: integer
          description: Number of API key credentials indexed (for key_auth plugin)
        basic_auth_credentials:
          type: integer
          description: Number of username credentials indexed (for basic_auth plugin)
        mtls_credentials:
          type: integer
          description: Number of mTLS identity credentials indexed (for mtls_auth plugin)
        jwt_credentials:
          type: integer
          description: Number of JWT credential entries across all consumers (for jwt_auth plugin)
        hmac_credentials:
          type: integer
          description: Number of HMAC credential entries across all consumers (for hmac_auth plugin)
        identity_credentials:
          type: integer
          description: Number of identity index entries (shared by jwt_auth, jwks_auth, hmac_auth, and ldap_auth plugins). Includes username, id, and custom_id entries per consumer

    AdminMetricsRateLimiting:
      type: object
      description: |
        Rate limiter state across all plugin instances. Each tracked key
        represents a unique client (by IP or consumer) with an active
        rate-limit window. Bounded to 100K entries per plugin instance.
      required: [tracked_key_count]
      properties:
        tracked_key_count:
          type: integer
          description: |
            Total number of rate-limit keys currently tracked across all
            rate_limiting plugin instances (deduplicated by plugin identity)

    # ── Pagination envelope ────────────────────────────────────────────
    Pagination:
      type: object
      description: |
        Pagination metadata returned when `limit` or `offset` query parameters
        are provided on a list endpoint. Without these parameters, list endpoints
        return a plain JSON array for backward compatibility.
      required: [offset, limit, total]
      properties:
        offset:
          type: integer
          description: Number of items skipped
        limit:
          type: integer
          description: Maximum items per page
        total:
          type: integer
          description: Total number of items in the collection (before pagination)

    # ── Batch ──────────────────────────────────────────────────────────
    BatchCreateRequest:
      type: object
      description: |
        Batch create request. All fields are optional — include only the
        resource types you want to create.
      properties:
        proxies:
          type: array
          items:
            $ref: "#/components/schemas/ProxyCreate"
          description: Proxies to create
        consumers:
          type: array
          items:
            $ref: "#/components/schemas/ConsumerCreate"
          description: Consumers to create
        plugin_configs:
          type: array
          items:
            $ref: "#/components/schemas/PluginConfigCreate"
          description: Plugin configurations to create
        upstreams:
          type: array
          items:
            $ref: "#/components/schemas/UpstreamCreate"
          description: Upstreams to create

    BatchCreateResponse:
      type: object
      required: [created]
      properties:
        created:
          type: object
          required: [proxies, consumers, plugin_configs, upstreams]
          properties:
            proxies:
              type: integer
              description: Number of proxies created
            consumers:
              type: integer
              description: Number of consumers created
            plugin_configs:
              type: integer
              description: Number of plugin configs created
            upstreams:
              type: integer
              description: Number of upstreams created
        errors:
          type: array
          items:
            type: string
          description: Present only on 207 Multi-Status; lists per-type error messages

    BackupResponse:
      type: object
      required: [version, ferrum_version, exported_at, source, counts, proxies, consumers, plugin_configs, upstreams]
      properties:
        version:
          type: string
          description: Configuration schema version
          example: "1"
        ferrum_version:
          type: string
          description: Ferrum Edge binary version that produced this backup
          example: "0.9.0"
        exported_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when the backup was created
        source:
          type: string
          enum: [database, cached]
          description: Where the config was read from
        counts:
          type: object
          required: [proxies, consumers, plugin_configs, upstreams]
          properties:
            proxies:
              type: integer
            consumers:
              type: integer
            plugin_configs:
              type: integer
            upstreams:
              type: integer
        proxies:
          type: array
          items:
            $ref: "#/components/schemas/Proxy"
        consumers:
          type: array
          items:
            $ref: "#/components/schemas/Consumer"
        plugin_configs:
          type: array
          items:
            $ref: "#/components/schemas/PluginConfig"
        upstreams:
          type: array
          items:
            $ref: "#/components/schemas/Upstream"

    RestoreRequest:
      type: object
      description: |
        Same format as the backup output or the batch create request.
        All fields are optional — omitted resource types are treated as empty.
      properties:
        proxies:
          type: array
          items:
            $ref: "#/components/schemas/Proxy"
        consumers:
          type: array
          items:
            $ref: "#/components/schemas/Consumer"
        plugin_configs:
          type: array
          items:
            $ref: "#/components/schemas/PluginConfig"
        upstreams:
          type: array
          items:
            $ref: "#/components/schemas/Upstream"

    RestoreResponse:
      type: object
      required: [restored]
      properties:
        restored:
          type: object
          required: [proxies, consumers, plugin_configs, upstreams]
          properties:
            proxies:
              type: integer
              description: Number of proxies restored
            consumers:
              type: integer
              description: Number of consumers restored
            plugin_configs:
              type: integer
              description: Number of plugin configs restored
            upstreams:
              type: integer
              description: Number of upstreams restored
        errors:
          type: array
          items:
            type: string
          description: Present only on 207 Multi-Status; lists per-type error messages

    # ── Shared: Transaction-Log Schema Customization ──────────────────
    # Shape of the `schema:` block (and the entries inside
    # `transaction_log_schema.schemas`). See docs/log_schema.md for the
    # operator-facing reference, validation rules, and cookbook.
    SummaryLogSchema:
      type: object
      description: >-
        Customizable output schema for transaction-log JSON / line
        protocol. Rename keys, drop fields, reorder, inject static
        stamping, emit derived fields, flatten metadata. Metadata
        redaction always applies on every code path — sensitive
        substrings (`authorization`, `cookie`, `password`, `token`, …)
        cannot be introduced via `static_fields` or `derived_fields`
        (rejected at construction). See docs/log_schema.md.
      additionalProperties: false
      properties:
        summary_type:
          type: string
          enum: [http, stream, both]
          default: both
          description: >-
            Which summary type(s) this schema applies to. Summaries of
            the other type fall back to native serialization (the schema
            only customizes types it claims to handle).
        omit:
          type: array
          items: { type: string }
          description: Native field names to drop from output.
        rename:
          type: object
          additionalProperties: { type: string }
          description: Map of native field name -> output key.
        order:
          type: array
          items: { type: string }
          description: >-
            Explicit output order, by output key. May contain `"*"` once
            as a wildcard for "every unlisted entry in natural order."
            Without `"*"`, every field must be listed.
        static_fields:
          type: object
          additionalProperties: true
          description: >-
            Literal JSON values injected at top level. Keys / nested
            keys matching sensitive substrings are rejected at
            compile time.
        derived_fields:
          type: array
          description: Computed values; emitted alongside native fields.
          items:
            type: object
            required: [name, kind]
            additionalProperties: false
            properties:
              name:
                type: string
                description: Output key for the derived value.
              kind:
                type: string
                enum: [status_class, backend_host, summary_kind, outcome]
                description: >-
                  `status_class`: `"1xx"`–`"5xx"` from
                  `response_status_code` (stream: `"none"`).
                  `backend_host`: hostname from `backend_target`
                  (port stripped, IPv6 brackets honored).
                  `summary_kind`: `"http"` or `"stream"`.
                  `outcome`: `"ok"` / `"error"`.
        metadata:
          type: object
          description: How to render the `metadata` map.
          additionalProperties: false
          properties:
            mode:
              type: string
              enum: [nested, omit, flatten]
              default: nested
            prefix:
              type: string
              description: >-
                Flatten mode only. Prepended to each metadata key when
                promoted to top-level (e.g. `"meta_"`). Control
                characters are rejected.
            on_collision:
              type: string
              enum: [skip, overwrite]
              default: skip
              description: >-
                Flatten mode only. Behavior when a metadata key collides
                with an already-emitted field. `skip` keeps the existing
                value; `overwrite` emits a duplicate JSON key (last
                value wins per parser convention).
        timestamp_format:
          type: string
          enum: [rfc3339, epoch_ms, epoch_s]
          default: rfc3339
          description: >-
            Conversion applied to timestamp string fields
            (`timestamp_received`, `timestamp_connected`,
            `timestamp_disconnected`). Parse failures fall back to the
            raw RFC3339 string.

    # ── Plugin Config Schemas ──────────────────────────────────────────
    # Per-plugin configuration schemas. The `config` field on PluginConfig
    # accepts one of these depending on the `plugin_name` value.

    StdoutLoggingConfig:
      type: object
      description: "Plugin: stdout_logging — Logs JSON transaction summaries to stdout."
      properties:
        schema:
          $ref: "#/components/schemas/SummaryLogSchema"
        schema_ref:
          type: string
          description: >-
            Name of a schema registered by a `transaction_log_schema` plugin.
            Mutually exclusive with `schema`. See docs/log_schema.md.

    HttpLoggingConfig:
      type: object
      description: "Plugin: http_logging — Sends transaction logs to an HTTP endpoint in batches."
      properties:
        endpoint_url:
          type: string
          description: URL to POST transaction logs to
        custom_headers:
          type: object
          additionalProperties:
            type: string
          description: "Key-value pairs of custom HTTP headers to include on every batch request. Use this for service-specific auth (e.g., DD-API-KEY for Datadog, Api-Key for New Relic) or metadata headers."
          example:
            DD-API-KEY: your-datadog-api-key
        batch_size:
          type: integer
          default: 50
          description: Number of entries to buffer before sending a batch
        flush_interval_ms:
          type: integer
          default: 1000
          minimum: 100
          description: Max milliseconds before flushing a partial batch
        max_retries:
          type: integer
          default: 3
          description: Retry attempts on failed batch delivery
        retry_delay_ms:
          type: integer
          default: 1000
          description: Delay in milliseconds between retry attempts
        buffer_capacity:
          type: integer
          default: 10000
          description: Channel capacity — new entries are dropped when full
        schema:
          $ref: "#/components/schemas/SummaryLogSchema"
        schema_ref:
          type: string
          description: >-
            Name of a schema registered by a `transaction_log_schema` plugin.
            Mutually exclusive with `schema`. See docs/log_schema.md.

    TcpLoggingConfig:
      type: object
      description: "Plugin: tcp_logging — Sends transaction logs as NDJSON over a persistent TCP or TCP+TLS connection."
      required:
        - host
        - port
      properties:
        host:
          type: string
          description: Hostname or IP of the TCP log receiver
        port:
          type: integer
          minimum: 1
          maximum: 65535
          description: Port of the TCP log receiver
        tls:
          type: boolean
          default: false
          description: Enable TLS encryption for the connection
        tls_server_name:
          type: string
          description: SNI server name override for TLS (defaults to host)
        batch_size:
          type: integer
          default: 50
          description: Number of entries to buffer before sending a batch
        flush_interval_ms:
          type: integer
          default: 1000
          minimum: 100
          description: Max milliseconds before flushing a partial batch
        max_retries:
          type: integer
          default: 3
          description: Retry attempts on failed batch delivery
        retry_delay_ms:
          type: integer
          default: 1000
          description: Delay in milliseconds between retry attempts
        buffer_capacity:
          type: integer
          default: 10000
          description: Channel capacity — new entries are dropped when full
        connect_timeout_ms:
          type: integer
          default: 5000
          minimum: 100
          description: TCP connection timeout in milliseconds
        schema:
          $ref: "#/components/schemas/SummaryLogSchema"
        schema_ref:
          type: string
          description: >-
            Name of a schema registered by a `transaction_log_schema` plugin.
            Mutually exclusive with `schema`. See docs/log_schema.md.

    UdpLoggingConfig:
      type: object
      description: "Plugin: udp_logging — Sends transaction logs to a UDP/DTLS endpoint in batches."
      required:
        - host
        - port
      properties:
        host:
          type: string
          description: UDP endpoint hostname or IP address
        port:
          type: integer
          minimum: 1
          maximum: 65535
          description: UDP endpoint port
        dtls:
          type: boolean
          default: false
          description: Enable DTLS encryption for log datagrams
        dtls_cert_path:
          type: string
          description: PEM client certificate for DTLS mutual TLS
        dtls_key_path:
          type: string
          description: PEM private key for DTLS mutual TLS (must be paired with dtls_cert_path)
        dtls_ca_cert_path:
          type: string
          description: PEM CA certificate for verifying the DTLS server
        dtls_no_verify:
          type: boolean
          default: false
          description: Skip DTLS server certificate verification (testing only)
        batch_size:
          type: integer
          default: 10
          description: Number of entries to buffer before sending a batch
        flush_interval_ms:
          type: integer
          default: 1000
          minimum: 100
          description: Max milliseconds before flushing a partial batch
        max_retries:
          type: integer
          default: 1
          description: Retry attempts on failed batch delivery
        retry_delay_ms:
          type: integer
          default: 500
          description: Delay in milliseconds between retry attempts
        buffer_capacity:
          type: integer
          default: 10000
          description: Channel capacity — new entries are dropped when full
        schema:
          $ref: "#/components/schemas/SummaryLogSchema"
        schema_ref:
          type: string
          description: >-
            Name of a schema registered by a `transaction_log_schema` plugin.
            Mutually exclusive with `schema`. See docs/log_schema.md.

    KafkaLoggingConfig:
      type: object
      description: "Plugin: kafka_logging — Produces transaction summaries as JSON messages to an Apache Kafka topic. Uses an async channel to decouple the proxy hot path from Kafka I/O, with librdkafka handling batching, compression, and delivery retries."
      required:
        - broker_list
        - topic
      properties:
        broker_list:
          type: string
          description: Comma-separated Kafka broker addresses (e.g., broker1:9092,broker2:9092)
        topic:
          type: string
          description: Kafka topic to produce messages to
        key_field:
          type: string
          enum: [client_ip, proxy_id, none]
          default: client_ip
          description: "Partition key field: client_ip (groups by client), proxy_id (groups by route), none (round-robin)"
        buffer_capacity:
          type: integer
          default: 10000
          minimum: 1
          description: "Channel capacity — new entries are dropped when full. Each entry is ~1-2 KB, so 10,000 entries may use ~10-20 MB"
        compression:
          type: string
          enum: [none, gzip, snappy, lz4, zstd]
          default: lz4
          description: Kafka message compression algorithm
        flush_timeout_seconds:
          type: integer
          default: 5
          minimum: 1
          description: Seconds to wait for librdkafka to flush pending messages during graceful shutdown
        acks:
          type: string
          enum: ["0", "1", "all", "-1"]
          description: "Delivery acknowledgment level: 0 (fire-and-forget), 1 (leader ack), all/-1 (full ISR ack)"
        message_timeout_ms:
          type: integer
          description: Timeout for message delivery in milliseconds
        security_protocol:
          type: string
          enum: [plaintext, ssl, sasl_plaintext, sasl_ssl]
          description: Kafka security protocol
        sasl_mechanism:
          type: string
          description: SASL mechanism (e.g., PLAIN, SCRAM-SHA-256, SCRAM-SHA-512)
        sasl_username:
          type: string
          description: SASL username
        sasl_password:
          type: string
          description: SASL password
        ssl_ca_location:
          type: string
          description: Path to CA certificate for broker TLS verification. Falls back to FERRUM_TLS_CA_BUNDLE_PATH
        ssl_no_verify:
          type: boolean
          description: Skip broker TLS certificate verification. Falls back to FERRUM_TLS_NO_VERIFY
        ssl_certificate_location:
          type: string
          description: Path to client certificate for mTLS
        ssl_key_location:
          type: string
          description: Path to client private key for mTLS
        producer_config:
          type: object
          additionalProperties:
            type: string
          description: "Escape hatch: arbitrary librdkafka producer properties as key-value pairs"
        schema:
          $ref: "#/components/schemas/SummaryLogSchema"
        schema_ref:
          type: string
          description: >-
            Name of a schema registered by a `transaction_log_schema` plugin.
            Mutually exclusive with `schema`. Note: Kafka partition keys
            (`client_ip` / `proxy_id`) read typed summary fields and are NOT
            affected by `rename:`. See docs/log_schema.md.

    WsLoggingConfig:
      type: object
      description: "Plugin: ws_logging — Sends transaction logs to a WebSocket endpoint in batches."
      required:
        - endpoint_url
      properties:
        endpoint_url:
          type: string
          description: WebSocket URL (ws:// or wss://) to send transaction logs to. Must include a hostname; malformed or non-WebSocket schemes are rejected at config load time.
        reconnect_delay_ms:
          type: integer
          default: 5000
          description: Delay in milliseconds before reconnecting after connection failure
        batch_size:
          type: integer
          default: 50
          description: Number of entries to buffer before sending a batch
        flush_interval_ms:
          type: integer
          default: 1000
          minimum: 100
          description: Max milliseconds before flushing a partial batch
        max_retries:
          type: integer
          default: 3
          description: Retry attempts on failed batch delivery
        retry_delay_ms:
          type: integer
          default: 1000
          description: Delay in milliseconds between retry attempts
        buffer_capacity:
          type: integer
          default: 10000
          description: Channel capacity — new entries are dropped when full
        schema:
          $ref: "#/components/schemas/SummaryLogSchema"
        schema_ref:
          type: string
          description: >-
            Name of a schema registered by a `transaction_log_schema` plugin.
            Mutually exclusive with `schema`. Note: WebSocket disconnect
            entries are emitted in their native format regardless of schema
            in v1. See docs/log_schema.md.

    LokiLoggingConfig:
      type: object
      description: "Plugin: loki_logging — Ships transaction logs to Grafana Loki via the push API in batched, label-grouped streams. Supports gzip compression, multi-tenant headers, and bearer/basic auth."
      required:
        - endpoint_url
      properties:
        endpoint_url:
          type: string
          description: Loki push API URL (e.g. http://loki:3100/loki/api/v1/push). Must be http:// or https://
        authorization_header:
          type: string
          description: Full Authorization header value (e.g. "Bearer <token>" or "Basic <b64>")
        custom_headers:
          type: object
          additionalProperties:
            type: string
          description: Extra HTTP headers (e.g. X-Scope-OrgID for multi-tenant Loki)
        labels:
          type: object
          additionalProperties:
            type: string
          default:
            service: ferrum-edge
          description: Static labels merged into every Loki stream. Keep cardinality low — labels are indexed
        include_proxy_id_label:
          type: boolean
          default: true
          description: Add the matched proxy_id as a Loki label
        include_status_class_label:
          type: boolean
          default: true
          description: Add status_class (2xx/3xx/4xx/5xx) as a Loki label
        gzip:
          type: boolean
          default: true
          description: Gzip-compress the request body (Content-Encoding header set automatically)
        batch_size:
          type: integer
          default: 100
          minimum: 1
          description: Number of entries to buffer before sending a batch
        flush_interval_ms:
          type: integer
          default: 1000
          minimum: 100
          description: Max milliseconds before flushing a partial batch
        max_retries:
          type: integer
          default: 3
          description: Retry attempts on failed batch delivery. 4xx other than 408/429 aborts immediately
        retry_delay_ms:
          type: integer
          default: 1000
          description: Delay in milliseconds between retry attempts
        buffer_capacity:
          type: integer
          default: 10000
          minimum: 1
          description: Channel capacity — new entries are dropped when full
        schema:
          $ref: "#/components/schemas/SummaryLogSchema"
        schema_ref:
          type: string
          description: >-
            Name of a schema registered by a `transaction_log_schema` plugin.
            Mutually exclusive with `schema`. Note: Loki labels
            (`build_http_labels` / `build_stream_labels`) read typed summary
            fields and are NOT affected by `rename:`. See docs/log_schema.md.

    AccessLogConfig:
      type: object
      description: "Plugin: access_log — Emits identity-aware transaction summaries to the `mesh_access_log` tracing target. Additive to the other logging sinks; the filter (when present) runs before schema application."
      properties:
        filter:
          type: object
          description: >-
            Optional predicate that suppresses log entries before they are
            serialized. All present fields must match for an entry to be
            logged. When omitted, every transaction is logged.
          properties:
            status_code_min:
              type: integer
              minimum: 0
              maximum: 65535
              description: HTTP responses with status < this value are skipped. Stream summaries (no HTTP status) are always skipped when any status_code_* bound is set.
            status_code_max:
              type: integer
              minimum: 0
              maximum: 65535
              description: HTTP responses with status > this value are skipped.
            min_latency_ms:
              type: integer
              minimum: 0
              description: Skip summaries whose total latency / stream duration is below this many milliseconds.
            errors_only:
              type: boolean
              default: false
              description: Skip summaries with no error_class (and no connection_error for streams).
        schema:
          $ref: "#/components/schemas/SummaryLogSchema"
        schema_ref:
          type: string
          description: >-
            Name of a schema registered by a `transaction_log_schema` plugin.
            Mutually exclusive with `schema`. See docs/log_schema.md.

    StatsdLoggingConfig:
      type: object
      description: "Plugin: statsd_logging — Sends transaction metrics to a StatsD-compatible server over UDP."
      required:
        - host
      properties:
        host:
          type: string
          description: StatsD server hostname or IP address
        port:
          type: integer
          default: 8125
          minimum: 1
          maximum: 65535
          description: StatsD server UDP port
        prefix:
          type: string
          default: "ferrum"
          description: Metric name prefix (e.g., ferrum.request.count)
        global_tags:
          type: object
          additionalProperties:
            type: string
          description: Key-value pairs appended as DogStatsD tags to every metric
        flush_interval_ms:
          type: integer
          default: 500
          minimum: 50
          description: Max milliseconds before flushing buffered metrics
        buffer_capacity:
          type: integer
          default: 10000
          description: Channel capacity — new entries are dropped when full
        max_batch_lines:
          type: integer
          default: 50
          description: Max metric entries to batch before flushing
        schema:
          allOf:
            - $ref: "#/components/schemas/SummaryLogSchema"
          description: >-
            Only `rename` and `omit` apply to statsd output — they operate on
            tag keys that map 1:1 to a native summary field:
            HTTP: `method`↔`http_method`, `status`↔`response_status_code`,
            `proxy`↔`proxy_id`.
            Stream: `protocol`↔`protocol`, `proxy`↔`proxy_id`,
            `cause`↔`disconnect_cause`, `direction`↔`disconnect_direction`.
            `static_fields`, `derived_fields`, `metadata`, `order`, and
            `timestamp_format` are no-ops for statsd (line protocol, not JSON).
            See docs/log_schema.md.
        schema_ref:
          type: string
          description: >-
            Name of a schema registered by a `transaction_log_schema` plugin.
            Mutually exclusive with `schema`. Same statsd caveats as above.

    TransactionLogSchemaConfig:
      type: object
      description: >-
        Plugin: transaction_log_schema — Config-only plugin that registers
        named `SummaryLogSchema` definitions into a process-global registry
        for other logging plugins to consume via `schema_ref:`. Required
        scope is `global`; constructed by the loader BEFORE any plugin that
        uses `schema_ref:` so resolution always succeeds. The registry is
        atomically replaced on every config reload — renamed or removed
        schemas do not leak. See docs/log_schema.md.
      required: [schemas]
      additionalProperties: false
      properties:
        schemas:
          type: object
          minProperties: 1
          additionalProperties:
            $ref: "#/components/schemas/SummaryLogSchema"
          description: >-
            Map of schema name → schema definition. Names are referenced
            by other plugins as `schema_ref: <name>`. Duplicate names
            across multiple `transaction_log_schema` plugins in the same
            config are rejected at load time.

    TransactionDebuggerConfig:
      type: object
      description: "Plugin: transaction_debugger — Emits verbose request/response diagnostics via tracing::debug on the transaction_debug target. Requires FERRUM_LOG_LEVEL=debug to see output."
      properties:
        log_request_body:
          type: boolean
          default: false
          description: Log incoming request body
        log_response_body:
          type: boolean
          default: false
          description: Log backend response body
        redacted_headers:
          type: array
          items:
            type: string
          description: Additional header names to redact beyond the built-in sensitive list

    CorrelationIdConfig:
      type: object
      description: "Plugin: correlation_id — Generates a UUID v4 per request when missing, preserves client-supplied IDs (truncating values longer than 256 chars to a fresh UUID), and propagates the value to backends and response headers."
      properties:
        header_name:
          type: string
          default: x-request-id
          description: "Header name (lowercased internally). Used for both the inbound preserved value and the outbound/echoed value. Defaults to x-request-id; common alternatives include x-correlation-id, x-trace-id."
        echo_downstream:
          type: boolean
          default: true
          description: When true, the resolved correlation ID is added to client response headers (and on rejected responses too)

    PrometheusMetricsConfig:
      type: object
      description: "Plugin: prometheus_metrics — Exports gateway metrics in Prometheus format."
      properties:
        render_cache_ttl_seconds:
          type: integer
          default: 5
          description: How long the cached /metrics response is served before rebuilding (seconds)
        stale_entry_ttl_seconds:
          type: integer
          default: 3600
          description: How long idle metric entries live before eviction (seconds). Prevents unbounded memory growth from deleted/recreated proxies
        cache_invalidation_min_age_ms:
          type: integer
          default: 500
          description: Minimum age (ms) of the render cache before record() will invalidate it. Under extreme load this prevents an allocation per request

    ProxyAlertsConfig:
      type: object
      description: |
        Plugin: proxy_alerts — in-gateway anomaly notifications for proxy
        traffic. Observes HTTP/gRPC transaction summaries, TCP/UDP stream
        disconnect summaries, and WebSocket disconnect summaries, then sends
        Trigger/Resolve notifications to Slack, Microsoft Teams, Discord, or
        generic HTTP webhooks. See docs/proxy_alerts.md.
      required: [channels, rules]
      properties:
        enabled:
          type: boolean
          default: true
          description: Master runtime switch for this plugin instance.
        default_cooldown_seconds:
          type: integer
          format: uint32
          minimum: 1
          maximum: 86400
          default: 300
          description: Per-rule fallback cooldown. Cooldown is tracked per `(rule, proxy, channel)`.
        default_min_request_count:
          type: integer
          format: uint64
          minimum: 1
          default: 50
          description: Per-rule fallback for error-rate and latency-percentile rules.
        default_window_seconds:
          type: integer
          format: uint32
          minimum: 5
          maximum: 3600
          default: 60
          description: Per-rule fallback sliding-window length.
        default_resolved_window_seconds:
          type: integer
          format: uint32
          minimum: 5
          maximum: 86400
          default: 300
          description: Per-rule fallback recovery quiet period after a breach clears.
        max_concurrent_dispatches:
          type: integer
          format: uint32
          minimum: 1
          default: 8
          description: Maximum concurrent outbound notification requests. Excess alerts are dropped, not queued.
        quiet_hours_utc:
          type: array
          default: []
          description: UTC time windows where Trigger alerts are suppressed. Resolve alerts still dispatch.
          items:
            $ref: "#/components/schemas/ProxyAlertsQuietHourWindow"
        channels:
          type: object
          minProperties: 1
          propertyNames:
            pattern: "^[A-Za-z0-9_-]+$"
          additionalProperties:
            $ref: "#/components/schemas/ProxyAlertsChannel"
          description: Map of channel name to channel definition. Rule `channels` entries reference these names.
        rules:
          type: array
          minItems: 1
          description: Alert rules evaluated per matched proxy.
          items:
            $ref: "#/components/schemas/ProxyAlertsRule"
      example:
        enabled: true
        default_cooldown_seconds: 300
        default_min_request_count: 50
        default_window_seconds: 60
        default_resolved_window_seconds: 300
        max_concurrent_dispatches: 8
        quiet_hours_utc:
          - from: "23:00"
            to: "06:00"
            weekdays: [0, 6]
        channels:
          ops_slack:
            type: slack
            webhook_url_env: FERRUM_ALERTS_SLACK_WEBHOOK
            channel_override: "#alerts-prod"
          pagerduty_v2:
            type: webhook
            url_env: FERRUM_PAGERDUTY_EVENTS_URL
            method: POST
            headers:
              Content-Type: application/json
            body_template: '{"routing_key":"$ROUTING_KEY","event_action":"${event_action}","payload":{"summary":"${rule_name}: ${reason}","source":"${proxy_name}","severity":"${severity}"}}'
        rules:
          - name: proxy_5xx_spike
            enabled: true
            type: error_rate
            status_codes: [500, 501, 502, 503, 504]
            threshold_percent: 5.0
            min_request_count: 100
            window_seconds: 60
            channels: [ops_slack, pagerduty_v2]
            cooldown_seconds: 300
            recovery:
              resolved_window_seconds: 300
            severity: high

    ProxyAlertsQuietHourWindow:
      type: object
      required: [from, to]
      properties:
        from:
          type: string
          pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
          description: UTC start time in strict HH:MM form.
        to:
          type: string
          pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
          description: UTC end time in strict HH:MM form. Values earlier than `from` wrap past midnight.
        weekdays:
          type: array
          default: []
          description: Days the window applies to (`0 = Sunday` ... `6 = Saturday`). Omit or use `[]` for every day.
          items:
            type: integer
            minimum: 0
            maximum: 6

    ProxyAlertsChannel:
      oneOf:
        - $ref: "#/components/schemas/ProxyAlertsSlackChannel"
        - $ref: "#/components/schemas/ProxyAlertsTeamsChannel"
        - $ref: "#/components/schemas/ProxyAlertsDiscordChannel"
        - $ref: "#/components/schemas/ProxyAlertsWebhookChannel"

    ProxyAlertsSlackChannel:
      type: object
      required: [type]
      anyOf:
        - required: [webhook_url]
        - required: [webhook_url_env]
      properties:
        type:
          type: string
          enum: [slack]
        webhook_url:
          type: string
          format: uri
          description: Slack incoming webhook URL. Prefer `webhook_url_env` for secrets.
        webhook_url_env:
          type: string
          description: Environment variable containing the Slack incoming webhook URL.
        channel_override:
          type: string
          description: Optional Slack channel override, e.g. `#alerts-prod`.
        username:
          type: string
          description: Optional bot username override.
        icon_emoji:
          type: string
          description: Optional bot icon emoji, e.g. `:rotating_light:`.

    ProxyAlertsTeamsChannel:
      type: object
      required: [type]
      anyOf:
        - required: [webhook_url]
        - required: [webhook_url_env]
      properties:
        type:
          type: string
          enum: [teams]
        webhook_url:
          type: string
          format: uri
          description: Microsoft Teams incoming webhook URL. Prefer `webhook_url_env` for secrets.
        webhook_url_env:
          type: string
          description: Environment variable containing the Teams incoming webhook URL.

    ProxyAlertsDiscordChannel:
      type: object
      required: [type]
      anyOf:
        - required: [webhook_url]
        - required: [webhook_url_env]
      properties:
        type:
          type: string
          enum: [discord]
        webhook_url:
          type: string
          format: uri
          description: Discord-compatible webhook URL. Prefer `webhook_url_env` for secrets.
        webhook_url_env:
          type: string
          description: Environment variable containing the Discord webhook URL.
        username:
          type: string
          description: Optional webhook username override.

    ProxyAlertsWebhookChannel:
      type: object
      required: [type, body_template]
      anyOf:
        - required: [url]
        - required: [url_env]
      properties:
        type:
          type: string
          enum: [webhook]
        url:
          type: string
          format: uri
          description: HTTP(S) endpoint URL. Prefer `url_env` for secrets.
        url_env:
          type: string
          description: Environment variable containing the HTTP(S) endpoint URL.
        method:
          type: string
          enum: [POST, PUT, PATCH]
          default: POST
        headers:
          type: object
          additionalProperties:
            type: string
          default:
            Content-Type: application/json
          description: Headers sent with the webhook request. JSON content types JSON-escape template substitutions.
        body_template:
          type: string
          description: Template body. Supports generic notification variables plus proxy_alerts variables such as `${rule_name}`, `${proxy_name}`, `${observed}`, `${threshold}`, `${sample_count}`, `${window_seconds}`, and `${reason}`.

    ProxyAlertsRule:
      oneOf:
        - $ref: "#/components/schemas/ProxyAlertsErrorRateRule"
        - $ref: "#/components/schemas/ProxyAlertsStatusCodeCountRule"
        - $ref: "#/components/schemas/ProxyAlertsLatencyPercentileRule"
        - $ref: "#/components/schemas/ProxyAlertsErrorClassRule"
        - $ref: "#/components/schemas/ProxyAlertsStreamDisconnectCauseRule"

    ProxyAlertsRuleCommon:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          description: Unique rule name within this plugin config.
        enabled:
          type: boolean
          default: true
          description: Disabled rules are skipped before validation.
        window_seconds:
          type: integer
          format: uint32
          minimum: 5
          maximum: 3600
          description: Sliding-window length for this rule.
        channels:
          type: array
          minItems: 1
          items:
            type: string
            pattern: "^[A-Za-z0-9_-]+$"
          description: Channel names from the top-level `channels` map.
        cooldown_seconds:
          type: integer
          format: uint32
          minimum: 1
          maximum: 86400
          description: Per-rule cooldown override.
        recovery:
          oneOf:
            - $ref: "#/components/schemas/ProxyAlertsRecovery"
            - type: "null"
          description: Optional resolved notification settings.
        severity:
          $ref: "#/components/schemas/ProxyAlertsSeverity"

    ProxyAlertsRecovery:
      type: object
      properties:
        resolved_window_seconds:
          type: integer
          format: uint32
          minimum: 5
          maximum: 86400
          default: 300
          description: How long the rule must stay below threshold before a Resolve notification is sent.

    ProxyAlertsSeverity:
      type: string
      enum: [info, low, medium, high, critical]
      default: medium

    ProxyAlertsErrorRateRule:
      allOf:
        - $ref: "#/components/schemas/ProxyAlertsRuleCommon"
        - type: object
          required: [name, type, status_codes, threshold_percent, channels]
          properties:
            type:
              type: string
              enum: [error_rate]
            status_codes:
              $ref: "#/components/schemas/ProxyAlertsStatusCodeList"
            threshold_percent:
              type: number
              format: double
              exclusiveMinimum: 0
              maximum: 100
              description: Alert when the matching status-code percentage is at least this value.
            min_request_count:
              type: integer
              format: uint64
              minimum: 1
              description: Minimum total requests in the window before the percentage can alert.

    ProxyAlertsStatusCodeCountRule:
      allOf:
        - $ref: "#/components/schemas/ProxyAlertsRuleCommon"
        - type: object
          required: [name, type, status_codes, threshold_count, channels]
          properties:
            type:
              type: string
              enum: [status_code_count]
            status_codes:
              $ref: "#/components/schemas/ProxyAlertsStatusCodeList"
            threshold_count:
              type: integer
              format: uint64
              minimum: 1
              description: Alert when at least this many matching responses occur in the window.

    ProxyAlertsLatencyPercentileRule:
      allOf:
        - $ref: "#/components/schemas/ProxyAlertsRuleCommon"
        - type: object
          required: [name, type, metric, percentile, threshold_ms, channels]
          properties:
            type:
              type: string
              enum: [latency_percentile]
            metric:
              type: string
              enum: [backend_total_ms, backend_ttfb_ms, total_ms, stream_duration_ms]
              description: Latency metric to observe. `stream_duration_ms` applies to TCP/UDP/WebSocket sessions; the others apply to HTTP-family summaries.
            percentile:
              type: integer
              minimum: 1
              maximum: 99
            threshold_ms:
              type: number
              format: double
              exclusiveMinimum: 0
              maximum: 300000
              description: Alert when the bucket upper-bound estimate for the percentile is strictly greater than this threshold.
            min_request_count:
              type: integer
              format: uint64
              minimum: 1
              description: Minimum observations in the window before the percentile can alert.

    ProxyAlertsErrorClassRule:
      allOf:
        - $ref: "#/components/schemas/ProxyAlertsRuleCommon"
        - type: object
          required: [name, type, classes, threshold_count, channels]
          properties:
            type:
              type: string
              enum: [error_class]
            classes:
              type: array
              minItems: 1
              items:
                $ref: "#/components/schemas/ErrorClass"
              description: Error classes counted by this rule. HTTP rules also check `body_error_class`.
            threshold_count:
              type: integer
              format: uint64
              minimum: 1
              description: Alert when at least this many matching errors occur in the window.

    ProxyAlertsStreamDisconnectCauseRule:
      allOf:
        - $ref: "#/components/schemas/ProxyAlertsRuleCommon"
        - type: object
          required: [name, type, causes, threshold_count, channels]
          properties:
            type:
              type: string
              enum: [stream_disconnect_cause]
            causes:
              type: array
              minItems: 1
              items:
                $ref: "#/components/schemas/DisconnectCause"
              description: Stream disconnect causes counted by this rule.
            threshold_count:
              type: integer
              format: uint64
              minimum: 1
              description: Alert when at least this many matching disconnects occur in the window.

    ProxyAlertsStatusCodeList:
      type: array
      minItems: 1
      items:
        type: integer
        minimum: 100
        maximum: 599

    ErrorClass:
      type: string
      enum:
        - connection_timeout
        - connection_refused
        - connection_reset
        - connection_closed
        - dns_lookup_error
        - tls_error
        - read_write_timeout
        - client_disconnect
        - protocol_error
        - response_body_too_large
        - request_body_too_large
        - connection_pool_error
        - port_exhaustion
        - graceful_remote_close
        - dispatch_policy_rejected
        - request_error
      description: |
        Stable classification of a backend dispatch failure. Emitted on
        `TransactionSummary.error_class` / `StreamTransactionSummary.error_class`
        and used by alert rules. `graceful_remote_close` is the HTTP/3 backend's
        spec-legal teardown signal (RFC 9114 §8.1) — the request still 502s but
        the connection stays H3-capable. `dispatch_policy_rejected` covers
        terminal gateway decisions taken before any backend dial (for example
        an unsupportable backend TLS SNI override) and is intentionally not a
        connection error, so retry policies do not fire.

    DisconnectCause:
      type: string
      enum:
        - idle_timeout
        - recv_error
        - backend_error
        - graceful_shutdown

    OtelTracingConfig:
      type: object
      description: "Plugin: otel_tracing — W3C Trace Context propagation and OTLP span export."
      properties:
        endpoint:
          type: string
          description: OTLP/HTTP collector endpoint. Omit for propagation-only mode
        service_name:
          type: string
          default: ferrum-edge
          description: Service name in spans and resource attributes
        deployment_environment:
          type: string
          description: deployment.environment resource attribute
        generate_trace_id:
          type: boolean
          default: true
          description: Generate trace IDs for requests without incoming traceparent
        headers:
          type: object
          additionalProperties:
            type: string
          default: {}
          description: Custom HTTP headers sent with OTLP exports
        authorization:
          type: string
          description: Authorization header value for OTLP exports
        batch_size:
          type: integer
          default: 50
          description: Spans per export batch
        flush_interval_ms:
          type: integer
          default: 5000
          description: Max delay before flushing a partial batch
        buffer_capacity:
          type: integer
          default: 10000
          description: Max pending spans; drops oldest when full
        max_retries:
          type: integer
          default: 2
          description: Retry attempts on export failure
        retry_delay_ms:
          type: integer
          default: 1000
          description: Delay between retries

    MtlsAuthConfig:
      type: object
      description: "Plugin: mtls_auth — Authenticates using client TLS certificate fields for HTTP-family and TCP+TLS proxies."
      properties:
        cert_field:
          type: string
          default: subject_cn
          enum: [subject_cn, subject_ou, subject_o, san_dns, san_email, fingerprint_sha256, serial]
          description: Certificate field to use as identity
        allowed_issuers:
          type: array
          items:
            type: object
            properties:
              cn:
                type: string
              o:
                type: string
              ou:
                type: string
          description: Per-proxy issuer DN filters (AND within entry, OR across entries)
        allowed_ca_fingerprints_sha256:
          type: array
          items:
            type: string
          description: SHA-256 fingerprints of allowed CA/intermediate certs

    JwksAuthConfig:
      type: object
      description: "Plugin: jwks_auth — Multi-provider JWKS JWT validation with claim-based authorization."
      required: [providers]
      properties:
        providers:
          type: array
          items:
            type: object
            properties:
              jwks_uri:
                type: string
                description: Direct URL to the IdP's JWKS endpoint
              discovery_url:
                type: string
                description: OIDC discovery URL (auto-discovers jwks_uri)
              jwks:
                oneOf:
                  - type: string
                  - type: object
                description: Inline JWKS JSON string or object
              issuer:
                type: string
                description: Expected JWT iss claim — routes tokens to this provider
              audience:
                type: string
                description: Expected JWT aud claim
              audiences:
                type: array
                items:
                  type: string
                description: Accepted JWT aud claims; OR matched
              from_headers:
                type: array
                items:
                  type: object
                  required: [name]
                  properties:
                    name:
                      type: string
                      description: Header name to read the token from
                    prefix:
                      type: string
                      description: Optional token prefix to strip; empty string is treated as no prefix
                description: Custom header token locations
              from_params:
                type: array
                items:
                  type: string
                description: Custom query parameter token locations
              forward_original_token:
                type: boolean
                default: true
                description: Whether to forward the token-bearing header or query parameter upstream
              require_exp:
                type: boolean
                description: Per-provider override for requiring an exp claim
              required_scopes:
                type: array
                items:
                  type: string
                description: Scopes that must all be present in the token
              required_roles:
                type: array
                items:
                  type: string
                description: Roles where any one must be present
              scope_claim:
                type: string
                description: Per-provider override for scope claim path
              role_claim:
                type: string
                description: Per-provider override for role claim path
              consumer_identity_claim:
                type: string
                description: Per-provider override for consumer identity claim (falls back to global)
              consumer_header_claim:
                type: string
                description: Per-provider override for consumer header claim (falls back to global)
          description: Array of identity provider configurations
        scope_claim:
          type: string
          default: scope
          description: Global scope claim path
        role_claim:
          type: string
          default: roles
          description: Global role claim path
        consumer_identity_claim:
          type: string
          default: sub
          description: JWT claim for consumer lookup
        consumer_header_claim:
          type: string
          description: JWT claim for X-Consumer-Username header (default same as consumer_identity_claim)
        require_exp:
          type: boolean
          default: true
          description: Global default for requiring an exp claim
        jwks_refresh_interval_secs:
          type: integer
          format: uint64
          default: 900
          description: JWKS key refresh interval in seconds

    JwtAuthConfig:
      type: object
      description: "Plugin: jwt_auth — HS256 JWT Bearer token authentication."
      properties:
        token_lookup:
          type: string
          default: "header:Authorization"
          description: "Where to find the token (header:<name> or query:<name>)"
        consumer_claim_field:
          type: string
          default: sub
          description: JWT claim identifying the consumer

    KeyAuthConfig:
      type: object
      description: "Plugin: key_auth — API key authentication."
      properties:
        key_location:
          type: string
          default: "header:X-API-Key"
          description: "Where to find the key (header:<name> or query:<name>)"

    BasicAuthConfig:
      type: object
      description: "Plugin: basic_auth — HTTP Basic credentials verified against HMAC-SHA256 password hashes."
      properties: {}

    LdapAuthConfig:
      type: object
      description: "Plugin: ldap_auth — LDAP directory authentication with optional AD group filtering."
      required:
        - ldap_url
      properties:
        ldap_url:
          type: string
          description: "LDAP server URL (ldap:// or ldaps://)"
          example: "ldap://ldap.example.com:389"
        bind_dn_template:
          type: string
          description: "Direct bind DN template with {username} placeholder"
          example: "uid={username},ou=users,dc=example,dc=com"
        search_base_dn:
          type: string
          description: "Base DN for search-then-bind user search"
        search_filter:
          type: string
          description: "LDAP search filter with {username} placeholder"
          example: "(&(objectClass=user)(sAMAccountName={username}))"
        service_account_dn:
          type: string
          description: "DN for the service account used in search-then-bind"
        service_account_password:
          type: string
          description: "Password for the service account"
        group_base_dn:
          type: string
          description: "Base DN for group membership search"
        group_filter:
          type: string
          description: "Group search filter with {user_dn} and {username} placeholders"
        required_groups:
          type: array
          items:
            type: string
          description: "LDAP/AD group names the user must belong to (OR logic)"
        group_attribute:
          type: string
          default: "cn"
          description: "Attribute containing the group name"
        starttls:
          type: boolean
          default: false
          description: "Use STARTTLS to upgrade ldap:// connections"
        connect_timeout_seconds:
          type: integer
          default: 5
          description: "LDAP connection and operation timeout in seconds"
        cache_ttl_seconds:
          type: integer
          default: 0
          description: "Cache TTL for successful auth results (0 = disabled)"
        max_cache_entries:
          type: integer
          default: 10000
          description: "Maximum entries in the auth result cache. Prevents unbounded growth from brute-force attempts with unique credentials"
        consumer_mapping:
          type: boolean
          default: true
          description: "Whether to map LDAP user to a gateway Consumer"

    HmacAuthConfig:
      type: object
      description: "Plugin: hmac_auth — HMAC signature verification with mandatory request-body integrity protection (RFC 9421 / RFC 3230). Requests must include a Digest or Content-Digest header that matches the request body; the digest header value is folded into the HMAC signing string (METHOD\\nPATH\\nDATE\\nDIGEST). Consumer credentials store the shared secret."
      properties:
        clock_skew_seconds:
          type: integer
          format: uint64
          default: 300
          description: Maximum allowed clock skew in seconds for the Date header replay protection window

    # ── Mesh / Service-Mesh Plugins ─────────────────────────────────
    # These plugins are primarily auto-injected by mesh mode (sidecar / ambient /
    # east-west / egress / waypoint topologies) from the CP-delivered slice. They
    # are also accepted as operator-managed `plugin_configs` rows on non-mesh
    # gateways for standalone deployments, with the schema below.
    SpiffeIdentityConfig:
      type: object
      description: |
        Plugin: spiffe_identity — Extracts the SPIFFE ID from the peer
        certificate's URI SAN and populates `ctx.peer_spiffe_id` /
        `StreamConnectionContext` metadata for downstream auth and rate-limit
        plugins (notably `mesh_authz` and `rate_limiting` with
        `limit_by: spiffe_identity`).

        Auto-injected by mesh mode on every applicable topology; reserved
        plugin id `__mesh_spiffe_identity`. Standalone usage is supported on
        non-mesh gateways that still terminate mTLS and want to surface the
        SPIFFE identity to other plugins.
      additionalProperties: false
      properties: {}

    MeshAuthzConfig:
      type: object
      description: |
        Plugin: mesh_authz — Layer 2 mesh authorization evaluator. Applies
        Istio-style `MeshPolicy` (ALLOW / DENY / AUDIT) rules to the SPIFFE
        identity extracted by `spiffe_identity` or the HBONE baggage on
        ambient mTLS streams. DENY rules are evaluated first (first match
        wins); the presence of any ALLOW rule with no match triggers an
        implicit deny.

        Auto-injected by mesh mode on every applicable topology; reserved
        plugin id `__mesh_authz`. PolicyScope filtering (`MeshWide` /
        `Namespace` / `WorkloadSelector`) is applied at construction time
        from the slice-embedded workload identity, except in node-waypoint
        topology where the filter runs per-request against the pod-scoped
        cache attached to `RequestContext`.
      properties:
        mesh_slice:
          type: object
          description: |
            Embedded mesh slice — supplied by mesh-mode auto-injection.
            Carries the filtered policy set plus the workload's
            `namespace`/`labels` used for slice-level scope filtering. Not
            intended for direct operator configuration; operator-managed
            instances pass `mesh_policies` instead.
        mesh_policies:
          type: array
          items:
            type: object
            description: A single `MeshPolicy` document. See `docs/mesh.md`.
          description: |
            Standalone-mode policy list. Used by direct configuration / tests
            when no slice is available.
        namespace:
          type: string
          description: |
            Proxy workload namespace, used by the slice-level PolicyScope
            filter to discard policies that do not apply to this workload.
            Overrides any namespace embedded in `mesh_slice`.
        labels:
          type: object
          additionalProperties:
            type: string
          description: |
            Proxy workload labels, used by the slice-level scope filter for
            `WorkloadSelector`-scoped policies. Overrides any labels embedded
            in `mesh_slice`.
        trust_domain_aliases:
          type: array
          items:
            type: string
          description: |
            Additional SPIFFE trust domains accepted as equivalent to the
            peer cert's trust domain when authorising HBONE baggage
            `source.principal`. Empty (default) means strict same-trust-domain
            match.
        per_pod_policy_scoping:
          type: boolean
          default: false
          description: |
            When `true`, the construction-time slice-level scope filter is
            skipped and policies are filtered per-request using the
            `PolicyScopeCache` attached to `RequestContext.node_waypoint_policy_scope`.
            Auto-set by mesh injection on `NodeWaypoint` topology where one
            listener serves many pods.

    MeshOutboundRegistryConfig:
      type: object
      description: |
        Plugin: mesh_outbound_registry — Implements Istio
        `MeshConfig.outboundTrafficPolicy.mode: REGISTRY_ONLY`. Rejects HTTP
        requests whose `Host` header is not in the configured destination
        registry. Auto-injected by mesh mode when the slice declares
        `RegistryOnly`; not registered when policy is `AllowAny` (default).
        Operator-managed instances on non-mesh gateways behave as a generic
        HTTP `Host` allowlist.

        Matches against four kinds of entries: bare hostnames (no Host port),
        explicit `host:port` pairs, `host:*` (any explicit Host port), and
        wildcard hosts (`*.example.com`, `*.example.com:443`,
        `*.example.com:*`). Empty registry fails closed.
      properties:
        registry:
          type: array
          items:
            type: string
          default: []
          description: |
            Known destinations. Bare hostnames match requests with no
            explicit `Host` port. `host:port` entries match only that port.
            `host:*` entries match any explicit port. Wildcard entries
            (`*.example.com[:port|:*]`) match one DNS label below the
            suffix.
        reject_status:
          type: integer
          format: uint16
          minimum: 400
          maximum: 599
          default: 502
          description: |
            Status code returned for unknown destinations. Operators may
            override to 404 to mask unknown destinations.
        outbound_listen_ports:
          type: array
          items:
            type: integer
            format: uint16
            minimum: 1
          default: []
          description: |
            Optional frontend listener ports where the registry is enforced.
            Empty means enforce on every HTTP-family request that reaches
            the plugin (operator-managed default). Mesh auto-injection sets
            this to the outbound capture listener port so the global plugin
            does not apply to inbound listeners.
        namespace:
          type: string
          default: ferrum
          description: Mesh namespace label used by the Prometheus decision counter.

    MeshRouteDispatchConfig:
      type: object
      description: |
        Plugin: mesh_route_dispatch — Per-request route override driven by
        method / header / query-param predicates. Closes the Istio
        `VirtualService.http[].match` header/method gap without extending
        the `Proxy` schema. Runs after authentication, authorization, and
        rate limiting — admission decisions still use the public listener
        identity; only downstream `before_proxy` plugins and backend
        dispatch see the effective override destination.

        At least one rule is required. When multiple plugin instances run on
        one proxy, each matching instance replaces the override destination
        set by earlier instances. Per-rule `backend_tls` is direct-backend
        only (`upstream_id` destinations inherit TLS from the referenced
        Upstream).
      required: [rules]
      properties:
        rules:
          type: array
          minItems: 1
          items:
            type: object
            required: [destination]
            properties:
              match:
                type: object
                description: |
                  Match criteria — all configured fields must match for the
                  rule to fire. At least one of `methods`/`headers`/
                  `query_params` must be configured (an empty match is
                  rejected at load time).
                properties:
                  methods:
                    type: array
                    items:
                      type: string
                    description: HTTP methods (any-of). Empty = no method restriction.
                  headers:
                    type: object
                    additionalProperties:
                      type: string
                    description: Header equality matches (all-of). Header names are case-insensitive.
                  query_params:
                    type: object
                    additionalProperties:
                      type: string
                    description: Query parameter equality matches (all-of). Decoded after percent-decoding.
              destination:
                type: object
                description: |
                  Override applied on match. At least one field must be set.
                  `upstream_id` is mutually exclusive with the direct-backend
                  fields (`backend_host`/`backend_port`/`backend_tls`).
                properties:
                  upstream_id:
                    type: [string, "null"]
                  backend_host:
                    type: [string, "null"]
                  backend_port:
                    type: [integer, "null"]
                    format: uint16
                    minimum: 1
                  backend_tls:
                    description: Optional per-rule backend TLS override (direct backends only).
                    type: [object, "null"]
        reject_unmatched:
          type: boolean
          default: false
          description: |
            When `true`, requests that match no rule are rejected with 404
            instead of falling through to the proxy's default backend. The
            Istio VirtualService translator sets this so a route gated by a
            method/header/query-param `match` does not serve traffic that
            misses those predicates.

    WorkloadMetricsConfig:
      type: object
      description: |
        Plugin: workload_metrics — Adds Istio / GAMMA-style workload identity
        labels and Telemetry CRD tag overrides into transaction metadata, and
        owns trace-context propagation for the mesh. The existing logging,
        metrics, and OTel sinks pick these up via `TransactionSummary.metadata`
        and `StreamTransactionSummary.metadata` without plugin-trait changes.

        Auto-injected by mesh mode on every applicable topology; reserved
        plugin id `__mesh_workload_metrics`. Standalone use is supported on
        non-mesh gateways that want Istio-style workload labels in logs.
      properties:
        node_id:
          type: string
          description: Mesh node identifier attached to workload metadata.
        topology:
          type: string
          description: Mesh topology name attached to workload metadata.
        namespace:
          type: string
          description: Mesh namespace attached to workload metadata and used when deriving the default `service_name`.
        workload_spiffe_id:
          type: string
          description: This workload's SPIFFE ID (e.g., `spiffe://cluster.local/ns/default/sa/api`).
        labels:
          type: object
          additionalProperties:
            type: string
          description: Static workload labels to inject as `mesh.*` metadata keys on every transaction.
        trust_domain_aliases:
          type: array
          items:
            type: string
          description: Additional SPIFFE trust domains accepted as equivalent to the workload's trust domain.
        sampling_percentage:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: Tracing sampling percentage 0.0–100.0 (from Istio Telemetry CRD).
        custom_tags:
          type: object
          additionalProperties:
            type: string
          description: Custom tags injected into every transaction's metadata.
        custom_header_tags:
          type: object
          additionalProperties:
            type: string
          description: Custom tags populated from request headers (`tag_name -> header_name`).
        metrics:
          type: object
          description: |
            Istio Telemetry-CRD-style metrics customization. Both fields are
            optional and additive; unknown fields are ignored.
          properties:
            tag_overrides:
              type: array
              items:
                type: object
                required: [name, operation]
                properties:
                  name:
                    type: string
                    description: Tag name to override.
                  operation:
                    type: object
                    required: [type]
                    description: |
                      One of `{"type": "remove"}`,
                      `{"type": "rename", "new_name": "..."}`, or
                      `{"type": "set", "value": "..."}`.
                    properties:
                      type:
                        type: string
                        enum: [remove, rename, set]
                      new_name:
                        type: string
                        description: Replacement tag name when `type` is `rename`.
                      value:
                        type: string
                        description: Replacement tag value when `type` is `set`.
              description: Per-metric tag overrides translated from the Istio Telemetry CRD.
            disabled_metrics:
              type: array
              items:
                type: string
              description: Names of metrics suppressed by this workload (Istio Telemetry CRD).
        tracing_providers:
          type: array
          items:
            type: object
          description: |
            Per-provider tracing exporters surfaced from the Istio Telemetry
            CRD via the mesh slice. Also enables trace-context propagation
            when span reporting is disabled.
        tracing_provider:
          type: object
          description: |
            Singular tracing exporter fallback. Ignored when
            `tracing_providers` is present.
        span_reporting_disabled:
          type: boolean
          default: false
          description: |
            When `true`, trace context is still propagated but no spans are
            exported. Matches Istio Telemetry CRD `disableSpanReporting`.
        service_name:
          type: string
          description: |
            Service name attached to exported spans. Defaults to the
            workload's service when omitted.

    SoapWsSecurityConfig:
      type: object
      description: "Plugin: soap_ws_security — Validates WS-Security headers in SOAP envelopes. Supports UsernameToken (PasswordText/PasswordDigest), X.509 signature verification, SAML 2.0 assertion validation (XMLDSIG signature verification against trusted IdP signing certificates with enveloped-signature transform, Issuer / NotBefore / NotOnOrAfter / Audience checks, and Subject NameID extraction), timestamp freshness, and nonce replay protection. Buffers request bodies with SOAP content types (text/xml, application/soap+xml, application/xml). At least one security feature must be enabled. Note: signature paths verify against the wire bytes of SignedInfo / referenced elements and do not yet apply Exclusive XML Canonicalization (xml-exc-c14n#); operators integrating with IdPs that strictly canonicalize should validate end-to-end."
      properties:
        reject_missing_security_header:
          type: boolean
          default: true
          description: Reject SOAP requests that lack a WS-Security header
        timestamp:
          type: object
          description: WS-Security Timestamp validation
          properties:
            require:
              type: boolean
              default: true
              description: Require a wsu:Timestamp element in the Security header
            max_age_seconds:
              type: integer
              format: uint64
              default: 300
              description: Maximum age (seconds) of the Created timestamp before rejection
            require_expires:
              type: boolean
              default: false
              description: Require an Expires element inside the Timestamp
            clock_skew_seconds:
              type: integer
              format: uint64
              default: 300
              description: Clock skew tolerance (seconds) for timestamp validation
        username_token:
          type: object
          description: WS-Security UsernameToken authentication
          properties:
            enabled:
              type: boolean
              default: false
              description: Enable UsernameToken authentication
            password_type:
              type: string
              enum: [PasswordText, PasswordDigest]
              default: PasswordDigest
              description: Password format. PasswordDigest hashes password with nonce+timestamp; PasswordText sends the password directly (TLS only).
            credentials:
              type: array
              items:
                type: object
                required: [username, password]
                properties:
                  username:
                    type: string
                  password:
                    type: string
              description: Allowed username/password pairs for UsernameToken authentication
        x509_signature:
          type: object
          description: X.509 certificate signature verification
          properties:
            enabled:
              type: boolean
              default: false
              description: Enable X.509 signature verification
            trusted_certs:
              type: array
              items:
                type: string
              description: PEM file paths of trusted signing certificates (matched by SHA-256 fingerprint)
            allowed_algorithms:
              type: array
              items:
                type: string
                enum: [rsa-sha256, rsa-sha1]
              default: [rsa-sha256]
              description: Allowed XMLDSig signature algorithms
            require_signed_timestamp:
              type: boolean
              default: true
              description: Require the Timestamp to be included in the signature's references
        saml:
          type: object
          description: |
            SAML 2.0 assertion validation. The plugin cryptographically verifies
            the assertion's `<Signature>` element (XMLDSIG) BEFORE checking any
            attacker-controlled fields. Verification steps, in order:
              1. Locate `<Signature>` inside the assertion (rejected if absent).
              2. Resolve the signing algorithm and confirm it is in `allowed_signature_algorithms`.
              3. Verify each `<Reference>` digest against the assertion with its own
                 `<Signature>` element removed (XMLDSIG enveloped-signature transform).
                 At least one Reference must target the enclosing Assertion ID.
              4. Match the signing certificate from `KeyInfo/X509Data/X509Certificate`
                 against `trusted_signing_certs` by SHA-256 fingerprint of the full DER
                 (leaf-cert trust — no CA chain validation; operators supply the IdP's
                 actual signing certificate(s) as published in IdP metadata).
              5. Verify `<SignatureValue>` over the `<SignedInfo>` bytes using the matched
                 cert's RSA public key.
              6. Validate Issuer (must match `trusted_issuers`), NotBefore /
                 NotOnOrAfter (with `clock_skew_seconds` tolerance), and Audience
                 (if `audience` is configured).
              7. Extract the Subject NameID into `ctx.metadata["soap_ws_saml_subject"]`
                 for downstream plugins.
            On any failure the request is rejected with HTTP 401. Signature paths use the
            wire bytes of `SignedInfo` / referenced elements and do not currently apply
            Exclusive XML Canonicalization (xml-exc-c14n#).
          properties:
            enabled:
              type: boolean
              default: false
              description: Enable SAML 2.0 assertion validation.
            trusted_issuers:
              type: array
              items:
                type: string
              description: |
                SAML Issuer URIs that are accepted as the source of an assertion.
                Required when `enabled` is true. The Issuer string inside the
                signed assertion must match one of these values exactly.
            trusted_signing_certs:
              type: array
              items:
                type: string
              description: |
                PEM file paths of IdP X.509 signing certificates. The cert
                presented inside the assertion's `KeyInfo` must match one of
                these by SHA-256 fingerprint of the full DER. Required when
                `enabled` is true. Rotating an IdP signing cert requires
                updating this list and restarting (no live reload).
            allowed_signature_algorithms:
              type: array
              items:
                type: string
                enum: [rsa-sha256, rsa-sha1]
              default: [rsa-sha256]
              description: |
                XMLDSig signature algorithms accepted on SAML assertions.
                Defaults to RSA-SHA256 only. Adding `rsa-sha1` accepts legacy
                IdPs that still emit SHA-1 signatures.
            audience:
              type: string
              description: |
                Optional. When set, the assertion's
                `Conditions/AudienceRestriction/Audience` must match this
                string exactly. Use this to bind assertions to the specific
                service this proxy fronts.
            clock_skew_seconds:
              type: integer
              format: uint64
              default: 300
              description: Clock skew tolerance (seconds) for SAML NotBefore / NotOnOrAfter.
        nonce:
          type: object
          description: Nonce replay protection cache (PasswordDigest only)
          properties:
            cache_ttl_seconds:
              type: integer
              format: uint64
              default: 300
              description: How long to remember nonces for replay detection (seconds)
            max_cache_size:
              type: integer
              format: uint64
              default: 10000
              description: Maximum nonce cache entries before eviction sweep

    CorsConfig:
      type: object
      description: "Plugin: cors — Cross-Origin Resource Sharing."
      properties:
        allowed_origins:
          type: array
          items:
            type: string
          default: ["*"]
          description: Permitted origins
        allowed_methods:
          type: array
          items:
            type: string
          default: ["GET", "HEAD", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
          description: Allowed methods
        allowed_headers:
          type: array
          items:
            type: string
          default: ["Accept", "Authorization", "Content-Type", "Origin", "X-Requested-With"]
          description: Allowed headers
        exposed_headers:
          type: array
          items:
            type: string
          default: []
          description: Response headers exposed to browser JavaScript
        allow_credentials:
          type: boolean
          default: false
          description: "Send Access-Control-Allow-Credentials: true"
        max_age:
          type: integer
          format: uint64
          default: 86400
          description: Preflight cache duration in seconds
        preflight_continue:
          type: boolean
          default: false
          description: Pass preflight requests to backend

    AccessControlConfig:
      type: object
      description: >-
        Plugin: access_control — consumer-based and group-based allow/deny for
        HTTP-family and TCP/UDP stream proxies. Evaluation order: deny
        (consumer username → group) then allow (consumer username → group).
        Deny always overrides allow. At least one of `allowed_consumers`,
        `disallowed_consumers`, `allowed_groups`, `disallowed_groups`, or
        `allow_authenticated_identity=true` must be configured. Use
        ip_restriction for IP/CIDR rules.
      properties:
        allowed_consumers:
          type: array
          items:
            type: string
          default: []
          description: >-
            Consumer usernames that are explicitly allowed. Empty list disables
            the username allow check (other allow rules still apply).
        disallowed_consumers:
          type: array
          items:
            type: string
          default: []
          description: >-
            Consumer usernames that are explicitly denied. Takes precedence
            over every allow rule.
        allowed_groups:
          type: array
          items:
            type: string
          default: []
          description: >-
            ACL group names that are explicitly allowed. The check matches if
            any of the consumer's `acl_groups` appears in this list.
        disallowed_groups:
          type: array
          items:
            type: string
          default: []
          description: >-
            ACL group names that are explicitly denied. If any of the consumer's
            `acl_groups` appears in this list the request is rejected, even when
            the username is in `allowed_consumers`.
        allow_authenticated_identity:
          type: boolean
          default: false
          description: >-
            Allow requests whose `ctx.authenticated_identity` is set by an
            external auth plugin (e.g. jwks_auth) even when no gateway Consumer
            was mapped.

    TcpConnectionThrottleConfig:
      type: object
      description: "Plugin: tcp_connection_throttle — Caps active TCP connections per Consumer when a stream auth plugin identified one, else per client IP."
      required: [max_connections_per_key]
      properties:
        max_connections_per_key:
          type: integer
          format: uint64
          minimum: 1
          description: Maximum active TCP connections allowed for one Consumer/IP key
        cleanup_interval_seconds:
          type: integer
          format: uint64
          default: 60
          minimum: 0
          description: Interval in seconds between background sweeps that remove zero-count entries from the per-key connection counter map. `0` disables the sweep (entries remain in memory until process restart).

    IpRestrictionConfig:
      type: object
      description: >-
        Plugin: ip_restriction — IP/CIDR allow/deny enforcement. Rules are
        validated and pre-parsed at config load time; invalid IPv4/IPv6
        addresses or CIDR prefixes reject plugin creation. Supports IPv4 exact
        and CIDR (`/0`-`/32`) and IPv6 exact and CIDR (`/0`-`/128`); IPv6 zone
        identifiers (e.g. `%eth0`) on rules or client IPs are stripped before
        matching. Runs on every protocol — HTTP, gRPC, WebSocket, TCP, UDP.
        At least one of `allow` or `deny` is required.
      properties:
        allow:
          type: array
          items:
            type: string
          default: []
          description: >-
            Allowed IP addresses or CIDR ranges (IPv4 or IPv6). Empty list
            disables allow-list enforcement.
        deny:
          type: array
          items:
            type: string
          default: []
          description: >-
            Denied IP addresses or CIDR ranges (IPv4 or IPv6). Always takes
            precedence over an `allow` match.
        mode:
          type: string
          enum: [allow_first, deny_first]
          default: allow_first
          description: >-
            Order of list evaluation for non-overlapping rules. `allow_first`
            (default) reject when an allow list is configured but the IP is not
            in it, otherwise check deny. `deny_first` rejects on any deny match
            first, then enforces the allow list. When the same IP matches both
            lists, deny always wins regardless of mode.

    BotDetectionConfig:
      type: object
      description: >-
        Plugin: bot_detection — case-insensitive User-Agent substring matching.
        The allow list is consulted before blocked patterns, so a User-Agent
        that contains a blocked substring can still pass if it also contains an
        allow-list entry (useful for permitting GoogleBot while blocking
        generic `bot` patterns). HTTP-family only.
      properties:
        blocked_patterns:
          type: array
          items:
            type: string
          default:
            - curl
            - wget
            - python-requests
            - python-urllib
            - scrapy
            - httpclient
            - java/
            - libwww-perl
            - mechanize
            - php/
          description: >-
            User-Agent substrings to reject. Matching is case-insensitive.
            Specifying this field replaces the defaults entirely — set to
            `[]` to disable blocking and rely solely on `allow_missing_user_agent`.
        allow_list:
          type: array
          items:
            type: string
          default: []
          description: >-
            User-Agent substrings that always pass, evaluated before
            `blocked_patterns`. Matching is case-insensitive.
        allow_missing_user_agent:
          type: boolean
          default: true
          description: >-
            When true (default), requests with no User-Agent header pass — this
            keeps health-check and load-balancer probes working. Set to false
            to reject them with `custom_response_code`.
        custom_response_code:
          type: integer
          format: uint16
          minimum: 100
          maximum: 599
          default: 403
          description: >-
            HTTP status code returned for rejected requests. Values outside
            100–599 (or non-numeric values) are silently coerced to 403.

    RequestTransformerConfig:
      type: object
      description: |
        Plugin: request_transformer — Modifies request headers, query params,
        and JSON body. Rules are validated at plugin load time; unknown
        operations or targets, missing `value` on add/update, missing
        `new_key` on rename, and CR/LF in header values are rejected.
      properties:
        rules:
          type: array
          items:
            type: object
            required: [operation, key]
            properties:
              operation:
                type: string
                enum: [add, remove, update, rename]
                description: |
                  add: insert if absent (does not overwrite).
                  update: write, creating intermediate objects as needed.
                  remove: delete the field.
                  rename: move old → new, with rollback if the destination is unreachable.
              target:
                type: string
                enum: [header, query, body]
                default: header
              key:
                type: string
                description: |
                  Header name, query param, or dot-notation body path. Body
                  paths support nested objects ('user.address.city'), array
                  indexing via numeric segments ('items.0.name'), and
                  backslash-escaped literal dots ('meta.weird\\.key').
              value:
                type: string
                description: |
                  Required for add/update. For body rules, strings that parse
                  as JSON (e.g., "42", "true", '{"a":1}') are inserted as the
                  parsed type; otherwise kept as a JSON string. Header values
                  must not contain CR or LF.
              new_key:
                type: string
                description: Required for rename operations.

    ResponseTransformerConfig:
      type: object
      description: |
        Plugin: response_transformer — Modifies response headers and JSON
        body. Same validation rules as request_transformer (unknown
        operations / targets, missing value / new_key, and CR/LF in header
        values are rejected at plugin load time).
      properties:
        rules:
          type: array
          items:
            type: object
            required: [operation, key]
            properties:
              operation:
                type: string
                enum: [add, remove, update, rename]
              target:
                type: string
                enum: [header, body]
                default: header
              key:
                type: string
                description: |
                  Header name or dot-notation body path. Body paths support
                  nested objects, array indexing ('items.0'), and
                  backslash-escaped literal dots.
              value:
                type: string
                description: |
                  Required for add/update. Header values must not contain CR
                  or LF.
              new_key:
                type: string
                description: Required for rename operations.

    CompressionConfig:
      type: object
      description: "Plugin: compression — On-the-fly response compression (gzip, brotli) and optional request decompression."
      properties:
        algorithms:
          type: array
          items:
            type: string
            enum: [gzip, br, brotli]
          default: [gzip, br]
          description: "Enabled compression algorithms in server preference order"
        min_content_length:
          type: integer
          format: uint64
          default: 256
          description: "Skip compression for bodies smaller than this (bytes)"
        content_types:
          type: array
          items:
            type: string
          description: "Content-type whitelist. Defaults to 10 common text/application types"
        disable_on_etag:
          type: boolean
          default: false
          description: "Skip compression when the response has an ETag header"
        remove_accept_encoding:
          type: boolean
          default: true
          description: "Strip Accept-Encoding from backend request so backend sends uncompressed"
        gzip_level:
          type: integer
          minimum: 1
          maximum: 9
          default: 6
          description: "Gzip compression level (1=fastest, 9=best)"
        brotli_quality:
          type: integer
          minimum: 0
          maximum: 11
          default: 4
          description: "Brotli quality (0=fastest, 11=best)"
        decompress_request:
          type: boolean
          default: false
          description: "Enable decompression of gzip/brotli request bodies"
        max_decompressed_request_size:
          type: integer
          format: uint64
          default: 10485760
          description: "Zip bomb protection: max decompressed request body size in bytes (10 MB)"

    SseConfig:
      type: object
      description: "Plugin: sse — Server-Sent Events stream handler. Validates SSE client criteria, shapes requests, and ensures proper streaming response headers."
      properties:
        require_get_method:
          type: boolean
          default: true
          description: "Reject non-GET requests with 405 (SSE is read-only)"
        require_accept_header:
          type: boolean
          default: true
          description: "Require Accept: text/event-stream header (406 if missing)"
        strip_accept_encoding:
          type: boolean
          default: true
          description: "Strip Accept-Encoding to prevent compressed responses breaking SSE framing"
        add_no_buffering_header:
          type: boolean
          default: true
          description: "Add X-Accel-Buffering: no to disable nginx/ALB response buffering"
        strip_content_length:
          type: boolean
          default: true
          description: "Remove Content-Length from SSE responses (streams are indefinite)"
        retry_ms:
          type: integer
          format: uint64
          description: "EventSource reconnection hint in milliseconds"
        force_sse_content_type:
          type: boolean
          default: false
          description: "Force Content-Type: text/event-stream even if backend returns something else"
        wrap_non_sse_responses:
          type: boolean
          default: false
          description: "Wrap non-SSE response bodies in data: ...\\n\\n SSE event framing (enables response buffering)"

    RateLimitingConfig:
      type: object
      description: "Plugin: rate_limiting — Per-IP, per-consumer, or per-SPIFFE-identity request rate limiting. On stream proxies, consumer mode uses the identified stream Consumer when available and otherwise falls back to client IP; `spiffe_identity` keys on the SPIFFE ID extracted by the `spiffe_identity` / `mtls_auth` mesh chain and falls back to client IP when no SPIFFE identity is present. Supports centralized Redis-backed mode for coordinating rate limits across multiple gateway instances. At least one of the preset fields (`requests_per_second`/`requests_per_minute`/`requests_per_hour`) or the custom-window pair (`window_seconds` + `max_requests`) must be configured."
      properties:
        limit_by:
          type: string
          enum: [ip, consumer, spiffe_identity, spiffe]
          default: ip
          description: |
            Rate limit key:
            - `ip` (default) — client IP.
            - `consumer` — identified consumer (HTTP) or stream consumer (TCP/UDP); falls back to client IP when no consumer is present.
            - `spiffe_identity` — SPIFFE ID extracted from peer certificate (mesh authn). `spiffe` is accepted as an alias.
        expose_headers:
          type: boolean
          default: false
          description: Inject x-ratelimit-* headers on requests and responses
        requests_per_second:
          type: integer
          format: uint64
          minimum: 1
          description: Max requests per second
        requests_per_minute:
          type: integer
          format: uint64
          minimum: 1
          description: Max requests per minute
        requests_per_hour:
          type: integer
          format: uint64
          minimum: 1
          description: Max requests per hour
        window_seconds:
          type: integer
          format: uint64
          minimum: 1
          description: Custom rate-limit window length in seconds. Must be paired with `max_requests`. Use instead of the per-second/minute/hour presets when a non-standard window is needed.
        max_requests:
          type: integer
          format: uint64
          minimum: 1
          description: Maximum requests permitted within `window_seconds`. Must be paired with `window_seconds`.
        sync_mode:
          type: string
          enum: [local, redis]
          default: local
          description: "Rate limit state storage: 'local' (in-memory per instance) or 'redis' (centralized across instances). Any RESP-compatible server works (Redis, Valkey, DragonflyDB, KeyDB, Garnet)."
        redis_url:
          type: string
          description: "Redis connection URL (e.g., redis://host:6379/0). Required when sync_mode is 'redis'."
        redis_tls:
          type: boolean
          default: false
          description: "Enable TLS for the Redis connection (upgrades redis:// to rediss://). CA verification uses gateway-level FERRUM_TLS_CA_BUNDLE_PATH; skip-verify uses FERRUM_TLS_NO_VERIFY."
        redis_key_prefix:
          type: string
          default: "ferrum:rate_limiting"
          description: Key prefix for all Redis keys (namespace isolation)
        redis_pool_size:
          type: integer
          default: 4
          description: Number of multiplexed Redis connections
        redis_username:
          type: string
          description: Redis username for ACL-based authentication (Redis 6+)
        redis_password:
          type: string
          description: Redis password for authentication
        redis_connect_timeout_seconds:
          type: integer
          default: 5
          description: Redis connection timeout in seconds
        redis_health_check_interval_seconds:
          type: integer
          default: 5
          description: Interval in seconds for health check pings when Redis is marked unavailable

    RequestSizeLimitingConfig:
      type: object
      description: |
        Plugin: request_size_limiting — Per-proxy request body size limits.
        Rejects oversized requests with HTTP 413 in three places: an early
        Content-Length fast path (`on_request_received`), a buffered-body
        check when another plugin already loaded the body (`before_proxy`),
        and a final post-transform check before forwarding to the backend
        (`on_final_request_body`).
      required:
        - max_bytes
      properties:
        max_bytes:
          type: integer
          format: uint64
          minimum: 1
          description: >-
            Maximum allowed request body size in bytes. Required and must be
            greater than zero — the gateway rejects plugin creation when
            missing or 0.

    ResponseSizeLimitingConfig:
      type: object
      description: |
        Plugin: response_size_limiting — Per-proxy response body size limits.
        Rejects oversized responses with HTTP 502 either via Content-Length
        fast path (`after_proxy`) or after final buffering when
        `require_buffered_check: true` is set (`on_final_response_body`).
        Without `require_buffered_check`, chunked/streaming responses
        without Content-Length cannot be enforced by this plugin — the
        global `FERRUM_MAX_RESPONSE_BODY_SIZE_BYTES` limit applies in that
        case via the gateway's `SizeLimitedStreamingResponse` adapter.
      required:
        - max_bytes
      properties:
        max_bytes:
          type: integer
          format: uint64
          minimum: 1
          description: >-
            Maximum allowed response body size in bytes. Required and must be
            greater than zero — the gateway rejects plugin creation when
            missing or 0.
        require_buffered_check:
          type: boolean
          default: false
          description: Force response body buffering so this plugin can enforce the size limit on chunked/streaming responses without Content-Length.

    FaultInjectionConfig:
      type: object
      additionalProperties: false
      description: "Plugin: fault_injection — Probabilistic aborts and latency injection for chaos testing. HTTP-family faults run in before_proxy; stream faults run on stream connect."
      properties:
        abort:
          type: object
          additionalProperties: false
          properties:
            status_code:
              type: integer
              minimum: 200
              maximum: 599
              description: Final HTTP status returned when the abort fault triggers
            percentage:
              type: number
              minimum: 0
              exclusiveMinimum: true
              maximum: 100
              description: Abort probability as a percentage
            grpc_status:
              type: integer
              minimum: 0
              maximum: 16
              description: Optional gRPC status trailer emitted for gRPC rejects
            body:
              type: string
              default: ""
              description: HTTP response body returned with the abort
          required: [status_code, percentage]
        delay:
          type: object
          additionalProperties: false
          properties:
            duration_ms:
              type: integer
              format: uint64
              minimum: 1
              maximum: 3600000
              description: Delay duration before continuing or aborting
            percentage:
              type: number
              minimum: 0
              exclusiveMinimum: true
              maximum: 100
              description: Delay probability as a percentage
          required: [duration_ms, percentage]
      anyOf:
        - required: [abort]
        - required: [delay]

    BodyValidatorConfig:
      type: object
      description: "Plugin: body_validator — JSON Schema, XML, and gRPC protobuf validation for request/response bodies."
      properties:
        json_schema:
          type: object
          description: JSON Schema for request body validation
        required_fields:
          type: array
          items:
            type: string
          default: []
          description: Simple required field names in request body
        validate_xml:
          type: boolean
          default: false
          description: Enable XML well-formedness validation
        required_xml_elements:
          type: array
          items:
            type: string
          default: []
          description: Required XML element names
        content_types:
          type: array
          items:
            type: string
          default: ["application/json", "application/xml", "text/xml"]
          description: MIME types to validate
        response_json_schema:
          type: object
          description: JSON Schema for response body validation
        response_required_fields:
          type: array
          items:
            type: string
          default: []
          description: Required field names in response
        response_validate_xml:
          type: boolean
          default: false
        response_required_xml_elements:
          type: array
          items:
            type: string
          default: []
        response_content_types:
          type: array
          items:
            type: string
          default: ["application/json", "application/xml", "text/xml"]
        protobuf_descriptor_path:
          type: string
          description: Path to compiled FileDescriptorSet binary (protoc --descriptor_set_out --include_imports)
        protobuf_request_type:
          type: string
          description: Default fully-qualified protobuf message type for request validation
        protobuf_response_type:
          type: string
          description: Default fully-qualified protobuf message type for response validation
        protobuf_method_messages:
          type: object
          additionalProperties:
            type: object
            properties:
              request:
                type: string
                description: Fully-qualified protobuf message type for request validation
              response:
                type: string
                description: Fully-qualified protobuf message type for response validation
          description: Per-method message type overrides keyed by gRPC path
        protobuf_reject_unknown_fields:
          type: boolean
          default: false
          description: Reject messages containing field numbers not in the descriptor

    RequestTerminationConfig:
      type: object
      description: >-
        Plugin: request_termination — Returns a canned response without
        proxying to the backend. The response body and `content-type` are
        rendered once at construction time so the request hot path is
        allocation-light. Useful for maintenance windows, mocking, or
        path/header-based short-circuiting. Runs after CORS so browser
        preflight responses are still emitted correctly. HTTP-family only.
      properties:
        status_code:
          type: integer
          format: uint16
          minimum: 100
          maximum: 599
          default: 503
          description: >-
            HTTP status code returned. Values outside 100–599 (or non-numeric
            values) are coerced to 503.
        content_type:
          type: string
          default: application/json
          description: >-
            `Content-Type` header value. The default-body renderer uses this to
            choose between JSON, XML, and plain-text formatting (substring
            match for `json` / `xml`).
        body:
          type: string
          default: ""
          description: >-
            Explicit response body. When set (non-empty) it is returned
            verbatim and `message` is ignored.
        message:
          type: string
          default: Service unavailable
          description: >-
            Used to build the default body when `body` is empty. Rendered as a
            JSON `message` field, an XML `<message>` element, or plain text
            depending on `content_type`. JSON and XML escaping are applied
            automatically.
        trigger:
          type: object
          description: >-
            Optional trigger condition. Without a trigger every request on the
            proxy is terminated (maintenance-mode default). When both
            `path_prefix` and `header` are provided, the plugin uses
            `path_prefix` and ignores `header` — configure only one at a time
            for predictable behavior.
          properties:
            path_prefix:
              type: string
              description: >-
                Only terminate when the request path starts with this prefix.
                Takes precedence over `header` if both are set.
            header:
              type: string
              description: >-
                Only terminate when this request header is present. The
                comparison is case-insensitive on the header name. Ignored
                when `path_prefix` is also set.
            header_value:
              type: string
              default: ""
              description: >-
                Optional exact value for `header`. Empty (default) matches
                any value, so the trigger fires whenever the header is
                present.

    ResponseMockConfig:
      type: object
      description: "Plugin: response_mock — Returns mock responses for API testing before backends are ready. Rule paths are relative to the proxy's listen_path."
      required:
        - rules
      properties:
        rules:
          type: array
          description: Mock rules evaluated in order (first match wins)
          minItems: 1
          items:
            type: object
            required:
              - path
            properties:
              method:
                type: string
                description: HTTP method to match (omit to match all methods)
              path:
                type: string
                description: "Path relative to the proxy's listen_path (e.g., /users for a proxy with listen_path /api/v1). Regex supported with ~ prefix (auto-anchored). For root or regex listen_paths, uses full request path."
              status_code:
                type: integer
                format: uint16
                description: HTTP status code to return (default 200)
              headers:
                type: object
                additionalProperties:
                  type: string
                description: Response headers (default content-type application/json)
              body:
                type: string
                description: Response body string
              delay_ms:
                type: integer
                format: uint64
                description: Simulated latency in milliseconds (default 0)
        passthrough_on_no_match:
          type: boolean
          description: "If true, unmatched requests continue to the backend. If false (default), returns 404."

    SpecExposeConfig:
      type: object
      description: "Plugin: spec_expose — Exposes API specification documents (OpenAPI, WSDL, WADL) on a /specz sub-path. Unauthenticated. Only works with prefix-based listen_path proxies (HTTP only). Successful upstream fetches are capped by max_response_body_bytes and cached in-process for cache_ttl_seconds (default 300s) to avoid hitting the upstream document store on every /specz request; failures are not cached."
      required:
        - spec_url
      properties:
        spec_url:
          type: string
          description: "Full URL (http or https only) to fetch the API specification document (e.g., https://internal-service/docs/openapi.yaml)"
        content_type:
          type: string
          description: "Override the response Content-Type. When omitted, the upstream response's Content-Type is passed through."
        tls_no_verify:
          type: boolean
          description: "Skip TLS certificate verification when fetching the spec. Defaults to the gateway's FERRUM_TLS_NO_VERIFY setting."
        cache_ttl_seconds:
          type: integer
          format: uint64
          default: 300
          description: "Time-to-live for the in-process spec body cache (seconds). The first /specz request fetches the spec from spec_url and stores it; subsequent requests within the TTL window return the cached copy without re-fetching. Failed fetches are never cached. Set to 0 to disable caching entirely (every request re-fetches)."
        max_response_body_bytes:
          type: integer
          format: uint64
          minimum: 1
          default: 26214400
          description: "Maximum upstream spec response body size to buffer and cache. The body is streamed with this cap so oversized responses are rejected with HTTP 502 before unbounded memory growth."

    LoadTestingConfig:
      type: object
      description: "Plugin: load_testing — On-demand proxy load testing triggered by X-Loadtesting-Key header. Spawns concurrent clients through the gateway's own proxy listener (HTTP only)."
      required:
        - key
        - concurrent_clients
        - duration_seconds
      properties:
        key:
          type: string
          description: Secret value that the X-Loadtesting-Key header must match to trigger the load test
        concurrent_clients:
          type: integer
          format: uint64
          minimum: 1
          maximum: 10000
          description: Number of concurrent virtual clients
        duration_seconds:
          type: integer
          format: uint64
          minimum: 1
          maximum: 3600
          description: How long the test runs in seconds
        ramp:
          type: boolean
          default: false
          description: When true, clients start gradually over the duration instead of all at once
        request_timeout_ms:
          type: integer
          format: uint64
          default: 30000
          minimum: 1
          description: "Per-request timeout in milliseconds. Prevents workers from hanging on streaming/long-lived responses (SSE, long-poll)"
        gateway_port:
          type: integer
          format: uint16
          description: "Local gateway port for synthetic requests. Defaults to FERRUM_PROXY_HTTP_PORT (or FERRUM_PROXY_HTTPS_PORT when gateway_tls is enabled) or 8000/8443"
        gateway_tls:
          type: boolean
          default: false
          description: Use HTTPS for local loopback synthetic requests
        gateway_tls_no_verify:
          type: boolean
          description: "Skip TLS cert verification for loopback connections. Defaults to true when gateway_tls is enabled (gateway cert typically won't match 127.0.0.1)"
        gateway_addresses:
          type: array
          items:
            type: string
          description: "Remote gateway URLs to fan out the trigger to. Each receives the original request WITH the key header so it starts its own local load test"

    RequestMirrorConfig:
      type: object
      description: |
        Plugin: request_mirror — Duplicates live proxy traffic to a secondary
        destination for shadow testing, validation, or migration checks
        without affecting client responses. Mirrored requests are
        fire-and-forget: spawned via `tokio::spawn`, the gateway never waits
        for the mirror response and mirror failures never propagate to the
        client. Mirror response metadata (status, size, latency) is captured
        via a `tokio::sync::watch` channel and surfaced through transaction
        logs.
      required:
        - mirror_host
      properties:
        mirror_host:
          type: string
          description: "Hostname or IP of the mirror target. Normalized to ASCII-lowercase at config load."
        mirror_port:
          type: integer
          format: uint16
          minimum: 1
          maximum: 65535
          description: "Port of the mirror target. Defaults to 80 (http) or 443 (https)."
        mirror_protocol:
          type: string
          enum: [http, https]
          default: http
          description: "Transport protocol used for the mirror request."
        mirror_path:
          type: string
          description: "Override path used for the mirror request. When omitted, the original request path is used."
        percentage:
          type: number
          format: double
          minimum: 0.0
          maximum: 100.0
          default: 100.0
          description: "Percentage of requests to mirror. Granularity is 0.1% (deterministic counter-based sampling, no RNG)."
        mirror_request_body:
          type: boolean
          default: true
          description: "When true, the request body is forwarded to the mirror target. Binary-safe (preserves gRPC protobuf and other non-UTF-8 payloads). Forces request-body buffering for this proxy."
        max_response_body_bytes:
          type: integer
          format: uint64
          minimum: 1
          default: 1048576
          description: "Cap on bytes read from a mirror response when deriving its size. Only consulted when the response has no `content-length` header — streaming is aborted as soon as the limit is crossed and the mirror task records the truncated count. Bytes are discarded after measurement, so this only bounds memory pressure from misbehaving mirror sinks. Default is 1 MiB."

    ServerlessFunctionConfig:
      type: object
      description: |
        Plugin: serverless_function — Invokes AWS Lambda, Azure Functions, or
        Google Cloud Functions as middleware in the proxy pipeline. In
        `pre_proxy` mode the function response can inject request headers and
        metadata before the backend call. In `terminate` mode the function
        response is returned directly to the client (HTTP only — gRPC
        rejection normalization would drop the body, so terminate mode on
        gRPC requests is rejected with 500). Cloud credential fields fall
        back to well-known environment variables.
      required:
        - provider
      properties:
        provider:
          type: string
          enum: [aws_lambda, azure_functions, gcp_cloud_functions]
          description: "Cloud provider for the serverless function."
        mode:
          type: string
          enum: [pre_proxy, terminate]
          default: pre_proxy
          description: |
            pre_proxy: invoke and inject headers/metadata, then continue.
            terminate: invoke and return response to client (HTTP only).
        function_url:
          type: string
          description: "HTTPS trigger URL. Required for azure_functions and gcp_cloud_functions; ignored for aws_lambda (URL is derived from region + function name)."
        aws_region:
          type: string
          description: "AWS region (aws_lambda only). Falls back to AWS_DEFAULT_REGION, then AWS_REGION env vars."
        aws_access_key_id:
          type: string
          description: "IAM access key (aws_lambda only). Falls back to AWS_ACCESS_KEY_ID env var."
        aws_secret_access_key:
          type: string
          description: "IAM secret key (aws_lambda only). Falls back to AWS_SECRET_ACCESS_KEY env var."
        aws_function_name:
          type: string
          description: "Lambda function name or ARN (aws_lambda only). Falls back to AWS_LAMBDA_FUNCTION_NAME env var."
        aws_session_token:
          type: string
          description: "STS session token (aws_lambda only). Falls back to AWS_SESSION_TOKEN env var."
        aws_qualifier:
          type: string
          description: "Optional version/alias qualifier (e.g., $LATEST, prod)."
        azure_function_key:
          type: string
          description: "Function key for x-functions-key auth (azure_functions only). Falls back to AZURE_FUNCTIONS_KEY env var."
        gcp_bearer_token:
          type: string
          description: "Bearer token for Authorization header (gcp_cloud_functions only). Falls back to GCP_CLOUD_FUNCTIONS_BEARER_TOKEN env var."
        forward_body:
          type: boolean
          default: false
          description: "Include request body in function payload (forces request-body buffering for JSON POST requests)."
        forward_headers:
          type: array
          items:
            type: string
          description: "Header names to forward into the function payload (lowercased at config load)."
        forward_query_params:
          type: boolean
          default: false
          description: "Include query parameters in function payload."
        timeout_ms:
          type: integer
          format: uint64
          minimum: 1
          default: 5000
          description: "Function invocation timeout in milliseconds. Must be > 0."
        max_response_body_bytes:
          type: integer
          format: uint64
          minimum: 1
          default: 10485760
          description: "Max function response body size (10 MiB default). Must be > 0."
        on_error:
          type: string
          enum: [reject, continue]
          default: reject
          description: "reject: return error to client. continue: skip and proxy normally."
        error_status_code:
          type: integer
          format: uint16
          minimum: 100
          maximum: 599
          default: 502
          description: "HTTP status when rejecting on error. Must be in range 100-599."

    ResponseCachingConfig:
      type: object
      description: "Plugin: response_caching — In-memory HTTP response caching keyed by matched proxy, method, path, query, optional consumer, and Vary-selected request headers. Honors Cache-Control, ETag/Last-Modified revalidation (304), Vary, and never caches responses with Set-Cookie. Includes an LRU cacheability predictor that suppresses repeat cache lookups for variants known to be uncacheable. HTTP only."
      properties:
        ttl_seconds:
          type: integer
          format: uint64
          default: 300
          description: "Default TTL in seconds when the backend response has no max-age/s-maxage. Backend cache-control directives take precedence when respect_cache_control is true."
        max_entries:
          type: integer
          format: uint64
          default: 10000
          description: Maximum number of cached entries before eviction of expired/oldest entries
        max_entry_size_bytes:
          type: integer
          format: uint64
          default: 1048576
          description: Maximum size of a single cached response body (1 MiB by default). Larger responses are not cached.
        max_total_size_bytes:
          type: integer
          format: uint64
          default: 104857600
          description: Maximum total in-memory cache size across all entries (100 MiB by default)
        cacheable_methods:
          type: array
          items:
            type: string
          default: ["GET", "HEAD"]
          description: HTTP methods eligible for caching (uppercased)
        cacheable_status_codes:
          type: array
          items:
            type: integer
            format: uint16
          default: [200, 301, 404]
          description: Response status codes eligible for caching
        respect_cache_control:
          type: boolean
          default: true
          description: "Honor backend Cache-Control directives (no-store, private, no-cache, max-age, s-maxage, must-revalidate, public)"
        respect_no_cache:
          type: boolean
          default: true
          description: "Bypass cache lookup when the client request sends Cache-Control: no-cache or no-store"
        vary_by_headers:
          type: array
          items:
            type: string
          default: []
          description: "Additional request header names (lowercased) to include in the cache key even when the backend does not send Vary. Merged with any backend Vary response header."
        cache_key_include_query:
          type: boolean
          default: true
          description: Include sorted query parameters in the cache key
        cache_key_include_consumer:
          type: boolean
          default: false
          description: Partition the cache by authenticated identity / consumer. Required if you want to share-cache responses for Authorization-bearing requests without relying on Cache-Control public/s-maxage/must-revalidate.
        add_cache_status_header:
          type: boolean
          default: true
          description: "Add X-Cache-Status (MISS, HIT, BYPASS, REVALIDATED, PREDICTED-BYPASS) to downstream responses"
        invalidate_on_unsafe_methods:
          type: boolean
          default: true
          description: "Invalidate cached entries for the matched path (and descendants under the same path prefix) on non-cacheable methods (POST, PUT, PATCH, DELETE)"

    GraphqlConfig:
      type: object
      description: "Plugin: graphql — Query depth/complexity limiting, introspection control, per-operation rate limiting."
      properties:
        max_depth:
          type: integer
          format: uint32
          description: Maximum allowed query nesting depth
        max_complexity:
          type: integer
          format: uint32
          description: Maximum allowed field count
        max_aliases:
          type: integer
          format: uint32
          description: Maximum allowed alias count
        introspection_allowed:
          type: boolean
          default: true
          description: Whether introspection queries are permitted
        limit_by:
          type: string
          enum: [ip, consumer]
          default: ip
          description: Rate limit key
        type_rate_limits:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/RateSpec"
          description: "Rate limits by operation type (query, mutation, subscription)"
        operation_rate_limits:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/RateSpec"
          description: Rate limits by named operation

    GrpcMethodRouterConfig:
      type: object
      description: >-
        Plugin: grpc_method_router — Per-method access control and rate limiting
        for gRPC services. Parses the gRPC path (/package.Service/Method) and
        populates grpc_service, grpc_method, grpc_full_method metadata.
      properties:
        allow_methods:
          type: array
          items:
            type: string
          description: >-
            Only these gRPC methods are permitted (allowlist). Each entry is a
            full method path like /package.Service/Method.
        deny_methods:
          type: array
          items:
            type: string
          default: []
          description: >-
            These gRPC methods are explicitly blocked. Deny takes precedence
            over allow.
        method_rate_limits:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/RateSpec"
          description: >-
            Per-method rate limits keyed by full method path
            (e.g., /myapp.UserService/CreateUser).
        limit_by:
          type: string
          enum: [ip, consumer]
          default: ip
          description: >-
            Rate limit key. When consumer, uses identified_consumer then
            authenticated_identity then client IP as fallback.

    GrpcWebConfig:
      type: object
      description: >-
        Plugin: grpc_web — Translates between gRPC-Web (browser-compatible)
        and native gRPC (HTTP/2) wire formats. Supports binary
        (application/grpc-web) and text (application/grpc-web-text) encoding.
      properties:
        expose_headers:
          type: array
          items:
            type: string
          description: >-
            Additional response headers to include in
            Access-Control-Expose-Headers for browser CORS compatibility.
            grpc-status and grpc-message are always exposed.

    GrpcDeadlineConfig:
      type: object
      description: >-
        Plugin: grpc_deadline — Manages the grpc-timeout metadata header.
        Supports all gRPC timeout units (H, M, S, m, u, n).
      properties:
        max_deadline_ms:
          type: integer
          format: uint64
          description: Cap incoming deadlines to this value (milliseconds)
        default_deadline_ms:
          type: integer
          format: uint64
          description: Inject grpc-timeout when client omits it
        subtract_gateway_processing:
          type: boolean
          default: false
          description: >-
            Subtract elapsed gateway processing time before forwarding.
            Returns gRPC DEADLINE_EXCEEDED (status 4) if remaining time is zero.
        reject_no_deadline:
          type: boolean
          default: false
          description: >-
            Reject requests missing grpc-timeout with HTTP 400. Takes
            precedence over default_deadline_ms.

    AiSemanticCacheConfig:
      type: object
      description: "Plugin: ai_semantic_cache — Caches LLM responses keyed by normalized prompts (v1 exact-match with whitespace/case normalization, SHA-256 hash). Supports local DashMap and Redis storage."
      properties:
        ttl_seconds:
          type: integer
          format: uint64
          default: 300
          description: Time-to-live for cached entries in seconds
        max_entries:
          type: integer
          format: uint64
          default: 10000
          description: Maximum number of cached entries (local mode)
        max_entry_size_bytes:
          type: integer
          format: uint64
          default: 1048576
          description: Maximum size of a single cached response body in bytes (1 MiB)
        max_total_size_bytes:
          type: integer
          format: uint64
          default: 104857600
          description: Maximum total cache size in bytes (100 MiB, local mode)
        include_model_in_key:
          type: boolean
          default: true
          description: Include the model name in the cache key (different models get separate cache entries)
        include_params_in_key:
          type: boolean
          default: true
          description: Include request parameters (temperature, top_p, max_tokens) in the cache key. Default `true` — different sampling params produce different responses and must not collide. Set `false` only when cross-parameter cache reuse is intentional.
        scope_by_consumer:
          type: boolean
          default: true
          description: Scope cache entries per consumer (authenticated consumer ID is included in the cache key). Default `true` — different consumers must not see each other's cached responses. Set `false` only on a public LLM proxy with no per-tenant data.
        sync_mode:
          type: string
          enum: [local, redis]
          default: local
          description: "Storage backend: 'local' (in-memory DashMap) or 'redis' (centralized Redis)"
        redis_url:
          type: string
          description: Redis connection URL (required when sync_mode is redis)
        redis_tls:
          type: boolean
          default: false
          description: Enable TLS for Redis connection
        redis_key_prefix:
          type: string
          default: "ferrum:ai_semantic_cache"
          description: Redis key namespace prefix
        redis_pool_size:
          type: integer
          format: uint64
          default: 4
          description: Number of multiplexed Redis connections
        redis_connect_timeout_seconds:
          type: integer
          format: uint64
          default: 5
          description: Redis connection timeout in seconds
        redis_health_check_interval_seconds:
          type: integer
          format: uint64
          default: 5
          description: Interval for background health check pings when Redis is unavailable
        redis_username:
          type: string
          description: Redis ACL username (Redis 6+)
        redis_password:
          type: string
          description: Redis password

    AiTokenMetricsConfig:
      type: object
      description: "Plugin: ai_token_metrics — Extracts token usage from LLM response bodies."
      properties:
        provider:
          type: string
          default: auto
          description: "LLM provider format (auto, openai, anthropic, google, cohere, mistral, bedrock)"
        include_model:
          type: boolean
          default: true
          description: Extract model name into metadata
        include_token_details:
          type: boolean
          default: true
          description: Extract prompt/completion tokens separately
        metadata_prefix:
          type: string
          default: ai
          description: Prefix for metadata keys
        cost_per_prompt_token:
          type: number
          format: double
          description: Calculate estimated cost per request (prompt tokens)
        cost_per_completion_token:
          type: number
          format: double
          description: Calculate estimated cost per request (completion tokens)

    AiRequestGuardConfig:
      type: object
      description: "Plugin: ai_request_guard — Validates and constrains AI/LLM API requests."
      properties:
        max_tokens_limit:
          type: integer
          description: Maximum allowed max_tokens value
        enforce_max_tokens:
          type: string
          enum: [reject, clamp]
          default: reject
          description: Reject (400 error) or clamp (silently cap) max_tokens
        default_max_tokens:
          type: integer
          description: Inject max_tokens if not present
        allowed_models:
          type: array
          items:
            type: string
          default: []
          description: Whitelist of allowed model names (empty = allow all)
        blocked_models:
          type: array
          items:
            type: string
          default: []
          description: Blacklist of model names (takes precedence over allowed)
        require_user_field:
          type: boolean
          default: false
          description: Require user field in request body
        max_messages:
          type: integer
          description: Maximum messages in the messages array
        max_prompt_characters:
          type: integer
          description: Maximum total characters across messages
        temperature_range:
          type: array
          items:
            type: number
            format: double
          minItems: 2
          maxItems: 2
          description: "Allowed [min, max] range for temperature"
        block_system_prompts:
          type: boolean
          default: false
          description: "Reject requests with role: system messages"
        required_metadata_fields:
          type: array
          items:
            type: string
          default: []
          description: Required fields in request body

    AiRateLimiterConfig:
      type: object
      description: "Plugin: ai_rate_limiter — Token-aware rate limiting for LLM APIs. Supports centralized Redis-backed mode for cross-instance token budget coordination."
      properties:
        token_limit:
          type: integer
          default: 100000
          description: Maximum tokens allowed per window
        window_seconds:
          type: integer
          default: 60
          description: Sliding window duration in seconds
        count_mode:
          type: string
          enum: [total_tokens, prompt_tokens, completion_tokens]
          default: total_tokens
          description: What to count
        limit_by:
          type: string
          enum: [consumer, ip]
          default: consumer
          description: Rate limit key
        expose_headers:
          type: boolean
          default: false
          description: Inject x-ai-ratelimit-* headers
        provider:
          type: string
          default: auto
          description: LLM provider format for token extraction
        sync_mode:
          type: string
          enum: [local, redis]
          default: local
          description: "Token budget storage: 'local' (in-memory) or 'redis' (centralized). Any RESP-compatible server works."
        redis_url:
          type: string
          description: "Redis connection URL. Required when sync_mode is 'redis'."
        redis_tls:
          type: boolean
          default: false
          description: "Enable TLS for the Redis connection. CA verification uses gateway-level FERRUM_TLS_CA_BUNDLE_PATH; skip-verify uses FERRUM_TLS_NO_VERIFY."
        redis_key_prefix:
          type: string
          default: "ferrum:ai_rate_limiter"
          description: Key prefix for all Redis keys
        redis_pool_size:
          type: integer
          default: 4
          description: Number of multiplexed Redis connections
        redis_username:
          type: string
          description: Redis username for ACL authentication
        redis_password:
          type: string
          description: Redis password
        redis_connect_timeout_seconds:
          type: integer
          default: 5
          description: Redis connection timeout in seconds
        redis_health_check_interval_seconds:
          type: integer
          default: 5
          description: Health check ping interval when Redis is unavailable

    AiPromptShieldConfig:
      type: object
      description: "Plugin: ai_prompt_shield — PII detection and redaction in prompts."
      properties:
        action:
          type: string
          enum: [reject, redact, warn]
          default: reject
          description: Action when PII is detected
        patterns:
          type: array
          items:
            type: string
          default: [ssn, credit_card, api_key, aws_key]
          description: "Built-in patterns: ssn, credit_card, email, phone_us, api_key, aws_key, ip_address, iban"
        custom_patterns:
          type: array
          items:
            type: object
            required: [name, regex]
            properties:
              name:
                type: string
              regex:
                type: string
          default: []
          description: "Custom {name, regex} patterns"
        scan_fields:
          type: string
          enum: [content, all]
          default: content
          description: Which message fields to scan
        exclude_roles:
          type: array
          items:
            type: string
          default: []
          description: Message roles to skip scanning
        redaction_placeholder:
          type: string
          default: "[REDACTED:{type}]"
          description: Template for redacted text
        max_scan_bytes:
          type: integer
          default: 1048576
          description: Skip scanning if body exceeds this size

    AiResponseGuardConfig:
      type: object
      description: "Plugin: ai_response_guard — Validates and filters AI/LLM API responses for PII, blocked content, and structural requirements."
      properties:
        action:
          type: string
          enum: [reject, redact, warn]
          default: reject
          description: Action when a violation is detected in the response body
        pii_patterns:
          type: array
          items:
            type: string
          default: []
          description: "Built-in PII pattern names to scan for (e.g., ssn, credit_card, email, phone_us, api_key, aws_key, ip_address, iban)"
        custom_pii_patterns:
          type: array
          items:
            type: object
            required: [name, regex]
            properties:
              name:
                type: string
                description: Pattern identifier used in redaction placeholders and violation reports
              regex:
                type: string
                description: Regular expression pattern to match
          default: []
          description: "Custom PII {name, regex} patterns for domain-specific detection"
        blocked_phrases:
          type: array
          items:
            type: string
          default: []
          description: Exact phrases to block in response content (case-insensitive)
        blocked_patterns:
          type: array
          items:
            type: object
            required: [name, regex]
            properties:
              name:
                type: string
                description: Pattern identifier for violation reports
              regex:
                type: string
                description: Regular expression pattern to match
          default: []
          description: "Custom {name, regex} patterns for blocking arbitrary content in responses"
        scan_fields:
          type: string
          enum: [content, all]
          default: content
          description: "Which response fields to scan: 'content' scans message content only, 'all' scans the entire response body"
        redaction_placeholder:
          type: string
          default: "[REDACTED:{type}]"
          description: "Template for redacted text. {type} is replaced with the pattern name"
        max_scan_bytes:
          type: integer
          default: 1048576
          description: Skip scanning if response body exceeds this size in bytes
        require_json:
          type: boolean
          default: false
          description: Reject responses that are not valid JSON
        required_fields:
          type: array
          items:
            type: string
          default: []
          description: JSON field names that must be present in the response body
        max_completion_length:
          type: integer
          default: 0
          description: Maximum allowed character length of completion content. 0 = no limit

    AiFederationConfig:
      type: object
      description: "Plugin: ai_federation — Universal AI gateway. Routes OpenAI Chat Completions-format requests to any of 11 supported AI providers (OpenAI, Anthropic, Google Gemini, Google Vertex AI, Azure OpenAI, AWS Bedrock, Mistral, Cohere, xAI, DeepSeek, Meta Llama, Hugging Face), translating requests to native provider formats and normalizing responses back to OpenAI format. Uses 'terminate and respond' pattern: makes its own outbound HTTP call and bypasses normal proxy dispatch. Supports priority-ordered fallback across providers. NOTE: Outbound calls use the shared PluginHttpClient and only honor global TLS settings (FERRUM_TLS_CA_BUNDLE_PATH, FERRUM_TLS_NO_VERIFY) — per-proxy backend TLS overrides do not apply."
      required: [providers]
      properties:
        providers:
          type: array
          minItems: 1
          description: One or more provider definitions. Tried in priority order (lower number = first).
          items:
            type: object
            required: [name, provider_type]
            properties:
              name:
                type: string
                description: Unique provider name used in logs and metadata (e.g. ai_federation_provider field).
              provider_type:
                type: string
                enum:
                  - openai
                  - anthropic
                  - google_gemini
                  - google_vertex
                  - azure_openai
                  - aws_bedrock
                  - mistral
                  - cohere
                  - xai
                  - deepseek
                  - meta_llama
                  - hugging_face
                description: AI provider format / wire protocol.
              priority:
                type: integer
                description: "Lower = tried first. Defaults to provider's index + 1."
              api_key:
                type: string
                description: API key for the provider. Required for all providers except aws_bedrock (uses SigV4) and google_vertex (uses service account JWT).
              model_patterns:
                type: array
                items:
                  type: string
                default: []
                description: "Glob patterns to match the request's `model` field (e.g. ['claude-*', 'gpt-4*']). Empty = catch-all."
              model_mapping:
                type: object
                additionalProperties:
                  type: string
                default: {}
                description: "Map client-facing model names to provider-native names (e.g. {claude-4-sonnet: 'claude-sonnet-4-20250514'})."
              default_model:
                type: string
                description: Model to send to the provider when no mapping matches.
              connect_timeout_seconds:
                type: integer
                default: 5
                description: TCP + TLS handshake timeout for outbound provider calls.
              read_timeout_seconds:
                type: integer
                default: 60
                description: Full response read timeout for outbound provider calls.
              base_url:
                type: string
                description: Override the provider's default endpoint URL (for self-hosted models, internal proxies, or pinned regional endpoints).
              azure_resource:
                type: string
                description: "Azure OpenAI resource name (the {resource} in {resource}.openai.azure.com). Required for azure_openai."
              azure_deployment:
                type: string
                description: Azure OpenAI deployment name. Required for azure_openai.
              azure_api_version:
                type: string
                default: "2024-06-01"
                description: Azure OpenAI api-version query parameter.
              google_project_id:
                type: string
                description: Google Cloud project ID. Required for google_vertex.
              google_region:
                type: string
                description: Google Vertex AI region (e.g. us-central1). Required for google_vertex.
              google_service_account_json:
                type: string
                description: Google service account JSON contents (the file body, not the path). Required for google_vertex; used to mint OAuth2 access tokens via JWT bearer flow.
              aws_region:
                type: string
                description: "AWS region for Bedrock (e.g. us-east-1). Required for aws_bedrock unless AWS_DEFAULT_REGION/AWS_REGION env var is set."
              aws_access_key_id:
                type: string
                description: "AWS access key ID for Bedrock SigV4 signing. Falls back to AWS_ACCESS_KEY_ID env var."
              aws_secret_access_key:
                type: string
                description: "AWS secret access key for Bedrock SigV4 signing. Falls back to AWS_SECRET_ACCESS_KEY env var."
              aws_session_token:
                type: string
                description: "Optional AWS STS session token for temporary credentials. Falls back to AWS_SESSION_TOKEN env var."
        fallback_enabled:
          type: boolean
          default: true
          description: Try the next provider when one fails (network error or matching status code).
        fallback_on_status_codes:
          type: array
          items:
            type: integer
          default: [429, 500, 502, 503]
          description: HTTP status codes from a provider that trigger fallback to the next provider.
        fallback_on_network_errors:
          type: boolean
          default: true
          description: Trigger fallback when the provider is unreachable (DNS/TCP/TLS failure).

    ApiChargebackConfig:
      type: object
      description: |
        Plugin: api_chargeback — Per-consumer API usage charge tracking across
        three independent pricing dimensions: per-call pricing by HTTP status
        code, per-byte bandwidth pricing (both client->backend and
        backend->client, applied to HTTP-family AND stream proxies), and
        per-connection pricing for stream proxies (TCP/TCP+TLS/UDP/DTLS).
        At least one of `pricing_tiers`, `bandwidth_pricing`, or
        `stream_connection_pricing` must be configured.
      properties:
        currency:
          type: string
          default: "USD"
          description: Currency label included in Prometheus metrics and JSON output. Informational only — the plugin does not perform currency conversion.
        pricing_tiers:
          type: array
          minItems: 1
          items:
            type: object
            required: [status_codes, price_per_call]
            properties:
              status_codes:
                type: array
                minItems: 1
                items:
                  type: integer
                description: HTTP status codes that trigger this tier's charge. A status code must appear in exactly one tier.
              price_per_call:
                type: number
                minimum: 0
                description: Charge per HTTP API call (e.g. 0.00001). Must be non-negative.
          description: |
            HTTP-family per-call pricing. Each tier maps a set of status codes
            to a per-call price. Applies to HTTP/1.1, HTTP/2, HTTP/3, gRPC, and
            WebSocket upgrades. Stream proxies (TCP/UDP/DTLS) have no HTTP
            status code and use `stream_connection_pricing` instead.
        bandwidth_pricing:
          type: object
          additionalProperties: false
          description: |
            Optional bandwidth pricing applied to both HTTP-family and stream
            transactions, using the gateway-perspective `bytes_sent` /
            `bytes_received` counters from the transaction-summary schema.
          properties:
            price_per_byte_sent:
              type: number
              minimum: 0
              default: 0.0
              description: Per-byte charge for bytes flowed client->backend.
            price_per_byte_received:
              type: number
              minimum: 0
              default: 0.0
              description: Per-byte charge for bytes flowed backend->client.
        stream_connection_pricing:
          type: object
          additionalProperties: false
          required: [price_per_connection]
          description: |
            Optional per-connection pricing for stream proxies (TCP, TCP+TLS,
            UDP, DTLS). Charges the configured flat fee once per session at
            disconnect time. Streams have no HTTP status code so they cannot
            use `pricing_tiers`.
          properties:
            price_per_connection:
              type: number
              minimum: 0
              description: Per-session charge applied at stream disconnect.
        render_cache_ttl_seconds:
          type: integer
          default: 5
          description: How long the cached /charges response is served before rebuilding.
        stale_entry_ttl_seconds:
          type: integer
          default: 3600
          description: How long idle chargeback entries live before eviction.
        cache_invalidation_min_age_ms:
          type: integer
          default: 500
          description: Minimum age (ms) of the render cache before record() will invalidate it.
        cleanup_interval_seconds:
          type: integer
          default: 300
          description: How often (seconds) the background task evicts entries that have been idle longer than stale_entry_ttl_seconds. Set to 0 to disable.

    ChargebackResponse:
      type: object
      description: JSON format response from the /charges endpoint.
      properties:
        currency:
          type: string
          example: "USD"
        generated_at:
          type: string
          format: date-time
        consumers:
          type: object
          additionalProperties:
            type: object
            properties:
              total_charges:
                type: number
                description: Sum of per-call, stream-connection, and bandwidth charges across all proxies for this consumer.
              total_calls:
                type: integer
                description: Sum of HTTP calls + stream sessions across all proxies for this consumer.
              per_call_charges:
                type: number
                description: HTTP per-call charges only.
              stream_connection_charges:
                type: number
                description: Stream per-connection charges only.
              bandwidth_charges:
                type: number
                description: Bandwidth charges only (sent + received).
              proxies:
                type: object
                additionalProperties:
                  type: object
                  properties:
                    proxy_name:
                      type: string
                    protocol_family:
                      type: string
                      enum: [http, stream]
                      description: Protocol family this proxy serves. Bandwidth metrics and the JSON breakdown are scoped per family.
                    total_charges:
                      type: number
                      description: Per-proxy sum of per-call, stream-connection, and bandwidth charges.
                    total_calls:
                      type: integer
                      description: Per-proxy sum of HTTP calls + stream sessions.
                    by_status:
                      type: object
                      description: HTTP per-status breakdown (empty for stream proxies).
                      additionalProperties:
                        type: object
                        properties:
                          calls:
                            type: integer
                          charges:
                            type: number
                    bandwidth:
                      type: object
                      properties:
                        bytes_sent:
                          type: integer
                          description: Total bytes flowed client->backend for this consumer/proxy pair.
                        bytes_received:
                          type: integer
                          description: Total bytes flowed backend->client for this consumer/proxy pair.
                        charge_sent:
                          type: number
                          description: Accumulated bandwidth charge for client->backend bytes.
                        charge_received:
                          type: number
                          description: Accumulated bandwidth charge for backend->client bytes.
                    stream:
                      type: object
                      description: Present only for stream proxies (TCP/UDP/DTLS).
                      properties:
                        connections:
                          type: integer
                          description: Number of stream sessions recorded.
                        connection_charges:
                          type: number
                          description: Accumulated per-connection charge.

    RequestDeduplicationConfig:
      type: object
      description: "Plugin: request_deduplication — Idempotency-key based request deduplication. Returns cached responses for duplicate requests within a TTL window. Supports centralized Redis-backed mode for cross-instance deduplication."
      properties:
        header_name:
          type: string
          default: "Idempotency-Key"
          description: Request header name containing the deduplication key
        ttl_seconds:
          type: integer
          minimum: 1
          default: 300
          description: Time-to-live in seconds for cached completed responses. Must be greater than zero.
        inflight_ttl_seconds:
          type: integer
          minimum: 1
          description: >-
            Time-to-live in seconds for in-flight request entries used to
            coalesce duplicate requests while the first is still being
            processed. Defaults to `ttl_seconds` when omitted. Must be
            greater than zero.
        max_entries:
          type: integer
          default: 10000
          description: Maximum number of cached deduplication entries (local mode only)
        applicable_methods:
          type: array
          items:
            type: string
          default: ["POST", "PUT", "PATCH"]
          description: HTTP methods that require deduplication
        scope_by_consumer:
          type: boolean
          default: true
          description: Scope deduplication keys per consumer identity
        enforce_required:
          type: boolean
          default: false
          description: Reject requests missing the deduplication header with 400
        sync_mode:
          type: string
          enum: [local, redis]
          default: local
          description: "Dedup cache storage: 'local' (in-memory) or 'redis' (centralized). Any RESP-compatible server works."
        redis_url:
          type: string
          description: "Redis connection URL. Required when sync_mode is 'redis'."
        redis_tls:
          type: boolean
          default: false
          description: "Enable TLS for the Redis connection. CA verification uses gateway-level FERRUM_TLS_CA_BUNDLE_PATH; skip-verify uses FERRUM_TLS_NO_VERIFY."
        redis_key_prefix:
          type: string
          default: "ferrum:dedup"
          description: Key prefix for all Redis keys
        redis_pool_size:
          type: integer
          default: 4
          description: Number of multiplexed Redis connections
        redis_connect_timeout_seconds:
          type: integer
          default: 5
          description: Redis connection timeout in seconds
        redis_health_check_interval_seconds:
          type: integer
          default: 5
          description: Health check ping interval when Redis is unavailable
        redis_username:
          type: string
          description: Redis username for ACL authentication
        redis_password:
          type: string
          description: Redis password

    GeoRestrictionConfig:
      type: object
      description: >-
        Plugin: geo_restriction — country-level access control backed by a
        MaxMind GeoIP2 / GeoLite2 `.mmdb` file. The database is mmap'd at
        construction time for zero-copy lookups; the file dependency is
        validated per-mode (fatal in file mode, warn in db mode, skipped on
        the data plane so a missing file degrades to `on_lookup_failure`
        instead of rejecting the whole config). `allow_countries` and
        `deny_countries` are mutually exclusive; at least one must be
        non-empty. Runs on every protocol — HTTP, gRPC, WebSocket, TCP, UDP.
      required: [db_path]
      properties:
        db_path:
          type: string
          description: >-
            Filesystem path to a MaxMind GeoIP2 or GeoLite2 `.mmdb` database.
            Required.
        allow_countries:
          type: array
          items:
            type: string
          default: []
          description: >-
            ISO 3166-1 alpha-2 country codes (case-insensitive — normalized to
            uppercase) that are allowed. Mutually exclusive with
            `deny_countries`. Example: `["US", "CA", "GB"]`.
        deny_countries:
          type: array
          items:
            type: string
          default: []
          description: >-
            ISO 3166-1 alpha-2 country codes (case-insensitive — normalized to
            uppercase) that are denied. Mutually exclusive with
            `allow_countries`.
        inject_headers:
          type: boolean
          default: false
          description: >-
            When true, inject the resolved country code into the proxied
            request as the `x-geo-country` header (uppercase ISO 3166-1
            alpha-2). HTTP-family proxies only — ignored on TCP/UDP streams.
        on_lookup_failure:
          type: string
          enum: [allow, deny]
          default: allow
          description: >-
            Action when the client IP cannot be resolved to a country. Applies
            to both genuine MaxMind misses (private IPs, unallocated ranges)
            and to the data plane fallback path when the `.mmdb` file is
            missing on disk.

    RateSpec:
      type: object
      description: Rate limit specification used by graphql and grpc_method_router plugins.
      required: [max_requests, window_seconds]
      properties:
        max_requests:
          type: integer
          format: uint64
          description: Maximum requests allowed in the window
        window_seconds:
          type: integer
          format: uint64
          minimum: 1
          description: Time window in seconds

    # ── Cluster Status ─────────────────────────────────────────────────

    ClusterStatusCp:
      type: object
      required: [mode, connected_data_planes, data_planes, connected_mesh_nodes, mesh_nodes]
      properties:
        mode:
          type: string
          enum: [cp]
        connected_data_planes:
          type: integer
          description: Number of currently connected Data Plane nodes
        data_planes:
          type: array
          items:
            $ref: "#/components/schemas/ConnectedDpNode"
        connected_mesh_nodes:
          type: integer
          description: Number of currently connected Mesh nodes
        mesh_nodes:
          type: array
          items:
            $ref: "#/components/schemas/ConnectedMeshNode"

    ConnectedMeshNode:
      type: object
      required: [node_id, version, namespace, status, connected_at, last_sync_at]
      properties:
        node_id:
          type: string
          description: Unique identifier for the mesh node
        version:
          type: string
          description: Ferrum Edge version reported by the mesh node
        namespace:
          type: string
          description: Namespace the mesh node is subscribed to
        status:
          type: string
          enum: [online]
          description: Always "online" — disconnected mesh nodes are removed from the registry
        connected_at:
          type: string
          format: date-time
          description: When the mesh node's gRPC stream was established
        last_sync_at:
          type: string
          format: date-time
          description: When the last config update was broadcast to this mesh node

    ConnectedDpNode:
      type: object
      required: [node_id, version, namespace, status, connected_at, last_sync_at]
      properties:
        node_id:
          type: string
          description: Unique identifier for the DP node (generated on each DP startup)
        version:
          type: string
          description: Ferrum Edge version reported by the DP
        namespace:
          type: string
          description: Namespace the DP is subscribed to
        status:
          type: string
          enum: [online]
          description: Always "online" — disconnected DPs are removed from the registry
        connected_at:
          type: string
          format: date-time
          description: When the DP's gRPC stream was established
        last_sync_at:
          type: string
          format: date-time
          description: When the last config update was broadcast to this DP

    ClusterStatusDp:
      type: object
      required: [mode, control_plane]
      properties:
        mode:
          type: string
          enum: [dp]
        control_plane:
          type: object
          required: [url, status, is_primary]
          properties:
            url:
              type: string
              description: URL of the CP this DP is connected to (or last attempted)
            status:
              type: string
              enum: [online, offline]
              description: Whether the gRPC stream to the CP is currently active
            is_primary:
              type: boolean
              description: True when connected to the primary CP, false for a fallback CP
            connected_since:
              type: string
              format: date-time
              nullable: true
              description: When the current connection was established (null if offline)
            last_config_received_at:
              type: string
              format: date-time
              nullable: true
              description: When the last config update was received (null if none yet)

    ClusterStatusOther:
      type: object
      required: [mode, message]
      properties:
        mode:
          type: string
          description: Current operating mode (database, file, etc.)
        message:
          type: string
          description: Informational message

    # ── Backend Capabilities ─────────────────────────────────────────
    ProtocolSupport:
      type: string
      enum: [unknown, supported, unsupported]
      description: |
        Per-backend per-protocol classification state.

        - `supported` — registry has confirmed the backend speaks this
          protocol; the hot path is free to use the native dispatch pool.
        - `unsupported` — registry has confirmed the backend does NOT
          speak this protocol (e.g., ALPN-negotiated HTTP/1.1 when the
          pool tried h2); the hot path skips the native pool.
        - `unknown` — no probe has run yet, or the last probe timed out.
          Hot-path behavior is identical to `unsupported` (fall back to
          reqwest), but the next scheduled refresh will retry.

    BackendCapabilityEntry:
      type: object
      required: [key, plain_http, grpc_transport, hbone, last_probe_at_unix_secs]
      properties:
        key:
          type: string
          description: |
            Deduplicated backend-target identity key:
            `scheme|host|port|dns_override|ca|mtls_cert|mtls_key|verify|hbone_port`.
            The HBONE port field is populated only for targets tagged
            `mesh.hbone=true`.
            Stable across responses for the same target; safe to match
            for churn detection.
        plain_http:
          type: object
          description: Transport support for plain HTTP (non-gRPC, non-WebSocket) traffic.
          required: [h1, h2_tls, h3]
          properties:
            h1:
              $ref: "#/components/schemas/ProtocolSupport"
            h2_tls:
              $ref: "#/components/schemas/ProtocolSupport"
            h3:
              $ref: "#/components/schemas/ProtocolSupport"
        grpc_transport:
          type: object
          description: Transport support for gRPC traffic detected via `content-type`.
          required: [h2_tls, h2c]
          properties:
            h2_tls:
              $ref: "#/components/schemas/ProtocolSupport"
            h2c:
              $ref: "#/components/schemas/ProtocolSupport"
        hbone:
          $ref: "#/components/schemas/ProtocolSupport"
          description: |
            Gateway-to-mesh HBONE support for upstream targets tagged
            `mesh.hbone=true`. `supported` means the gateway can open
            HTTP/2 CONNECT over SPIFFE mTLS to the sidecar port; `unknown`
            is used for untagged targets, gateways without SVIDs, or
            not-yet-probed entries.
        last_probe_at_unix_secs:
          type: integer
          format: int64
          description: |
            Epoch seconds of the most recent classification update.
            Refreshed by periodic probes AND by live-traffic downgrades
            (`mark_h2_tls_unsupported`, `mark_h3_unsupported`,
            `mark_hbone_unsupported`).
        last_probe_error:
          type: string
          nullable: true
          description: |
            Human-readable error from the most recent probe or live
            downgrade. `null` when the latest update classified the
            target cleanly. Expected-unsupported outcomes (h2c on
            plaintext, H3 on most HTTPS backends, untagged HBONE,
            per-request HBONE CONNECT rejection) do NOT populate this
            field — only real connection / TLS-config errors and
            in-flight live downgrades.

    BackendCapabilitiesResponse:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          description: Every registry entry keyed by backend-target identity.
          items:
            $ref: "#/components/schemas/BackendCapabilityEntry"

    # ── Node-Waypoint Identities ──────────────────────────────────────
    NodeWaypointIdentityEntry:
      type: object
      required:
        - pod_uid
        - spiffe_id
        - workload_spiffe_hash
        - orig_dst4_cookies
        - orig_dst6_cookies
        - has_policy_scope
      properties:
        pod_uid:
          type: string
          description: |
            Hyphenated lowercase UUID matching the Kubernetes `metadata.uid`
            that operators see in `kubectl get pod -o yaml`.
          example: "11111111-1111-1111-1111-111111111111"
        spiffe_id:
          type: string
          description: |
            SPIFFE ID assigned to that pod's service account
            (`spiffe://{trust_domain}/ns/{namespace}/sa/{service_account}`
            by convention).
          example: "spiffe://cluster.local/ns/default/sa/api"
        workload_spiffe_hash:
          type: integer
          format: int64
          description: |
            First 8 bytes of SHA-256 over the SPIFFE ID, big-endian as
            `u64`. Matches the value the eBPF `OrigDst{4,6}` map carries,
            for cross-correlation with node-agent telemetry. May exceed
            JavaScript's safe integer range; treat as opaque when
            consumed from JS clients.
        orig_dst4_cookies:
          type: integer
          format: int64
          description: |
            Number of socket cookies currently mapped to this pod via the
            IPv4 original-destination map. `0` means the pod is enrolled
            but has no in-flight outbound connection on IPv4.
        orig_dst6_cookies:
          type: integer
          format: int64
          description: |
            Number of socket cookies currently mapped to this pod via the
            IPv6 original-destination map. `0` means the pod is enrolled
            but has no in-flight outbound connection on IPv6.
        has_policy_scope:
          type: boolean
          description: |
            `true` iff a per-pod `PolicyScopeCache` is installed for this
            pod via `install_policy_scopes`. When `false`, mesh-authz
            falls back to the shared slice-level scope.

    NodeWaypointIdentitiesResponse:
      type: object
      required: [identity_count, cookies, identities]
      properties:
        identity_count:
          type: integer
          format: int64
          description: |
            Total number of enrolled pod identities. Equal to
            `identities.length`.
        cookies:
          type: object
          required: [orig_dst4, orig_dst6]
          description: |
            Total cookie-record counts across all enrolled pods, split by
            address family. Useful as a quick "1k cookies / 10 identities"
            sanity check without summing per-identity entries.
          properties:
            orig_dst4:
              type: integer
              format: int64
              description: Total IPv4 cookie records currently tracked.
            orig_dst6:
              type: integer
              format: int64
              description: Total IPv6 cookie records currently tracked.
        identities:
          type: array
          description: |
            One entry per enrolled pod identity, sorted by `pod_uid` so
            polling produces stable output. Entries with zero cookies are
            kept — enrolled-but-idle pods are operationally interesting.
          items:
            $ref: "#/components/schemas/NodeWaypointIdentityEntry"

    # ── Service-Waypoint Services ─────────────────────────────────────
    ServiceWaypointServiceEntry:
      type: object
      required: [namespace, name, ports, workload_count]
      properties:
        namespace:
          type: string
          description: Namespace of the admitted mesh service.
          example: default
        name:
          type: string
          description: Mesh service name admitted by the waypoint binding.
          example: reviews
        ports:
          type: array
          description: Service ports exposed by this mesh service.
          items:
            type: integer
            minimum: 1
            maximum: 65535
          example: [8080]
        workload_count:
          type: integer
          format: int64
          description: Number of workload SPIFFE references behind this service in the installed slice.
          example: 3

    ServiceWaypointServicesResponse:
      type: object
      required: [waypoint_name, namespace, service_count, services]
      properties:
        waypoint_name:
          type: string
          description: GAMMA waypoint binding name requested by this DP.
          example: api-waypoint
        namespace:
          type: string
          description: Namespace of the installed mesh slice.
          example: default
        service_count:
          type: integer
          format: int64
          description: Number of services admitted into this waypoint slice.
          example: 2
        services:
          type: array
          description: Services admitted by the installed service-waypoint slice, in slice order.
          items:
            $ref: "#/components/schemas/ServiceWaypointServiceEntry"

    # ── API Specs ─────────────────────────────────────────────────────
    ApiSpecSummary:
      type: object
      description: |
        Summary record for a single API spec. Returned by `GET /api-specs`.
        The raw spec content (the OpenAPI/Swagger document) is intentionally
        omitted — use `GET /api-specs/{id}` to retrieve the full document.
      properties:
        id:
          type: string
          description: UUID of the spec
        proxy_id:
          type: string
          description: ID of the proxy owned by this spec
        namespace:
          type: string
          description: Namespace in which this spec and its resources live
        spec_version:
          type: string
          description: OpenAPI/Swagger version string detected from the document
          example: "3.1.0"
        spec_format:
          type: string
          enum: [json, yaml]
          description: Format in which the spec was submitted and is stored
        title:
          type: [string, "null"]
          description: "`info.title` from the spec document, if present"
        info_version:
          type: [string, "null"]
          description: "`info.version` from the spec document, if present"
        description:
          type: [string, "null"]
          description: |
            `info.description` from the spec, truncated to 4096 bytes at a
            UTF-8 character boundary if necessary.
        contact_name:
          type: [string, "null"]
          description: "`info.contact.name` from the spec, if present"
        contact_email:
          type: [string, "null"]
          description: "`info.contact.email` from the spec, if present"
        license_name:
          type: [string, "null"]
          description: "`info.license.name` from the spec, if present"
        license_identifier:
          type: [string, "null"]
          description: |
            `info.license.identifier` (OpenAPI 3.1+) or `info.license.url`
            fallback, if present.
        tags:
          type: array
          items:
            type: string
          description: |
            Top-level `tags[].name` entries from the spec, de-duplicated and
            sorted alphabetically. Empty array when no tags are defined.
        server_urls:
          type: array
          items:
            type: string
          description: |
            Server URLs: `servers[].url` for OpenAPI 3.x; for Swagger 2.0,
            constructed as `{scheme}://{host}{basePath}` for each scheme.
            Empty array when no server information is present.
        operation_count:
          type: integer
          format: int32
          description: |
            Count of HTTP method keys (`get`, `post`, `put`, `delete`,
            `options`, `head`, `patch`, `trace`) summed across all `paths.*`
            entries in the spec.
        uncompressed_size:
          type: integer
          format: int64
          description: Size in bytes of the uncompressed spec content
        content_hash:
          type: string
          description: Lowercase hex SHA-256 digest of the uncompressed spec content. Used as ETag value.
        content_encoding:
          type: string
          enum: [gzip]
          description: Encoding used for stored spec content (always `gzip`)
        created_at:
          type: string
          format: date-time
          description: When the spec was first submitted
        updated_at:
          type: string
          format: date-time
          description: When the spec was last replaced via `PUT /api-specs/{id}`

    ApiSpecListResponse:
      type: object
      description: Paginated response from `GET /api-specs`.
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ApiSpecSummary"
          description: Spec summary records for the current page
        limit:
          type: integer
          description: Maximum items per page (as requested)
        offset:
          type: integer
          description: Number of items skipped (as requested)
        next_offset:
          type: [integer, "null"]
          description: |
            Offset to use for the next page, or `null` when this is the last
            page. A non-null value means `items.length == limit`; the actual
            total item count is not returned to avoid an expensive COUNT query.

    ApiSpecCreateResponse:
      type: object
      description: |
        Response body for a successful `POST /api-specs` (201) or
        `PUT /api-specs/{id}` (200). Provides the identifiers and content hash
        of the spec that was created or replaced.
      properties:
        id:
          type: string
          description: UUID of the spec (new on POST, unchanged on PUT)
        proxy_id:
          type: string
          description: ID of the proxy created or updated by this spec
        spec_version:
          type: string
          description: OpenAPI/Swagger version string from the document
        content_hash:
          type: string
          description: Lowercase hex SHA-256 of the uncompressed spec bytes. Suitable for use as an ETag.

    ApiSpecValidationError:
      type: object
      description: |
        Response body for 422 Unprocessable Entity from `POST /api-specs` or
        `PUT /api-specs/{id}`. The spec document was parsed successfully and the
        Ferrum extensions were found, but one or more extracted resources failed
        structural validation or database cross-checks (e.g., duplicate
        `listen_path`, invalid plugin config).
      properties:
        error:
          type: string
          example: "Spec validation failed"
        spec_version:
          type: string
          description: Version string detected from the submitted document
        failures:
          type: array
          description: One entry per resource that failed validation
          items:
            type: object
            properties:
              resource_type:
                type: string
                enum: [proxy, upstream, plugin]
                description: Kind of resource that failed
              id:
                type: string
                description: ID of the resource (from the extension object)
              errors:
                type: array
                items:
                  type: string
                description: Human-readable validation error messages for this resource

    ApiSpecParseError:
      type: object
      description: |
        Response body emitted by `POST /api-specs` and `PUT /api-specs/{id}`
        when the spec document fails to parse or violates a Ferrum extension
        rule. The body shape is identical for both 400 and 422 — the status
        code indicates whether the problem is **structural** (400) or
        **semantic** (422). The discriminator is the `code` field below.
      properties:
        error:
          type: string
          description: Short human-readable summary (always `"Spec parse failed"`).
        code:
          type: string
          enum:
            - InvalidJson
            - InvalidYaml
            - UnknownVersion
            - MissingProxyExtension
            - MalformedExtension
            - ConsumerExtensionNotAllowed
            - PluginInvalidScope
            - PluginProxyIdMismatch
            - PluginContainsCredentials
            - ProxyUpstreamIdMismatch
            - InvalidTagName
          description: |
            Machine-readable error discriminant.

            **Parse-time / structural — returned as HTTP 400 Bad Request:**

            - `InvalidJson` — body is not valid JSON
            - `InvalidYaml` — body is not valid YAML
            - `UnknownVersion` — no recognised `swagger: "2.0"` or `openapi: "3.x.y"` at root
            - `MissingProxyExtension` — `x-ferrum-proxy` is absent
            - `MalformedExtension` — `x-ferrum-proxy`, `x-ferrum-upstream`, or `x-ferrum-plugins` failed to deserialise

            **Semantic / policy violations — returned as HTTP 422 Unprocessable Entity:**

            - `ConsumerExtensionNotAllowed` — `x-ferrum-consumers` is present (forbidden)
            - `PluginInvalidScope` — a plugin in `x-ferrum-plugins` has `scope: global` or `scope: proxy_group`
            - `PluginProxyIdMismatch` — a plugin's `proxy_id` does not match the spec's proxy ID
            - `PluginContainsCredentials` — a plugin's `config` contains a forbidden key (`credentials`, `keyauth`, `basicauth`, `jwt`, `hmac`, `mtls`, `consumer`, `consumer_id`, `consumer_groups`, or `consumers`)
            - `ProxyUpstreamIdMismatch` — `x-ferrum-proxy.upstream_id` conflicts with the `id` of the inline `x-ferrum-upstream`
            - `InvalidTagName` — a `tags[].name` contains a forbidden character (`"`, `%`, `_`, or `\`) that would break the SQL `has_tag` LIKE filter
        details:
          type: string
          description: |
            Verbose error message — for `MalformedExtension` includes the
            offending extension name and the underlying serde error; for
            `Plugin*` codes includes the plugin id; for `InvalidTagName`
            includes the offending tag name and character. Includes field
            paths and values where applicable.
