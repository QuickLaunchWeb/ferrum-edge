syntax = "proto3";

package envoy.service.discovery.v3;

// Minimal, wire-compatible xDS v3 surface for Phase B.
//
// The gRPC service path intentionally matches Envoy:
// /envoy.service.discovery.v3.AggregatedDiscoveryService/...
//
// Several nested messages are reduced to the field numbers Ferrum needs for
// ACK/NACK, snapshot, and delta correctness. Protobuf wire compatibility does
// not depend on the declared message package inside length-delimited fields,
// so real Envoy clients can send full DiscoveryRequest/Node payloads and Ferrum
// will parse the fields it understands while ignoring the rest. Resource Any
// values likewise carry field-compatible minimal Listener/Cluster/etc. payloads
// until Phase C/D populate full runtime-specific resources.

service AggregatedDiscoveryService {
  rpc StreamAggregatedResources(stream DiscoveryRequest)
      returns (stream DiscoveryResponse);
  rpc DeltaAggregatedResources(stream DeltaDiscoveryRequest)
      returns (stream DeltaDiscoveryResponse);
}

message Any {
  string type_url = 1;
  bytes value = 2;
}

message Status {
  int32 code = 1;
  string message = 2;
  repeated Any details = 3;
}

message Node {
  string id = 1;
  string cluster = 2;
  // Phase B records metadata as uninterpreted bytes in this minimal shim.
  // Real Envoy uses google.protobuf.Struct here; switch to the upstream proto
  // surface before Ferrum consumes workload labels from Envoy Node metadata.
  bytes metadata = 3;
}

message ControlPlane {
  string identifier = 1;
}

message DiscoveryRequest {
  string version_info = 1;
  Node node = 2;
  repeated string resource_names = 3;
  string type_url = 4;
  string response_nonce = 5;
  Status error_detail = 6;
}

message DiscoveryResponse {
  string version_info = 1;
  repeated Any resources = 2;
  bool canary = 3;
  string type_url = 4;
  string nonce = 5;
  ControlPlane control_plane = 6;
}

message DeltaDiscoveryRequest {
  Node node = 1;
  string type_url = 2;
  repeated string resource_names_subscribe = 3;
  repeated string resource_names_unsubscribe = 4;
  map<string, string> initial_resource_versions = 5;
  string response_nonce = 6;
  Status error_detail = 7;
}

message DeltaDiscoveryResponse {
  string system_version_info = 1;
  repeated Resource resources = 2;
  string type_url = 4;
  string nonce = 5;
  repeated string removed_resources = 6;
}

message Resource {
  string version = 1;
  Any resource = 2;
  string name = 3;
  repeated string aliases = 4;
}

message Listener {
  string name = 1;
}

message RouteConfiguration {
  string name = 1;
}

message Cluster {
  string name = 1;
}

message ClusterLoadAssignment {
  string cluster_name = 1;
}

message Secret {
  string name = 1;
}
