syntax = "proto3";

package ferrum;

service ConfigSync {
  // DP subscribes to config updates from CP
  rpc Subscribe(SubscribeRequest) returns (stream ConfigUpdate);
  // DP can request a full config snapshot
  rpc GetFullConfig(FullConfigRequest) returns (FullConfigResponse);
}

service MeshConfigSync {
  // Mesh data planes subscribe to their canonical per-workload mesh slice.
  rpc MeshSubscribe(MeshSubscribeRequest) returns (stream MeshConfigUpdate);
}

message SubscribeRequest {
  string node_id = 1;
  // Ferrum Edge binary version of the DP (e.g. "0.9.0")
  string ferrum_version = 2;
  // Namespace this DP instance loads and proxies
  string namespace = 3;
}

message FullConfigRequest {
  string node_id = 1;
  // Ferrum Edge binary version of the DP (e.g. "0.9.0")
  string ferrum_version = 2;
  // Namespace to load config for
  string namespace = 3;
}

message FullConfigResponse {
  string config_json = 1;
  string version = 2;
  // Ferrum Edge binary version of the CP (e.g. "0.9.0")
  string ferrum_version = 3;
  // JSON-encoded modes::mesh::config::TrustBundleSet for gateway-to-mesh TLS,
  // or JSON null to clear previously delivered CP trust material. Kept
  // out-of-band so config_json stays compatible with older DPs.
  string trust_bundles_json = 4;
}

message ConfigUpdate {
  enum UpdateType {
    FULL_SNAPSHOT = 0;
    DELTA = 1;
  }
  UpdateType update_type = 1;
  string config_json = 2;
  string version = 3;
  int64 timestamp = 4;
  // Ferrum Edge binary version of the CP (e.g. "0.9.0")
  string ferrum_version = 5;
  // JSON-encoded modes::mesh::config::TrustBundleSet for gateway-to-mesh TLS,
  // or JSON null to clear previously delivered CP trust material. Kept
  // out-of-band so DELTA updates can refresh trust without changing the
  // incremental resource payload and FULL_SNAPSHOT config_json stays
  // compatible with older DPs.
  string trust_bundles_json = 6;
}

message MeshSubscribeRequest {
  string node_id = 1;
  // Ferrum Edge binary version of the mesh data plane (e.g. "0.9.0")
  string ferrum_version = 2;
  // Namespace this mesh data plane loads and enforces
  string namespace = 3;
  // Optional workload identity for sidecar mode. Ambient nodes may leave this
  // empty and rely on labels/topology metadata until HBONE is wired in Phase C.
  string workload_spiffe_id = 4;
  // Workload labels used to select workload-scoped policy.
  map<string, string> labels = 5;
  // Optional GAMMA ServiceWaypoint name. When set, the CP narrows the
  // returned MeshSlice to services bound to this waypoint.
  string waypoint_name = 6;
}

message MeshConfigUpdate {
  string version = 1;
  int64 timestamp = 2;
  // JSON-encoded modes::mesh::slice::MeshSlice. Kept JSON for native mesh
  // config so the canonical model remains the stable contract.
  string mesh_slice_json = 3;
  // Ferrum Edge binary version of the CP (e.g. "0.9.0")
  string ferrum_version = 4;
  // Lightweight keepalive frame for MeshSubscribe streams. Heartbeats keep
  // registry liveness fresh without forcing receivers to re-apply a slice.
  bool heartbeat = 5;
}
